patterns_found:

  - category: architecture
    pattern: "Applet 工厂模式 (3 层)"
    description: |
      1) tasker-engine 定义 Action/Criterion 基类和 DSL 工厂函数
      2) app 层 `*Registry.kt` 通过 DSL 声明具体选项
      3) AppletOptionFactory 枚举所有 Registry 实例
    examples:
      - file: GlobalActionRegistry.kt
        location: "GlobalActionRegistry.kt:全文"
        snippet: |
          @AppletOrdinal(0x0008)
          val wakeUpScreen = appletOption(R.string.wake_up_screen) {
              emptyArgOptimisticAction {
                  PowerManagerBridge.wakeUpScreen()
              }
          }
    prevalence: common

  - category: architecture
    pattern: "Action 实现模式 — 三种复杂度"
    description: |
      **模式 A: inline lambda（最简，1 个文件）**
      - 在 *Registry.kt 中直接用 emptyArgAction / emptyArgOptimisticAction / simpleSingleNonNullArgAction
      - 适合：系统 API 一行调用的动作。示例：GlobalActionRegistry.pressBack, wakeUpScreen
      
      **模式 B: 自定义 Action 类（2-3 个文件）**
      - 在 action/ 目录创建继承 SingleArgAction<T> 或 ArgumentAction 的类
      - 在 *Registry.kt 注册 new 实例
      - 适合：需要自定义序列化、复杂逻辑的动作。示例：Vibrate, ShellCmdAction, GestureAction
      
      **模式 C: Bridge + Action + Registry（3 个文件）**
      - bridge/ 目录封装系统 API（object + lazy 获取系统服务）
      - action/ 目录创建 Action 类
      - registry/ 目录注册
      - 适合：需要复用系统 API 的场景。示例：Vibrate → VibratorBridge
    examples:
      - file: GlobalActionRegistry.kt
        location: "GlobalActionRegistry.kt:87-91"
        snippet: |
          // 模式 A：inline lambda
          val wakeUpScreen = appletOption(R.string.wake_up_screen) {
              emptyArgOptimisticAction { PowerManagerBridge.wakeUpScreen() }
          }
      - file: Vibrate.kt
        location: "Vibrate.kt:21"
        snippet: |
          // 模式 B：自定义 SingleArgAction
          class Vibrate : SingleArgAction<Vibrate.VibrationWaveForm>() {
              override suspend fun doAction(arg: VibrationWaveForm?, runtime: TaskRuntime): AppletResult { ... }
          }
      - file: SetModeAction.kt
        location: "SetModeAction.kt:26"
        snippet: |
          // 模式 C：自定义 ArgumentAction（含依赖注入）
          class SetModeAction(private val modeRepositoryProvider: () -> ModeRepository) : ArgumentAction() { ... }
    prevalence: common

  - category: architecture
    pattern: "Criterion 实现模式 — 两种"
    description: |
      **模式 1: booleanCriterion（最简）**
      - 无参数，lambda 返回 Boolean
      - 自动支持 isInverted 翻转
      - 注册用 invertibleAppletOption()
      - 示例：isScreenPortrait, isBatteryCharging, isNetworkActive
      
      **模式 2: 自定义 Applet 子类**
      - 继承 Applet 直接实现 apply()
      - 手动处理 values[] 和 isInverted
      - 示例：ModeConstraint, GeofenceConstraint, OcrTextConstraint
    examples:
      - file: GlobalCriterionRegistry.kt
        location: "GlobalCriterionRegistry.kt:22-26"
        snippet: |
          val isScreenPortrait = invertibleAppletOption(R.string.screen_orientation_portrait) {
              booleanCriterion { DisplayManagerBridge.size.let { it.x < it.y } }
          }
      - file: ModeConstraint.kt
        location: "ModeConstraint.kt:26"
        snippet: |
          class ModeConstraint(private val modeRepositoryProvider: () -> ModeRepository) : Applet() {
              override suspend fun apply(runtime: TaskRuntime): AppletResult { ... }
          }
    prevalence: common

  - category: architecture
    pattern: "Bridge 层封装模式"
    description: |
      所有系统服务通过 bridge/ 目录的 object 封装：
      - `object XxxBridge { private val service by lazy { ContextBridge.getContext().getSystemService(...) } }`
      - 提供 val 属性（只读状态查询）和 fun 方法（操作执行）
      - 已有 Bridge: BatteryManager, Connectivity, Display, Power, Vibrator, Clipboard, ActivityManager, PackageManager, OverlayToast
    examples:
      - file: BatteryManagerBridge.kt
        location: "BatteryManagerBridge.kt:12-25"
        snippet: |
          object BatteryManagerBridge {
              private val batteryManager: BatteryManager by lazy {
                  ContextBridge.getContext().getSystemService(BatteryManager::class.java)
              }
              val isCharging: Boolean get() = batteryManager.isCharging
          }
    prevalence: common

  - category: architecture
    pattern: "注册链路（新增 Registry 完整步骤）"
    description: |
      1. BootstrapOptionRegistry.companion 定义 ID 常量（如 ID_SOUND_ACTION_REGISTRY = 0x5C）
      2. BootstrapOptionRegistry 类体中添加 PhantomFlow 入口（如 @AppletOrdinal(0x0046) val soundActions = flowOptionWithId<PhantomFlow>(ID_SOUND_ACTION_REGISTRY, R.string.sound_actions)）
      3. BootstrapOptionRegistry.actionFlowOptions / criterionFlowOptions 数组中添加引用
      4. AppletOptionFactory 实例化 Registry 并加入 allRegistries 数组
      
      如果只在已有 Registry 中加入新选项：
      - 在 *Registry.kt 中添加 @AppletOrdinal(下一个可用序号) val xxx = appletOption(...) { ... }
      - 确保 AppletOrdinal 的 ordinal 不重复
    examples:
      - file: BootstrapOptionRegistry.kt
        location: "BootstrapOptionRegistry.kt:52-63"
        snippet: |
          const val ID_GLOBAL_ACTION_REGISTRY = 0x50
          ...
          const val ID_SCREEN_OCR_ACTION_REGISTRY = 0x5B
      - file: AppletOptionFactory.kt
        location: "AppletOptionFactory.kt:~136"
        snippet: |
          private val allRegistries = arrayOf(
              flowRegistry, eventRegistry, applicationRegistry, ...
              globalActionRegistry, vibrationActionRegistry, ...
          )
    prevalence: common

  - category: naming
    pattern: "字符串资源命名规范"
    description: |
      - 动作标题: 动词短语，如 `press_back`, `wake_up_screen`, `execute_shell_cmd`, `perform_vibrate`
      - 约束标题: `is_xxx`（布尔）或描述性名词，如 `is_charging`, `screen_orientation_portrait`
      - 反转命名: `not_` + 原名，如 `not_is_charging`（自动解析）
      - Registry 分类: `global_actions`, `text_operations`, `file_operations`, `vibrate`
      - 格式化输出: `format_xxx_desc`, `format_xxx`
    examples:
      - file: strings.xml
        location: "app/src/main/res/values/strings.xml"
        snippet: |
          <string name="device_status">设备状态</string>
          <string name="perform_vibrate">执行震动</string>
    prevalence: common

  - category: architecture
    pattern: "参数传递与结果返回"
    description: |
      **参数接收:**
      - withValueArgument<T>(titleRes, variantValueType?) — 用户通过 UI 配置的值，存入 Applet.values[index]
      - withRefArgument<T>(titleRes) — 引用其他 Applet 的输出，存入 Applet.references[index]
      - withBinaryArgument<Ref, Val>(titleRes, variantValueType?) — 支持引用或直接值
      - withUnaryArgument<T>(...) — 既是参数也可做引用
      
      **结果返回:**
      - withResult<T>(titleRes) — 声明输出变量，供后续 Applet 引用
      - Action 内部通过 runtime.registerReferent(value) 注册结果
      - AppletResult.EMPTY_SUCCESS (成功无结果)
      - AppletResult.succeeded(result) (成功带结果)
      - AppletResult.EMPTY_FAILURE (失败)
      - AppletResult.failed(error) (失败带错误信息)
    examples:
      - file: TextActionRegistry.kt
        location: "TextActionRegistry.kt:~40"
        snippet: |
          val extractText = appletOption(R.string.format_extract_text) {
              createProcessor { args, _ ->
                  val src = args[0] as? String
                  val regex = args[1] as? String
                  if (regex == null) null else src?.firstGroupValue(regex)
              }
          }.withRefArgument<String>(R.string.text)
           .withValueArgument<String>(R.string.regex)
           .withResult<String>(R.string.extracted_text)
    prevalence: common

  - category: architecture
    pattern: "VariantArgType 类型系统"
    description: |
      定义参数的 UI 编辑器类型，影响前端展示形式：
      - NONE = -1（默认文本）
      - INT_PERCENT = 12<<16|3（百分比滑块）
      - INT_INTERVAL = 2<<16|3（时间间隔）
      - INT_ROTATION = 5<<16|3（旋转方向选择器）
      - TEXT_PACKAGE_NAME = 1<<16|1（包名选择器）
      - TEXT_FILE_PATH = 5<<16|1（文件路径选择器）
      - TEXT_FORMAT = 6<<16|1|MASK（模板文本）
      - TEXT_VIBRATION_PATTERN = 7<<16|1（震动模式编辑器）
      新增动作如需特殊 UI，可扩展此处
    examples:
      - file: VariantArgType.kt
        location: "VariantArgType.kt:全文"
        snippet: |
          const val INT_PERCENT = 12 shl 16 or Applet.ARG_TYPE_INT
    prevalence: common

# ==============================================================================
# 3. RELATED ARCHITECTURE
# ==============================================================================
related_architecture:
  components_relevant_to_domain:
    - component: "tasker-engine (Applet 框架)"
      responsibility: "定义 Applet/Action/Criterion 基类、DSL 工厂、序列化"
      location: "tasker-engine/src/main/java/top/xjunz/tasker/engine/"
      relationship_to_domain: "所有 Action/Criterion 的继承基础"

    - component: "bridge/ 桥接层"
      responsibility: "封装 Android 系统服务，提供进程无关的 API 访问"
      location: "app/src/main/java/top/xjunz/tasker/bridge/"
      relationship_to_domain: "Action/Criterion 通过 Bridge 访问系统 API"

    - component: "option/registry/ 注册层"
      responsibility: "声明可用选项，组织分类菜单，连接 UI 和引擎"
      location: "app/src/main/java/top/xjunz/tasker/task/applet/option/registry/"
      relationship_to_domain: "所有新 Action/Criterion 必须在此注册"

    - component: "AppletOptionFactory"
      responsibility: "单例工厂，聚合所有 Registry，路由 ID→实例创建"
      location: "app/src/main/java/top/xjunz/tasker/task/applet/option/AppletOptionFactory.kt"
      relationship_to_domain: "新 Registry 必须在此注册"

    - component: "service/Environment.kt"
      responsibility: "提供 currentService、uiAutomation 等全局服务引用"
      location: "app/src/main/java/top/xjunz/tasker/service/Environment.kt"
      relationship_to_domain: "Action 通过此访问 A11y、UiAutomator 服务"

  interfaces_used_by_domain:
    - interface: Applet
      location: "tasker-engine/.../applet/base/Applet.kt"
      usage_pattern: "所有 Action/Criterion 的根基类"
    - interface: AppletFactory
      location: "tasker-engine/.../applet/factory/AppletFactory.kt"
      usage_pattern: "createAppletById(id) 反序列化入口"

  data_flow_involving_domain: |
    用户 UI 选择选项 → AppletOption.yield() → 创建 Applet 实例 → 
    设置 values/references → 序列化为 JSON → 
    运行时 AppletFactory.createAppletById() 反序列化 → 
    TaskRuntime.apply(applet) → Action.doAction() / Criterion.matchTarget()

  key_relationships_to_domain:
    - from: "*Registry.kt"
      to: "BootstrapOptionRegistry"
      relationship: "通过 ID 常量关联"
    - from: "*Registry.kt"
      to: "AppletOptionFactory"
      relationship: "Factory 持有 Registry 实例"
    - from: "Action/Criterion 实现"
      to: "*Bridge.kt"
      relationship: "调用系统 API"
    - from: "strings.xml"
      to: "*Registry.kt"
      relationship: "提供 UI 标题和描述文本"

# ==============================================================================
# 4. CURRENT REGISTRY ORDINALS (避免冲突)
# ==============================================================================
registry_ordinals:
  # --- BootstrapOptionRegistry IDs ---
  bootstrap_registry_ids:
    criterion_registries:
      ID_EVENT_FILTER_REGISTRY: 0x0F
      ID_APP_CRITERION_REGISTRY: 0x10
      ID_TIME_CRITERION_REGISTRY: 0x12
      ID_GLOBAL_CRITERION_REGISTRY: 0x13
      ID_NOTIFICATION_CRITERION_REGISTRY: 0x14
      ID_TEXT_CRITERION_REGISTRY: 0x15
      ID_UI_OBJECT_CRITERION_REGISTRY: 0x16
      ID_NETWORK_CRITERION_REGISTRY: 0x17
      ID_VARIABLE_CRITERION_REGISTRY: 0x18
      ID_MODE_CRITERION_REGISTRY: 0x19
      ID_LOCATION_CRITERION_REGISTRY: 0x1A
      ID_SCREEN_OCR_CRITERION_REGISTRY: 0x1B
      next_available_criterion: 0x1C  # ← 新约束 Registry 从此开始
    action_registries:
      ID_GLOBAL_ACTION_REGISTRY: 0x50
      ID_UI_OBJECT_ACTION_REGISTRY: 0x51
      ID_CONTROL_ACTION_REGISTRY: 0x52
      ID_APP_ACTION_REGISTRY: 0x53
      ID_TEXT_ACTION_REGISTRY: 0x54
      ID_GESTURE_ACTION_REGISTRY: 0x55
      ID_SHELL_CMD_ACTION_REGISTRY: 0x56
      ID_FILE_ACTION_REGISTRY: 0x57
      ID_VIBRATION_ACTION_REGISTRY: 0x58
      ID_VARIABLE_ACTION_REGISTRY: 0x59
      ID_MODE_ACTION_REGISTRY: 0x5A
      ID_SCREEN_OCR_ACTION_REGISTRY: 0x5B
      next_available_action: 0x5C  # ← 新动作 Registry 从此开始
    flow_registries:
      ID_UI_OBJECT_FLOW_REGISTRY: 0x60

  # --- 各 Registry 内部 AppletOrdinal 使用情况 ---
  global_action_registry:
    used_ordinals: [0x0000, 0x0001, 0x0002, 0x0003, 0x0004, 0x0005, 0x0006, 0x0007, 0x0008]
    next_available: 0x0009

  global_criterion_registry:
    used_ordinals: [0x0000, 0x0010, 0x0011]
    next_available: 0x0012
    note: "0x0000 是屏幕方向，0x0010+ 是设备状态，建议新约束从 0x0012 或 0x0020 开始"

  network_criterion_registry:
    used_ordinals: [0x0001, 0x0002, 0x0003, 0x0004]
    next_available: 0x0005

  control_action_registry:
    used_ordinals: [0x0000, 0x0001, 0x0002, 0x0003, 0x0004, 0x0005, 0x0006, 0x0010, 0x0011, 0x0020]
    next_available: 0x0021

  text_action_registry:
    used_ordinals: [0x0000, 0x0001, 0x0002, 0x0003]
    next_available: 0x0004

  vibration_action_registry:
    used_ordinals: [0x0001]
    next_available: 0x0002

  event_criterion_registry:
    used_ordinals: [0x0000..0x0009, 0x0010..0x001F, 0x0020..0x0028]
    max_ordinal: 0x0028
    next_available: 0x0029

# ==============================================================================
# 5. FEASIBILITY & COMPLEXITY FOR 24 FEATURES
# ==============================================================================
feature_feasibility:

  actions:
    - id: A-SET-002
      name: "Auto Rotate On/Off"
      complexity: low
      implementation_pattern: "模式 A: inline lambda in GlobalActionRegistry"
      details: |
        使用 Settings.System.putInt(contentResolver, Settings.System.ACCELEROMETER_ROTATION, 0/1)
        需要 WRITE_SETTINGS 权限或 Shizuku。可在 GlobalActionRegistry 中直接 inline。
      files_needed: ["GlobalActionRegistry.kt (修改)", "strings.xml (新增)"]
      bridge_needed: false
      new_registry: false

    - id: A-SET-003
      name: "Bluetooth Configure (Enable/Disable)"
      complexity: low
      implementation_pattern: "模式 A: inline lambda in GlobalActionRegistry"
      details: |
        BluetoothAdapter.getDefaultAdapter().enable()/disable() — 需要 BLUETOOTH_CONNECT (API31+)。
        或通过 Shizuku 执行 shell 命令 `settings put global bluetooth_on 0/1`。
      files_needed: ["GlobalActionRegistry.kt (修改)", "strings.xml (新增)"]
      bridge_needed: "可选 BluetoothBridge"
      new_registry: false

    - id: A-SET-004
      name: "Brightness"
      complexity: low
      implementation_pattern: "模式 A: simpleSingleNonNullArgAction<Int> in GlobalActionRegistry"
      details: |
        Settings.System.putInt(contentResolver, SCREEN_BRIGHTNESS, value)
        + Settings.System.putInt(contentResolver, SCREEN_BRIGHTNESS_MODE, MANUAL)
        需要 WRITE_SETTINGS 或 Shizuku。参数: 0-255 亮度值。
      files_needed: ["GlobalActionRegistry.kt (修改)", "strings.xml (新增)"]
      bridge_needed: false
      new_registry: false

    - id: A-SET-005
      name: "Dark Theme"
      complexity: medium
      implementation_pattern: "模式 A: emptyArgAction + Shizuku shell"
      details: |
        API 29+: UiModeManager.setNightMode() 或 `cmd uimode night yes/no`
        或 Settings.Secure `ui_night_mode` (2=on, 1=off)。
      files_needed: ["GlobalActionRegistry.kt (修改)", "strings.xml (新增)"]
      bridge_needed: false
      new_registry: false

    - id: A-SET-016
      name: "WiFi Configure (Enable/Disable)"
      complexity: low
      implementation_pattern: "模式 A: inline lambda"
      details: |
        API < 29: WifiManager.setWifiEnabled()
        API 29+: 需 shell `svc wifi enable/disable` 通过 Shizuku。
        ConnectivityManagerBridge 已有 WifiManager 引用可复用。
      files_needed: ["GlobalActionRegistry.kt (修改)", "strings.xml (新增)"]
      bridge_needed: "复用 ConnectivityManagerBridge"
      new_registry: false

    - id: A-SET-033
      name: "Torch On/Off"
      complexity: low
      implementation_pattern: "模式 A: emptyArgAction"
      details: |
        CameraManager.setTorchMode(cameraId, enabled)
        新增 CameraManagerBridge 或直接 inline。
      files_needed: ["GlobalActionRegistry.kt (修改)", "strings.xml (新增)", "可选 CameraManagerBridge.kt"]
      bridge_needed: "可选"
      new_registry: false

    - id: A-SND-001
      name: "Volume Change"
      complexity: medium
      implementation_pattern: "模式 A: simpleSingleNonNullArgAction<Int>"
      details: |
        AudioManager.setStreamVolume(streamType, volume, 0)
        streamType: STREAM_MUSIC/RING/NOTIFICATION/ALARM/SYSTEM
        需要新建 AudioManagerBridge 或 inline。参数需要 stream 类型 + 目标音量。
      files_needed: ["新建 SoundActionRegistry.kt", "strings.xml", "可选 AudioManagerBridge.kt"]
      bridge_needed: "推荐 AudioManagerBridge"
      new_registry: "推荐新建 SoundActionRegistry (ID=0x5C)"

    - id: A-SND-005
      name: "Play/Stop Sound"
      complexity: high
      implementation_pattern: "模式 B: 自定义 SingleArgAction"
      details: |
        需要 MediaPlayer / SoundPool 管理。播放指定文件或 URI。
        需要管理生命周期（播放/停止）。文件路径参数 + 可选循环。
      files_needed: ["action/PlaySoundAction.kt", "SoundActionRegistry.kt", "strings.xml"]
      bridge_needed: false
      new_registry: "归入 SoundActionRegistry"

    - id: A-SND-006
      name: "Silent/Vibrate Mode"
      complexity: low
      implementation_pattern: "模式 A: simpleSingleNonNullArgAction<Int>"
      details: |
        AudioManager.setRingerMode(RINGER_MODE_NORMAL/VIBRATE/SILENT)
        需要 NotificationPolicy access 或 DND 权限。
      files_needed: ["SoundActionRegistry.kt", "strings.xml"]
      bridge_needed: "复用 AudioManagerBridge"
      new_registry: "归入 SoundActionRegistry"

    - id: A-SND-007
      name: "Speak Text (TTS)"
      complexity: medium
      implementation_pattern: "模式 B: 自定义 Action"
      details: |
        TextToSpeech 需要异步初始化，speak() 后等待完成。
        需要管理 TTS 引擎生命周期。支持变量模板文本（VarRefAction 模式）。
      files_needed: ["action/SpeakTextAction.kt 或 TtsBridge.kt", "SoundActionRegistry.kt", "strings.xml"]
      bridge_needed: "推荐 TtsBridge"
      new_registry: "归入 SoundActionRegistry"

    - id: A-SND-014
      name: "Do Not Disturb"
      complexity: medium
      implementation_pattern: "模式 A: simpleSingleNonNullArgAction<Int>"
      details: |
        NotificationManager.setInterruptionFilter(INTERRUPTION_FILTER_NONE/ALL/PRIORITY)
        需要 NotificationPolicy access 权限。
      files_needed: ["SoundActionRegistry.kt", "strings.xml", "可选 NotificationManagerBridge.kt"]
      bridge_needed: "推荐 NotificationManagerBridge"
      new_registry: "归入 SoundActionRegistry"

    - id: A-UI-001
      name: "Display Notification"
      complexity: high
      implementation_pattern: "模式 B: 自定义 ArgumentAction"
      details: |
        需要 NotificationChannel 管理、构建 Notification.Builder。
        参数: 标题、内容、频道 ID、优先级、是否持久化。
        需要处理权限（POST_NOTIFICATIONS API 33+）。
      files_needed: ["action/DisplayNotificationAction.kt", "新建 UiActionRegistry.kt 或归入 TextActionRegistry", "strings.xml"]
      bridge_needed: "推荐 NotificationManagerBridge"
      new_registry: "推荐新建 UiActionRegistry (ID=0x5D)"

    - id: A-UI-002
      name: "Display Dialog"
      complexity: high
      implementation_pattern: "模式 B: 自定义 Action"
      details: |
        需要 overlay window (TYPE_ACCESSIBILITY_OVERLAY 或 TYPE_SYSTEM_ALERT)。
        类似 OverlayToastBridge 的实现但加输入和按钮。可复用其 WindowManager 模式。
      files_needed: ["action/DisplayDialogAction.kt", "bridge/OverlayDialogBridge.kt", "UiActionRegistry.kt", "strings.xml", "布局 XML"]
      bridge_needed: "是（OverlayDialogBridge）"
      new_registry: "归入 UiActionRegistry"

    - id: A-UI-007
      name: "Toast Message"
      complexity: low
      implementation_pattern: "已有: TextActionRegistry.makeToast"
      details: |
        ⚠️ 已实现！TextActionRegistry.makeToast 已经通过 overlayToastBridge.showOverlayToast() 实现 Toast。
        如果需要独立入口，只需在新 Registry 增加一个委托到 makeToast 的选项。
      files_needed: ["无需新增，已存在"]
      bridge_needed: false
      new_registry: false

    - id: A-NET-001
      name: "HTTP Request"
      complexity: high
      implementation_pattern: "模式 B: 自定义 ArgumentAction"
      details: |
        需要 OkHttp/HttpURLConnection。参数: URL、Method、Headers、Body。
        结果: status code、response body。
        需要处理超时、SSL、异步执行。
      files_needed: ["action/HttpRequestAction.kt", "新建 NetworkActionRegistry.kt", "strings.xml"]
      bridge_needed: false
      new_registry: "推荐新建 NetworkActionRegistry (ID=0x5E)"

    - id: A-MEDIA-001
      name: "Control Media"
      complexity: medium
      implementation_pattern: "模式 A: emptyArgAction"
      details: |
        MediaSessionManager → getActiveSessions() → sendMediaAction (play/pause/next/prev/stop)。
        或使用 KeyEvent 方式发送媒体按键。
        需要 NotificationListener 权限获取 active sessions。
      files_needed: ["新建 MediaActionRegistry.kt 或归入 GlobalActionRegistry", "strings.xml", "可选 MediaSessionBridge.kt"]
      bridge_needed: "推荐 MediaSessionBridge"
      new_registry: "可归入 GlobalActionRegistry"

    - id: A-INT-001
      name: "Enable/Disable Macro"
      complexity: medium
      implementation_pattern: "模式 A: 参考 ControlActionRegistry.disableTask"
      details: |
        已有类似实现: ControlActionRegistry.disableTask 通过 LocalTaskManager.removeTask() + TaskStorage.toggleTaskFilename()。
        新实现需要通过任务名或 ID 查找并启用/禁用。
      files_needed: ["ControlActionRegistry.kt (修改)", "strings.xml"]
      bridge_needed: false
      new_registry: false

    - id: A-INT-005
      name: "Export Macros"
      complexity: high
      implementation_pattern: "模式 B: 自定义 Action"
      details: |
        需要序列化任务为 JSON，写入文件或分享。
        涉及文件 I/O、任务查询、格式化。
      files_needed: ["action/ExportMacrosAction.kt", "ControlActionRegistry.kt (修改)", "strings.xml"]
      bridge_needed: false
      new_registry: false

  constraints:
    - id: C-DEV-002
      name: "Device Locked/Unlocked"
      complexity: low
      implementation_pattern: "booleanCriterion in GlobalCriterionRegistry"
      details: |
        KeyguardManager.isKeyguardLocked() (API 16+) 或 isDeviceLocked() (API 22+)。
        新增 `KeyguardManagerBridge` 或直接 inline。
      files_needed: ["GlobalCriterionRegistry.kt (修改)", "strings.xml"]
      bridge_needed: "可选 KeyguardManagerBridge"

    - id: C-NET-006
      name: "Airplane Mode"
      complexity: low
      implementation_pattern: "booleanCriterion in NetworkCriterionRegistry"
      details: |
        Settings.Global.getInt(contentResolver, Settings.Global.AIRPLANE_MODE_ON, 0) != 0
        或使用 ConnectivityManagerBridge 扩展。
      files_needed: ["NetworkCriterionRegistry.kt (修改)", "strings.xml"]
      bridge_needed: false

    - id: C-APP-003
      name: "Headphone Connection"
      complexity: low
      implementation_pattern: "booleanCriterion in GlobalCriterionRegistry"
      details: |
        AudioManager.isWiredHeadsetOn() 或 AudioDeviceInfo 查询。
        API 23+: AudioManager.getDevices(GET_DEVICES_OUTPUTS) 检查 TYPE_WIRED_HEADSET/TYPE_BLUETOOTH_A2DP。
      files_needed: ["GlobalCriterionRegistry.kt (修改)", "strings.xml"]
      bridge_needed: "推荐 AudioManagerBridge"

    - id: C-PHONE-001
      name: "Call State"
      complexity: low
      implementation_pattern: "unaryEqualCriterion in GlobalCriterionRegistry"
      details: |
        TelephonyManager.getCallState() → CALL_STATE_IDLE/RINGING/OFFHOOK
        已有 EventCriterionRegistry 中 callStateChanged 事件处理的基础。
      files_needed: ["GlobalCriterionRegistry.kt (修改)", "strings.xml"]
      bridge_needed: "可选 TelephonyManagerBridge"

    - id: C-SYS-004
      name: "Dark Mode"
      complexity: low
      implementation_pattern: "booleanCriterion in GlobalCriterionRegistry"
      details: |
        context.resources.configuration.uiMode and Configuration.UI_MODE_NIGHT_MASK == UI_MODE_NIGHT_YES
        或 UiModeManager.getNightMode()。
      files_needed: ["GlobalCriterionRegistry.kt (修改)", "strings.xml"]
      bridge_needed: false

    - id: C-INT-002
      name: "Macro Running"
      complexity: medium
      implementation_pattern: "自定义 Criterion 或 booleanCriterion"
      details: |
        需要查询 LocalTaskManager 中是否有指定任务正在运行。
        需要参数: 任务名或 ID。可能需要扩展 TaskRuntime 查询接口。
      files_needed: ["GlobalCriterionRegistry.kt 或新文件", "strings.xml"]
      bridge_needed: false

# ==============================================================================
# 6. RECOMMENDED BATCH IMPLEMENTATION GROUPING
# ==============================================================================
recommended_grouping:

  group_1_settings_no_bridge:
    name: "设备设置类（直接 inline，无需 Bridge）"
    priority: 1
    estimated_file_changes: 3  # GlobalActionRegistry.kt + GlobalCriterionRegistry.kt + strings.xml
    items:
      - A-SET-002  # Auto Rotate
      - A-SET-004  # Brightness
      - A-SET-005  # Dark Theme
      - A-SET-016  # WiFi Configure
      - A-SET-033  # Torch
      - A-SET-003  # Bluetooth Configure
      - C-DEV-002  # Device Locked
      - C-SYS-004  # Dark Mode
      - C-NET-006  # Airplane Mode
      - C-PHONE-001  # Call State
      - C-APP-003  # Headphone Connection
    rationale: "全部可在已有 Registry 中用 inline lambda 实现，单次提交覆盖"

  group_2_sound_actions:
    name: "声音操作（新建 SoundActionRegistry + AudioManagerBridge）"
    priority: 2
    estimated_file_changes: 5  # AudioManagerBridge.kt + SoundActionRegistry.kt + BootstrapOptionRegistry.kt + AppletOptionFactory.kt + strings.xml
    items:
      - A-SND-001  # Volume Change
      - A-SND-006  # Silent/Vibrate Mode
      - A-SND-014  # Do Not Disturb
      - A-SND-007  # Speak Text (TTS)
