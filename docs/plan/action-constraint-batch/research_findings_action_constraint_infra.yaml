      - A-UI-007  # Toast (已有，确认无需新增)
    rationale: "需要处理 overlay window 和通知权限，复杂度较高"

  group_4_network_and_internal:
    name: "网络和内部操作"
    priority: 4
    estimated_file_changes: 5
    items:
      - A-NET-001  # HTTP Request
      - A-MEDIA-001  # Control Media
      - A-INT-001  # Enable/Disable Macro
      - A-INT-005  # Export Macros
      - C-INT-002  # Macro Running
    rationale: "各自独立，复杂度从中到高"

# ==============================================================================
# 7. KEY IMPLEMENTATION CHECKLIST (新增 Action 标准步骤)
# ==============================================================================
implementation_checklist:
  add_action_inline:
    description: "在已有 Registry 中添加 inline Action（最简路径）"
    steps:
      - "1. strings.xml 添加标题字符串（如 <string name=\"set_brightness\">设置亮度</string>）"
      - "2. 如需反转，添加 not_xxx 字符串"
      - "3. 在目标 *Registry.kt 中添加 @AppletOrdinal(next_ordinal) val xxx = appletOption(R.string.xxx) { ... }"
      - "4. 如需参数，链式调用 .withValueArgument<T>(R.string.xxx, VariantArgType.XXX)"
      - "5. 如需 Shizuku 权限，添加 .shizukuOnly()"
      - "6. 编译检查: ./gradlew :app:compileDebugKotlin"

  add_action_with_class:
    description: "添加自定义 Action 类"
    steps:
      - "1. 在 action/ 目录创建继承 SingleArgAction 或 ArgumentAction 的类"
      - "2. 实现 doAction() 方法"
      - "3. 如需自定义序列化，覆写 serializeArgumentToString / deserializeArgumentFromString"
      - "4. 在 *Registry.kt 中注册"
      - "5. strings.xml 添加字符串"

  add_new_registry:
    description: "创建全新的 Registry"
    steps:
      - "1. BootstrapOptionRegistry companion 添加 ID 常量（如 const val ID_SOUND_ACTION_REGISTRY = 0x5C）"
      - "2. 创建 XxxActionRegistry(id: Int) : AppletOptionRegistry(id)"
      - "3. BootstrapOptionRegistry 类体添加 PhantomFlow 入口 + AppletOrdinal"
      - "4. BootstrapOptionRegistry.actionFlowOptions 或 criterionFlowOptions 数组添加引用"
      - "5. AppletOptionFactory 实例化 Registry 并加入 allRegistries 数组"
      - "6. strings.xml 添加分类标题字符串"

  add_bridge:
    description: "创建系统 API Bridge"
    steps:
      - "1. 在 bridge/ 目录创建 object XxxBridge"
      - "2. private val service by lazy { ContextBridge.getContext().getSystemService(Xxx::class.java) }"
      - "3. 提供 val 属性（查询）或 fun（操作）"

# ==============================================================================
# 8. OPEN QUESTIONS & GAPS
# ==============================================================================
open_questions:
  - question: "A-UI-007 Toast Message 是否需要独立入口？"
    context: "TextActionRegistry.makeToast 已实现相同功能（overlayToastBridge.showOverlayToast）"
    type: nice_to_know
    affects: ["A-UI-007"]

  - question: "A-SND-014 Do Not Disturb 需要 NotificationPolicy access，这是否需要用户在系统设置中手动授权？"
    context: "Shizuku 可能可以绕过，但 A11y 模式下可能需要引导用户"
