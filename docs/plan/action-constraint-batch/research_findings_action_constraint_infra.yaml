plan_id: action-constraint-batch
objective: "研究 AutoPilot 项目中 Action 和 Constraint 的实现模式和基础设施，为 18 个新动作 + 6 个新约束的批量实现提供技术上下文"
focus_area: action-constraint-infrastructure
created_at: "2026-04-14"
created_by: gem-researcher
status: completed

tldr: |
  - Action/Constraint 基于 Applet 体系实现：Action 继承 Action→ArgumentAction/SingleArgAction；Criterion 继承 Criterion<T,V>
  - 简单动作仅需 1 个文件（Registry 内 inline lambda），复杂动作需 3 个文件（Bridge + Action类 + Registry注册）
  - 注册链路: Registry 字段 + @AppletOrdinal → BootstrapOptionRegistry ID常量 → AppletOptionFactory 实例化
  - 系统 API 通过 bridge/*Bridge.kt 桥接，一律用 ContextBridge.getContext() 获取系统服务
  - 当前有 12 个 ActionRegistry + 10 个 CriterionRegistry + 1 个 FlowRegistry，新增需在 BootstrapOptionRegistry 分配 ID 并注册到 AppletOptionFactory

