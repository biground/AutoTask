plan_id: action-constraint-batch
objective: |
  批量实现 AutoPilot 的 18 个新动作 + 6 个新约束：
  Group 1 (6): 设备设置开关 — Auto Rotate, Bluetooth, Brightness, Dark Theme, WiFi, Torch
  Group 2 (5): 音量与声音 — Volume Change, Play/Stop Sound, Silent/Vibrate, Speak Text, DND
  Group 3 (3): 通知与 UI — Display Notification, Display Dialog, Toast Message (验证已有)
  Group 4 (4): 网络与内部 — HTTP Request, Control Media, Enable/Disable Macro, Export Macros
  约束 (6): Device Locked, Airplane Mode, Headphone, Call State, Dark Mode, Macro Running
created_at: "2026-04-14"
created_by: gem-planner
status: pending_approval
research_confidence: high

plan_metrics:
  total_tasks: 20
  total_waves: 6
  wave_1_task_count: 3
  total_dependencies: 42
  risk_score: medium

tldr: |
  20 个任务分 6 波执行，覆盖 18 个新动作 + 6 个新约束（共 24 项功能）。
  Wave 1 (3 任务): 基础设施 — 字符串资源 60 条、权限声明、3 个新 Registry 骨架 + 2 个 Bridge 骨架。
  Wave 2 (3 任务): 简单动作+约束 — 设备设置开关 6 个 + 简单约束 5 个 + 简单声音动作 3 个，可全并行。
  Wave 3 (3 任务): 中等动作 — TTS + Play Sound + 媒体控制/Enable Macro/Macro Running 约束。
  Wave 4 (3 任务): 复杂动作 — HTTP Request + Display Notification + Display Dialog。
  Wave 5 (3 任务): 集成注册 — BootstrapOptionRegistry + AppletOptionFactory + Toast 验证 + 单测。
  Wave 6 (5 任务): Export Macros + 全量编译测试 + 提交推送 + 进度文档 + 安全审查。
  关键路径: T01→T04→T14→T17→T18。最大并行度 3 (Wave 2/3/4)。

open_questions:
  - "A-SND-014 DND 需要 NotificationPolicy access，Shizuku 模式可绕过，A11y 模式需要用户手动授权"
  - "A-UI-002 Display Dialog 的 overlay window 在 Android 16 上的行为需要运行时验证"

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "Settings.System/Global 写入需要 WRITE_SETTINGS 权限，普通 App 无法直接获取"
      likelihood: medium
      impact: high
      mitigation: "所有设置类动作标记 .shizukuOnly()，通过 Shizuku shell 执行 settings put 命令"
    - scenario: "新建 3 个 Registry 的 ID 常量与 @AppletOrdinal 冲突导致运行时路由错误"
      likelihood: low
      impact: critical
      mitigation: "T01 基础设施任务统一分配 ID，研究文件已确认 next_available: 0x5C/0x1C"
    - scenario: "TTS 引擎异步初始化超时导致 SpeakTextAction 首次调用失败"
      likelihood: medium
      impact: medium
      mitigation: "TtsBridge 使用 lazy 初始化 + CountDownLatch 等待 onInit 回调，设置 5s 超时"
    - scenario: "HttpRequestAction 未正确处理超时/SSL 证书导致宏执行阻塞"
      likelihood: medium
      impact: high
      mitigation: "使用 OkHttp 设置 connectTimeout/readTimeout 为 30s，TrustManager 可选"
    - scenario: "多个任务并行修改 strings.xml 导致合并冲突"
      likelihood: medium
      impact: medium
      mitigation: "T01 一次性预填所有字符串；后续任务只读引用，不再修改 strings.xml"
  assumptions:
    - "Android 16 (API 36) 是唯一目标平台"
    - "所有设置类操作通过 Shizuku shell 执行，不依赖 WRITE_SETTINGS 权限"
    - "OkHttp 已在项目依赖中（或可直接使用 HttpURLConnection）"
    - "TextToSpeech 引擎在大多数 Android 16 设备上可用"
    - "OverlayToastBridge 的 overlay window 模式可复用于 Dialog 实现"

implementation_specification:
  code_structure: |
    新增动作和约束分三类：
    1) 已有 Registry inline 扩展：GlobalActionRegistry (设置开关)、GlobalCriterionRegistry (约束)、
       NetworkCriterionRegistry (飞行模式)、ControlActionRegistry (Enable/Disable Macro)
    2) 新建 Registry + Bridge：
       - SoundActionRegistry (0x5C) + AudioManagerBridge — 音量/静音/DND
       - SpeakTextAction + TtsBridge — TTS
       - PlaySoundAction — 媒体播放
    3) 新建复杂 Action 类：
       - HttpRequestAction + NetworkActionRegistry (0x5E)
       - DisplayNotificationAction + NotificationManagerBridge + UiActionRegistry (0x5D)
       - DisplayDialogAction + OverlayDialogBridge
       - ExportMacrosAction

  affected_areas:
    - "app/src/main/res/values/strings.xml — 新增约 60 条字符串资源"
    - "app/src/main/AndroidManifest.xml — 新增 POST_NOTIFICATIONS + CAMERA (torch) 等权限"
    - "app/src/main/java/top/xjunz/tasker/task/applet/option/registry/GlobalActionRegistry.kt — 新增 6 个设置动作"
    - "app/src/main/java/top/xjunz/tasker/task/applet/option/registry/GlobalCriterionRegistry.kt — 新增 4 个约束"
    - "app/src/main/java/top/xjunz/tasker/task/applet/option/registry/NetworkCriterionRegistry.kt — 新增 1 个约束"
    - "app/src/main/java/top/xjunz/tasker/task/applet/option/registry/ControlActionRegistry.kt — 新增 Enable/Disable Macro"
    - "app/src/main/java/top/xjunz/tasker/task/applet/option/registry/BootstrapOptionRegistry.kt — 新增 3 个 Registry ID + PhantomFlow 入口"
    - "app/src/main/java/top/xjunz/tasker/task/applet/option/AppletOptionFactory.kt — 实例化 3 个新 Registry"
    - "app/src/main/java/top/xjunz/tasker/bridge/ — 新增 AudioManagerBridge, TtsBridge, NotificationManagerBridge, OverlayDialogBridge"
    - "app/src/main/java/top/xjunz/tasker/task/applet/option/registry/ — 新增 SoundActionRegistry, UiActionRegistry, NetworkActionRegistry"
    - "app/src/main/java/top/xjunz/tasker/task/applet/action/ — 新增 SpeakTextAction, PlaySoundAction, HttpRequestAction, DisplayNotificationAction, DisplayDialogAction, ExportMacrosAction"
    - "app/src/test/kotlin/ — 新增对应单测文件"

  component_details:
    - component: "AudioManagerBridge"
      responsibility: "封装 AudioManager 系统服务：音量控制、铃声模式、耳机检测"
      interfaces:
        - "setStreamVolume(streamType: Int, volume: Int)"
        - "getStreamMaxVolume(streamType: Int): Int"
        - "setRingerMode(mode: Int)"
        - "getRingerMode(): Int"
        - "isHeadphoneConnected(): Boolean"

    - component: "TtsBridge"
      responsibility: "封装 TextToSpeech 引擎：初始化、朗读文本、停止"
      interfaces:
        - "speak(text: String): Boolean"
        - "stop()"
        - "isReady: Boolean"

    - component: "NotificationManagerBridge"
      responsibility: "封装 NotificationManager：发送通知、DND 模式控制"
      interfaces:
        - "showNotification(title: String, content: String, channelId: String)"
        - "setInterruptionFilter(filter: Int)"

    - component: "SoundActionRegistry (0x5C)"
      responsibility: "声音操作注册表：音量、静音、DND、TTS、播放声音"
      interfaces:
        - "@AppletOrdinal(0x0000) volumeChange"
        - "@AppletOrdinal(0x0001) silentVibrateMode"
        - "@AppletOrdinal(0x0002) doNotDisturb"
        - "@AppletOrdinal(0x0003) speakText"
        - "@AppletOrdinal(0x0004) playStopSound"

    - component: "UiActionRegistry (0x5D)"
      responsibility: "UI 操作注册表：通知、对话框"
      interfaces:
        - "@AppletOrdinal(0x0000) displayNotification"
        - "@AppletOrdinal(0x0001) displayDialog"

    - component: "NetworkActionRegistry (0x5E)"
      responsibility: "网络操作注册表：HTTP 请求"
      interfaces:
        - "@AppletOrdinal(0x0000) httpRequest"

    - component: "HttpRequestAction"
      responsibility: "执行 HTTP GET/POST 请求，返回响应码和体到变量"
      interfaces:
        - "doAction(args: Array<Any?>, runtime: TaskRuntime): Boolean"
        - "参数: URL(String), Method(Int), Headers(String?), Body(String?)"
        - "结果: statusCode(Int), responseBody(String)"

    - component: "DisplayNotificationAction"
      responsibility: "创建系统通知，支持标题、内容、频道配置"
      interfaces:
        - "doAction(args, runtime): Boolean"
        - "参数: title(String), content(String), priority(Int)"

    - component: "DisplayDialogAction"
      responsibility: "通过 overlay window 显示对话框，支持标题、内容、按钮"
      interfaces:
        - "doAction(args, runtime): Boolean"
        - "参数: title(String), content(String), timeout(Int)"

  dependencies:
    - component: "SoundActionRegistry"
      relationship: "依赖 AudioManagerBridge 访问 AudioManager"
    - component: "SpeakTextAction"
      relationship: "依赖 TtsBridge 访问 TextToSpeech"
    - component: "DisplayNotificationAction"
      relationship: "依赖 NotificationManagerBridge 访问 NotificationManager"
    - component: "DisplayDialogAction"
      relationship: "依赖 OverlayDialogBridge 复用 OverlayToastBridge 的 WindowManager 模式"
    - component: "所有新 Registry"
      relationship: "注册到 BootstrapOptionRegistry + AppletOptionFactory"

  integration_points:
    - "BootstrapOptionRegistry companion — 3 个新 ID 常量 (0x5C, 0x5D, 0x5E)"
    - "BootstrapOptionRegistry.actionFlowOptions — 添加 soundActions, uiActions, networkActions"
    - "AppletOptionFactory.allRegistries — 添加 3 个新 Registry 实例"
    - "strings.xml — 所有新动作/约束的标题和描述"

