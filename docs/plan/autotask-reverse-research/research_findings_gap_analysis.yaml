      name: "宏定义"
      autotask: "✅ XTask = RootFlow(事件过滤 + 条件 + 动作)，结构为 When→Do 而非 N触发器+N动作+N约束"
      gap: "模型差异：AutoTask 是 Flow 树模型，AutoPilot 计划是扁平 触发器+动作+约束 模型"
    - id: E-002
      name: "宏启用/禁用"
      autotask: "✅ 文件名标记 + TaskStorage.toggleTaskFilename"
    - id: E-003
      name: "宏分类（Category）"
      autotask: "❌ 未实现分类系统"
