# =============================================================
# 综合总结
# =============================================================
summary:
  total_autopilot_features: 356
  total_autotask_matched: "~94"
  overall_coverage: "~26%"

  autotask_strong_areas:
    - "UI 自动化操作（控件识别、点击、滑动、文本操作等）"
    - "控制流（If/Else/Loop/WaitFor/WaitUntil）"
    - "时间条件系统（月/日/周/时分秒多维度）"
    - "Shizuku 特权模式（系统级操作）"
    - "手势录制与回放"
    - "浮动布局检查器"
    - "协程驱动的事件分发架构"

  autotask_weak_areas:
    - "设备控制动作（33 项中仅实现 3 项）"
    - "触发器多样性（103 项计划仅覆盖 ~12%）"
    - "通讯能力（电话/短信/邮件全部缺失）"
    - "传感器/硬件键触发器（全部缺失）"
    - "位置/地理围栏（全部缺失）"
    - "音量/声音控制（14 项仅实现振动）"
    - "网络动作（HTTP 请求等全部缺失）"
    - "媒体控制（全部缺失）"

  autopilot_unique_requirements:
    - "完整变量系统（Dictionary/Array/持久化/魔术变量）"
    - "表达式引擎（数学/字符串/JSON/数组操作）"
    - "自定义 UI Scene 系统"
    - "宏间调用 (Macro Run) 和可复用动作块 (Action Block)"
    - "HTTP 请求/Server/Webhook"
    - "TTS 语音/录音"
    - "OCR 文字识别"
    - "日历/天气/地理围栏集成"
    - "PC/Web 端宏编辑器同步"

  autotask_unique_capabilities_to_preserve:
    - "Applet 树模型的灵活嵌套（比扁平模型更强大）"
    - "Shizuku + A11y 双模式架构"
    - "浮窗布局检查器 (Inspector)"
    - "手势录制/回放系统"
    - "协程+事件驱动的低资源占用架构"
    - "CRC32 校验 + Parcelable IPC"
