  control_flow:
    - id: CF-001
      name: "If / Else"
      autotask: "✅ If / ElseIf / Else"
    - id: CF-002
      name: "If Confirmed Then"
      autotask: "❌ 无弹窗确认"
    - id: CF-003
      name: "Repeat 循环"
      autotask: "✅ Repeat/Loop"
    - id: CF-004
