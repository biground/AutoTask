plan_id: autotask-reverse-research
objective: "对比 AutoTask 已实现功能 vs AutoPilot feature-taxonomy.md 计划功能，找出差异"
focus_area: "功能覆盖差异分析"
created_at: "2026-04-09"
created_by: gem-researcher
status: completed

tldr: |
  - AutoPilot 计划 356 项原子功能，AutoTask 实际实现约 94 项（覆盖率 ~26%）
  - AutoTask 的核心引擎 + UI 自动化能力较强，但缺失大量设备控制、通讯、传感器、媒体等功能
  - AutoPilot 独有的关键差异：完整变量系统(Dictionary/Array/持久化)、表达式引擎、自定义 UI Scene、HTTP 网络动作、宏间调用、Action Block
  - AutoTask 独有能力：浮动布局检查器(Inspector)、手势录制回放、Shizuku 特权模式的深度系统集成

# =============================================================
# 对照结构：按 feature-taxonomy.md 分类逐项对比
# =============================================================

# ─────────────────────────────────────────────────────────────
# 一、核心引擎 (Engine Core)
# ─────────────────────────────────────────────────────────────
engine_core_comparison:
