  - id: T06
    title: "注册 NotificationEventDispatcher + 创建 AutoPilotNotificationListenerService"
    description: |
      1. 在 AutomatorService.initEventDispatcher() 中注册 NotificationEventDispatcher
      2. 创建 AutoPilotNotificationListenerService，桥接系统通知到 NotificationEventDispatcher

      **Part 1: AutomatorService 注册**

      在 `AutomatorService.kt` 的 initEventDispatcher() 中，在 `IntentEventDispatcher()` 注册之后添加:
      ```kotlin
      eventDispatcher.registerEventDispatcher(NotificationEventDispatcher())
      ```

      **Part 2: AutoPilotNotificationListenerService**

      新建 `app/src/main/java/top/xjunz/tasker/service/AutoPilotNotificationListenerService.kt`:
      ```kotlin
      package top.xjunz.tasker.service

      import android.service.notification.NotificationListenerService
      import android.service.notification.StatusBarNotification

      class AutoPilotNotificationListenerService : NotificationListenerService() {
          companion object {
              @Volatile
              var isConnected: Boolean = false
                  private set
          }

          override fun onListenerConnected() {
              isConnected = true
          }

          override fun onListenerDisconnected() {
              isConnected = false
          }

          override fun onNotificationPosted(sbn: StatusBarNotification?) {
              if (sbn == null) return
              val notification = sbn.notification ?: return
              val extras = notification.extras ?: return

              val packageName = sbn.packageName ?: return
              // 过滤自身通知
              if (packageName == applicationContext.packageName) return

              val title = extras.getCharSequence("android.title")?.toString()
              val text = extras.getCharSequence("android.text")?.toString()
              val subText = extras.getCharSequence("android.subText")?.toString()
              val postTime = sbn.postTime

              // 查找已注册的 NotificationEventDispatcher 并分发
              val service = AutomatorServiceStarter.service ?: return
              val dispatchers = service.eventDispatcher.dispatchers
              dispatchers.filterIsInstance<NotificationEventDispatcher>().firstOrNull()
                  ?.handleNotificationPosted(packageName, title, text, subText, postTime)
          }

          override fun onNotificationRemoved(sbn: StatusBarNotification?) {
              // MVP 暂不处理通知移除事件
          }
      }
      ```

      **安全考虑**:
      - 过滤自身通知（防止循环）
      - null 参数防护
      - @Volatile isConnected 线程安全

