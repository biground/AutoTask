  - id: T05
    title: "更新 EventFilter — NOTIFICATION_RECEIVED 分支使用增强 Referent"
    description: |
      更新 EventFilter.apply() 中的 NOTIFICATION_RECEIVED 分支，
      从 NotificationEventDispatcher 来的 Event 中提取通知详情，
      构造增强版 NotificationReferent。

      **当前代码** (`EventFilter.kt`, 约第 48 行):
      ```kotlin
      Event.EVENT_ON_NOTIFICATION_RECEIVED, Event.EVENT_ON_TOAST_RECEIVED -> {
          NotificationReferent(ComponentInfoWrapper.wrap(hit.componentInfo)).asResult()
      }
      ```

      **修改后**:
      ```kotlin
      Event.EVENT_ON_NOTIFICATION_RECEIVED -> {
          // 检查是否有详情 extras（来自 NotificationEventDispatcher）
          val hasDetailedExtras = hit.extras.size() > 0
          if (hasDetailedExtras) {
              NotificationReferent(
                  componentInfo = ComponentInfoWrapper.wrap(hit.componentInfo),
                  title = hit.getExtra(NotificationEventDispatcher.EXTRA_NOTIF_TITLE),
                  text = hit.getExtra(NotificationEventDispatcher.EXTRA_NOTIF_TEXT),
                  subText = hit.getExtra(NotificationEventDispatcher.EXTRA_NOTIF_SUB_TEXT),
                  postTime = hit.getExtra(NotificationEventDispatcher.EXTRA_NOTIF_POST_TIME)
              ).asResult()
          } else {
              // 兼容 A11yEventDispatcher 的旧路径
              NotificationReferent(ComponentInfoWrapper.wrap(hit.componentInfo)).asResult()
          }
      }
      Event.EVENT_ON_TOAST_RECEIVED -> {
          NotificationReferent(ComponentInfoWrapper.wrap(hit.componentInfo)).asResult()
      }
      ```

