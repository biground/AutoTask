tldr: |
  本计划包含 11 个任务，分 4 个 Wave 并行执行。
  Wave 1: 4 个独立基础任务（NotificationReferent 增强、NotificationEventDispatcher、
           shortcuts.xml、ShortcutActivity）
  Wave 2: 3 个依赖任务（EventFilter 更新、AutomatorService 注册、Manifest 声明）
  Wave 3: 2 个集成任务（PermissionGuideDialog 扩展、动态快捷方式）
  Wave 4: 2 个验证任务（全量编译+单测通过、安全审查）

  AND-003 通知监听采用独立 NotificationEventDispatcher 模式（参照 SmsEventDispatcher），
  从 NotificationListenerService 桥接事件到引擎。现有 NotificationReferent 仅包装
  ComponentInfoWrapper，需增强为包含 title/text/subText/postTime 的完整引用。

  WIDGET-003 App Shortcut 实现静态快捷方式（shortcuts.xml）+ ShortcutActivity 路由，
  可选动态快捷方式（ShortcutHelper）。

