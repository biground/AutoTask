    title: "ShortcutHelper — 动态快捷方式管理（可选增强）"
    description: |
      创建 ShortcutHelper 工具类，为最近使用的宏创建动态快捷方式。

      **实现内容**:
      1. 新建 `app/src/main/java/top/xjunz/tasker/ui/widget/ShortcutHelper.kt`:
         ```kotlin
         package top.xjunz.tasker.ui.widget

         import android.content.Context
         import android.content.Intent
         import androidx.core.content.pm.ShortcutInfoCompat
         import androidx.core.content.pm.ShortcutManagerCompat
         import androidx.core.graphics.drawable.IconCompat
         import top.xjunz.tasker.R
         import top.xjunz.tasker.engine.task.XTask
         import top.xjunz.tasker.ui.main.ShortcutActivity

         object ShortcutHelper {
             private const val MAX_DYNAMIC_SHORTCUTS = 3

             fun updateRecentMacroShortcuts(context: Context, tasks: List<XTask>) {
                 val shortcuts = tasks.take(MAX_DYNAMIC_SHORTCUTS).map { task ->
                     ShortcutInfoCompat.Builder(context, "macro_${task.checksum}")
                         .setShortLabel(task.metadata.title.ifEmpty { "未命名宏" })
                         .setIcon(IconCompat.createWithResource(context, R.drawable.ic_play_arrow_24px))
                         .setIntent(Intent(context, ShortcutActivity::class.java).apply {
                             action = "top.xjunz.tasker.ACTION_RUN_MACRO"
                             putExtra("macro_checksum", task.checksum)
                         })
                         .build()
                 }
                 ShortcutManagerCompat.setDynamicShortcuts(context, shortcuts)
             }

             fun removeAllDynamicShortcuts(context: Context) {
                 ShortcutManagerCompat.removeAllDynamicShortcuts(context)
             }
         }
         ```
