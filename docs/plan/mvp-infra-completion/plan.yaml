  - id: T01
    title: "实现 Battery Level 触发器 (T-PWR-002)"
    description: |
      新建 BatteryEventDispatcher 监听 ACTION_BATTERY_CHANGED 广播，当电量变化时分发事件。
      具体步骤：
      1. 在 Event.kt companion object 中新增 EVENT_ON_BATTERY_LEVEL_CHANGED = 36
      2. 新建 BatteryReferent 数据类，持有 batteryLevel: Int（电量百分比 0-100）
      3. 新建 BatteryEventDispatcher：
         - 注册 BroadcastReceiver 监听 Intent.ACTION_BATTERY_CHANGED
         - 从 Intent extras 解析 BatteryManager.EXTRA_LEVEL 和 EXTRA_SCALE 计算百分比
         - 添加 debounce：记录 lastLevel，仅当电量变化 ≥1% 时才分发事件
         - 分发 Event.obtain(EVENT_ON_BATTERY_LEVEL_CHANGED) 并附带 BatteryReferent
      4. 在 EventCriterionRegistry 末尾新增 @AppletOrdinal(0x0029) batteryLevelChanged
         - eventFilterOption(Event.EVENT_ON_BATTERY_LEVEL_CHANGED, R.string.on_battery_level_changed)
         - .withResult<BatteryReferent>(R.string.on_battery_level_changed)
         - .withResult<Int>(R.string.battery_level)
      5. 在 strings.xml 添加 on_battery_level_changed 和 battery_level 字符串
      6. 编写 BatteryEventDispatcherTest 单测（纯 JVM，提取 handleAction 为 internal 方法）
      参考 PowerEventDispatcher 的实现模式。
