        - "isBatteryOptimizationIgnored(): Boolean — 检查当前白名单状态"

    - component: "PermissionGuideDialog"
      responsibility: "分步引导用户授予特殊权限（A11y / 电池优化 / DND / Overlay / Settings.Write）"
      interfaces:
        - "show(fragmentManager) — 显示引导对话框"
        - "checkPermission(type: PermissionType): Boolean"

    - component: "OnboardingFragment"
      responsibility: "首次启动引导：欢迎 → 功能介绍 → 权限申请 → 完成"
      interfaces:
        - "ViewPager2 + 3-4 个引导页"
        - "完成后标记 isOnboardingCompleted = true"

    - component: "VariableManagerDialog"
      responsibility: "变量管理 UI：变量列表、搜索过滤、编辑/删除变量"
      interfaces:
        - "show(fragmentManager) — 显示变量管理对话框"
        - "RecyclerView + SearchView + VariableRepository 交互"

  dependencies:
    - component: "BatteryEventDispatcher"
