objective: |
  完成 MVP 收尾批次 A 的 8 个高优先级任务，将 MVP 完成度从 83% 提升到 ~95%。
  涵盖：Battery Level 触发器、Write to File 动作、前台服务保活通知、电池优化白名单引导、
