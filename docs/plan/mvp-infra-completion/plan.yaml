  component_details:
    - component: "BatteryEventDispatcher"
      responsibility: "监听 ACTION_BATTERY_CHANGED 广播，分发 EVENT_ON_BATTERY_LEVEL_CHANGED 事件并附带电量百分比到 BatteryReferent"
      interfaces:
        - "handleAction(intent: Intent?) — 解析电量并分发事件"
        - "onRegistered() — 注册 BroadcastReceiver"
        - "destroy() — 注销 BroadcastReceiver"

    - component: "BatteryReferent"
      responsibility: "持有电量值的引用，供 EventFilter 的 withResult 消费"
      interfaces:
        - "batteryLevel: Int — 当前电量百分比"

    - component: "FileAction.ACTION_WRITE"
      responsibility: "将内容写入文件（覆盖或追加模式），带 path traversal 防护"
      interfaces:
        - "doAction(filePath: String, content: String, mode: Int) — mode: 0=OVERWRITE, 1=APPEND"

    - component: "ForegroundNotificationManager"
      responsibility: "管理前台服务通知：创建通知频道、构建通知（运行状态/宏计数/暂停恢复按钮）、更新通知"
      interfaces:
        - "createNotificationChannel()"
        - "buildForegroundNotification(activeMacroCount: Int, isPaused: Boolean): Notification"
        - "updateNotification(activeMacroCount: Int, isPaused: Boolean)"

    - component: "BatteryOptimizationGuideDialog"
      responsibility: "引导用户将 App 加入电池优化白名单"
      interfaces:
