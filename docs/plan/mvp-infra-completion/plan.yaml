           c) DND 权限 — NotificationManager.isNotificationPolicyAccessGranted()
              → ACTION_NOTIFICATION_POLICY_ACCESS_SETTINGS
           d) Overlay 权限 — Settings.canDrawOverlays()
              → ACTION_MANAGE_OVERLAY_PERMISSION
           e) Settings.Write — Settings.System.canWrite()
              → ACTION_MANAGE_WRITE_SETTINGS
         - 每项有 "前往设置" 按钮，跳转到对应系统设置
         - onResume 刷新所有权限状态
      2. 创建 dialog_permission_guide.xml + item_permission_guide.xml 布局
      3. 在 strings.xml 添加每项权限的标题和描述
