tldr: |
  12 个任务分 5 波执行，覆盖 8 个 MVP 缺口功能。
  Wave 1 (5 任务): 引擎层 + 权限引导 — Battery Level 触发器 + Write to File 动作 + 前台服务保活通知 + 电池优化白名单引导 + 特殊权限引导对话框，可全并行。
  Wave 2 (3 任务): UI 功能 + 引导流程 — 首次启动引导流程 (T06 依赖 T05) + 变量管理界面 + 日志查看器完善，T07∥T08 并行。
  Wave 3 (1 任务): 集成注册 — BatteryEventDispatcher 注册到 AutomatorService + strings.xml 汇总。
  Wave 4 (1 任务): 全量验证 — 全量编译 + 全量测试。
  Wave 5 (2 任务): 收尾 — 提交推送 + 进度文档更新。
  关键路径: T05→T06→T09→T10→T11→T12。最大并行度 5 (Wave 1)。

open_questions:
  - "Android 16 前台服务的 foregroundServiceType 是否需要额外声明（当前已有 specialUse|location）"
  - "首次启动引导是否需要单独的 OnboardingActivity 还是可以用 Dialog/Fragment 实现"
  - "EventCriterionRegistry 中 0x0012 networkUnavailable 引用了错误的事件常量（应为独立 bugfix，不在本计划范围内）"

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "BatteryEventDispatcher 注册 ACTION_BATTERY_CHANGED 后频繁触发（电量每变化 1% 都会触发），导致宏密集执行"
      likelihood: medium
      impact: medium
      mitigation: "添加 debounce 机制：记录上次触发的电量值，仅当电量变化超过阈值时才分发事件"
    - scenario: "Write to File 未做路径校验导致 path traversal 安全漏洞"
      likelihood: medium
      impact: high
      mitigation: "FileAction.writeFile 必须使用 canonicalPath 规范化路径 + 允许目录白名单验证，限制在 app 私有目录或用户指定的安全目录内"
    - scenario: "前台服务通知在 Android 16 上因 POST_NOTIFICATIONS 权限未授予而无法显示"
      likelihood: medium
      impact: high
      mitigation: "在启动前台服务前检查 POST_NOTIFICATIONS 权限状态，引导用户授权"
    - scenario: "首次启动引导流程与 A11yAutomatorService 的生命周期冲突"
      likelihood: low
      impact: medium
      mitigation: "引导流程完全在 MainActivity 中执行，不依赖 Service 状态"
    - scenario: "多个 UI 任务并行修改 Fragment/Activity 导致 navigation 冲突"
      likelihood: low
      impact: low
      mitigation: "Wave 2/3 中 UI 任务各自独立文件，不共享 Fragment/Activity 代码"
  assumptions:
    - "Android 16 (API 36) 是唯一目标平台"
    - "POST_NOTIFICATIONS 权限已在 AndroidManifest.xml 中声明"
    - "A11yAutomatorService 的 foregroundServiceType='specialUse|location' 已满足前台服务要求"
    - "ViewPager2 + MaterialDesign Tab 已在项目依赖中"
    - "VariableRepository 接口已稳定可用（变量系统 100% 完成）"

