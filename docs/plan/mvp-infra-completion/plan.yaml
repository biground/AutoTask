    description: |
      创建 ForegroundNotificationManager 管理前台服务通知。
      具体步骤：
      1. 新建 ForegroundNotificationManager (object 单例)：
         - createNotificationChannel(): 创建 "autopilot_service" 通知频道 (IMPORTANCE_LOW)
