  - id: T02
    title: "实现 Write to File 动作 (A-DATA-002)"
    description: |
      在 FileActionRegistry 中添加 writeFile 动作，支持覆盖和追加两种写入模式。
      具体步骤：
      1. 补全 FileAction.kt 中已有的 ACTION_WRITE = 3 的空 apply() 分支实现（常量已存在，当前为空实现）
      2. 在 FileAction.doAction 的 when 分支中实现 ACTION_WRITE 处理：
         - 参数 0: filePath(String) — 目标文件路径
         - 参数 1: content(String) — 写入内容
         - 参数 2: mode(Int) — 0=OVERWRITE, 1=APPEND
         - 安全检查: filePath 不含 ".." 且不以 "/" 开头时自动加上 app 数据目录前缀
         - Shizuku shell: echo/cat 重定向写入
      3. 在 FileActionRegistry 末尾新增 @AppletOrdinal(0x0004) writeFile：
         - appletOption(R.string.format_write_file) { FileAction(FileAction.ACTION_WRITE) }
         - .withUnaryArgument<String>(R.string.file_path, R.string.file, VariantArgType.TEXT_FILE_PATH)
         - .withUnaryArgument<String>(R.string.file_content, R.string.content)
         - .withUnaryArgument<Int>(R.string.write_mode, R.string.write_mode) — 选项: 覆盖/追加
         - .shizukuOnly()
      4. 在 strings.xml 添加 format_write_file、file_content、write_mode、write_mode_overwrite、write_mode_append 字符串
      5. 编写 FileActionWriteTest 单测（验证路径安全检查逻辑）
