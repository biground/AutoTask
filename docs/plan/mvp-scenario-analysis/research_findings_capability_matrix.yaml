# ============================================================
# 发现的模式
# ============================================================
patterns_found:
  - category: architecture
    pattern: "事件分发链路完整闭环"
    description: "每个能力都遵循 EventDispatcher → EventFilter → Referent 链路，新功能可复用此模式"
    examples:
      - file: ModeChangeEventDispatcher.kt
        location: "ModeChangeEventDispatcher.kt:22"
        snippet: "class ModeChangeEventDispatcher : EventDispatcher()"
      - file: EventFilter.kt
        location: "EventFilter.kt:~145"
        snippet: "EVENT_ON_MODE_CHANGED -> ModeChangeReferent(...).asResult()"
    prevalence: common

  - category: architecture
    pattern: "触发器与动作分离"
    description: "AlarmEventDispatcher 仅用于触发事件（闹钟响时触发宏），不具备'设定闹钟'的动作能力。触发器和动作是两套独立体系"
    examples:
      - file: AlarmEventDispatcher.kt
        location: "AlarmEventDispatcher.kt:25"
        snippet: "class AlarmEventDispatcher : EventDispatcher() — 只分发 EVENT_ON_ALARM_FIRED"
    prevalence: common

  - category: architecture
    pattern: "变量系统可作为状态桥梁"
    description: "VariableRepository + SetVariableAction + VariableConstraint 组合可模拟状态标记、计数器、跨宏通信"
    examples:
      - file: SetVariableAction.kt
        location: "SetVariableAction.kt:26"
        snippet: "class SetVariableAction : ArgumentAction()"
      - file: VariableConstraint.kt
        location: "VariableConstraint.kt:22"
        snippet: "class VariableConstraint : Applet()"
    prevalence: common

# ============================================================
# 开放问题
# ============================================================
open_questions:
  - question: "SetAlarmAction 应使用 AlarmClock.ACTION_SET_ALARM Intent 还是 AlarmManager.setAlarmClock()？"
    context: "前者调用系统闹钟应用（用户可见），后者为系统级 API（需额外权限，更静默）"
    type: decision_blocker
    affects: ["A2-设定闹钟动作"]

  - question: "模式激活历史是否引入 ModeHistoryRepository，还是用变量系统 workaround？"
    context: "workaround 方案可完全用现有组件实现但需额外宏；正式方案更优雅但工作量更大"
    type: decision_blocker
    affects: ["C1-今天是否激活过某模式", "C2-每日仅一次频率限制"]

  - question: "微信自动化脚本的维护策略？"
    context: "微信 UI 结构可能随版本更新变化，需评估是否提供预置模板还是完全由用户编排"
    type: research
    affects: ["A8-打开微信发送消息"]

# ============================================================
# 研究缺口
# ============================================================
gaps:
  - area: "设定系统闹钟动作"
    description: "代码库中无 SetAlarmAction，AlarmEventDispatcher 仅为触发器。需新建动作组件"
    impact: decision_blocker
    affects: ["宏3"]

  - area: "模式激活历史"
    description: "ModeRepository 不记录历史状态，无法查询'今天是否激活过'"
    impact: research_blocker
    affects: ["宏6"]

  - area: "执行频率限制"
    description: "引擎无内置 rate limit / daily quota 机制"
    impact: research_blocker
    affects: ["宏6"]

  - area: "微信消息高级封装"
    description: "基础 UI 自动化能力齐全但无预置微信步骤模板"
    impact: nice_to_know
    affects: ["宏6"]
