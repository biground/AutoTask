plan_id: variable-mode-system
objective: |
  为 AutoPilot 项目实现完整的变量系统（Variable System）和模式系统（Mode System），
  包括类型化变量存储、CRUD 动作、约束条件、变量变化触发器、魔术变量、
  完整 AST 表达式引擎、独立 Mode 实体与状态管理。
created_at: "2026-04-09"
created_by: "gem-planner"
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 4
  total_dependencies: 38
  risk_score: medium

tldr: |
  26 个原子任务，分 6 波执行（W1 基础 → W2 存储/动作/词法 → W3 约束/解析/触发/模式 → W4 求值/模式Applet → W5 注册集成 → W6 端到端测试）。
  变量存储层（Variable + VariableRepository + DataStore）是所有功能的根基（W1）。
  表达式引擎（Lexer→Parser→Evaluator）与变量 CRUD 并行推进，内部串行（W2→W3→W4）。
  模式系统作为独立实体，依赖变量存储层但不依赖表达式引擎（W1→W2→W3→W4）。
  W5 完成所有 Registry 注册到 BootstrapOptionRegistry + AppletOptionFactory + Referent 桥接。
  W6 端到端集成测试验证全链路。

open_questions: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "表达式引擎 Parser 实现复杂度超预期，递归下降解析器处理运算符优先级/嵌套括号/函数调用可能引入大量边界情况"
      likelihood: medium
      impact: high
      mitigation: "采用 Pratt Parser（自顶向下运算符优先级解析），比经典递归下降更适合表达式语法；先覆盖核心运算符，函数调用作为扩展点"
    - scenario: "DataStore Preferences 对复杂类型序列化支持有限，变量值的多态序列化（Bool/Int/Decimal/String）可能需要自定义序列化方案"
      likelihood: medium
      impact: medium
      mitigation: "变量值统一序列化为 JSON 字符串存入 DataStore，读取时根据 VariableType 反序列化；或使用 Proto DataStore"
    - scenario: "新增的全局 VariableRepository 与现有 Referent/Reference 系统产生冲突，尤其在 TaskRuntime 作用域管理上"
      likelihood: low
      impact: high
      mitigation: "新变量系统作为独立层叠加在 Referent 之上，通过 VariableReferent 适配器桥接；不修改现有 Referent 接口"
    - scenario: "VariableChangeEventDispatcher 的事件分发时机与 TaskRuntime 生命周期不匹配，导致变量变化触发器无法正确触发"
      likelihood: medium
      impact: high
      mitigation: "VariableChangeEventDispatcher 使用独立的协程通道广播变化事件，与现有 Event 分发机制并行"
    - scenario: "模式系统的互斥语义（同时只能激活一个模式 or 可叠加）设计不清，导致后续扩展困难"
      likelihood: low
      impact: medium
      mitigation: "MVP 阶段采用简单互斥模式（同时只有一个活跃模式），数据模型预留 exclusive_group 字段支持未来叠加模式"
  assumptions:
    - "DataStore Preferences 足以满足变量持久化需求（用户设计决策已确认）"
    - "模式系统作为独立实体设计（用户设计决策已确认），不是特殊变量"
    - "表达式引擎采用完整 AST 解析+求值（用户设计决策已确认）"
    - "所有新代码使用 Kotlin，遵循项目现有的 JUnit 4 测试风格"
    - "新增的 Registry ID 不会与现有 BootstrapOptionRegistry 中的 ID 冲突"
    - "tasker-engine 模块可以添加 DataStore 依赖（纯引擎模块引入 AndroidX DataStore）"
    - "MVP 阶段不包含 Dictionary/Array 类型、变量管理 UI、模式管理 UI"

implementation_specification:
  code_structure: |
    新增两个包层级：
    1. tasker-engine 引擎层：
       - top.xjunz.tasker.engine.variable — 变量数据模型、Repository 接口、内存实现
       - top.xjunz.tasker.engine.expression — 表达式引擎（Token、Lexer、AST、Parser、Evaluator）
       - top.xjunz.tasker.engine.mode — 模式数据模型、Repository 接口、内存实现
    2. app 应用层：
       - top.xjunz.tasker.task.variable — DataStore 持久化 Repository、魔术变量实现、变量变化事件分发
       - top.xjunz.tasker.task.mode — DataStore 持久化 Mode Repository、模式变化事件分发
       - top.xjunz.tasker.task.applet.action — SetVariableAction、DeleteVariableAction、SetModeAction
       - top.xjunz.tasker.task.applet.criterion — VariableConstraint、CompareValuesConstraint、ModeConstraint
       - top.xjunz.tasker.task.applet.option.registry — VariableActionRegistry、VariableCriterionRegistry、ModeRegistry

  affected_areas:
    - "tasker-engine/src/main/java/top/xjunz/tasker/engine/ — 新增 variable/、expression/、mode/ 包"
    - "tasker-engine/src/main/java/top/xjunz/tasker/engine/runtime/Event.kt — 新增事件常量"
    - "tasker-engine/build.gradle — 新增 DataStore 依赖"
    - "app/src/main/java/top/xjunz/tasker/task/ — 新增 variable/、mode/ 包"
    - "app/src/main/java/top/xjunz/tasker/task/applet/action/ — 新增变量/模式动作"
    - "app/src/main/java/top/xjunz/tasker/task/applet/criterion/ — 新增变量/模式约束"
    - "app/src/main/java/top/xjunz/tasker/task/applet/option/registry/ — 新增注册表 + 修改 BootstrapOptionRegistry、AppletOptionFactory"
    - "app/build.gradle — 新增 DataStore 依赖"
    - "tasker-engine/src/test/ — 新增变量、表达式、模式单元测试"
    - "app/src/test/ — 新增应用层单元测试"

  component_details:
    - component: "Variable 数据模型"
      responsibility: "定义类型化变量的数据结构、类型枚举、作用域枚举"
      interfaces:
        - "data class Variable(id: String, name: String, type: VariableType, value: Any?, scope: VariableScope, persisted: Boolean)"
        - "enum class VariableType { BOOLEAN, INTEGER, DECIMAL, STRING }"
        - "enum class VariableScope { GLOBAL, LOCAL }"

    - component: "VariableRepository"
      responsibility: "变量的 CRUD 操作接口 + 变化通知"
      interfaces:
        - "fun getVariable(name: String): Variable?"
        - "fun setVariable(variable: Variable)"
        - "fun deleteVariable(name: String): Boolean"
        - "fun getAllVariables(): List<Variable>"
        - "fun observeChanges(): Flow<VariableChangeEvent>"

    - component: "Expression Engine"
      responsibility: "将表达式字符串解析为 AST 并求值"
      interfaces:
        - "fun Lexer.tokenize(input: String): List<Token>"
        - "fun Parser.parse(tokens: List<Token>): AstNode"
        - "fun Evaluator.evaluate(node: AstNode, context: EvaluationContext): Any?"

    - component: "Mode 实体"
      responsibility: "定义独立的应用模式数据模型和状态管理"
      interfaces:
        - "data class Mode(id: String, name: String, icon: String?, color: Int?, isActive: Boolean)"
        - "fun ModeRepository.getActiveMode(): Mode?"
        - "fun ModeRepository.setActiveMode(modeId: String)"
        - "fun ModeRepository.observeChanges(): Flow<ModeChangeEvent>"

    - component: "Applet 注册表"
      responsibility: "将新的变量/模式动作和约束注册到引擎的插件系统"
      interfaces:
        - "class VariableActionRegistry : AppletOptionRegistry(ID)"
        - "class VariableCriterionRegistry : AppletOptionRegistry(ID)"
        - "class ModeRegistry : AppletOptionRegistry(ID)"

  dependencies:
    - component: "VariableRepository"
      relationship: "被 SetVariableAction、DeleteVariableAction、VariableConstraint、CompareValuesConstraint、VariableChangeEventDispatcher 使用"
    - component: "Expression Engine"
      relationship: "被 SetVariableAction 调用（表达式作为值来源），被 CompareValuesConstraint 调用（表达式作为比较值）"
    - component: "ModeRepository"
      relationship: "被 SetModeAction、ModeConstraint、ModeChangeTrigger 使用"
    - component: "VariableReferent"
      relationship: "适配器模式桥接新变量系统与现有 Referent/Reference 系统"

  integration_points:
    - "BootstrapOptionRegistry — 新增 ID 常量注册变量/模式 Registry"
    - "AppletOptionFactory — 实例化并注册新 Registry 到 allRegistries"
    - "Event.kt — 新增 EVENT_ON_VARIABLE_CHANGED 和 EVENT_ON_MODE_CHANGED 事件常量"
    - "EventCriterionRegistry — 注册变量变化和模式变化事件过滤器"
    - "TaskRuntime — 通过 VariableReferent 适配器支持变量引用"

