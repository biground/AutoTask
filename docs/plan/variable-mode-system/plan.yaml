  - id: "T13"
    title: "Expression AST 节点类型 + Parser 语法解析器"
    description: |
      创建表达式引擎的语法解析阶段：
      1. 创建 AstNode sealed class 层级：
         - AstNode.NumberLiteral(val value: Double)
         - AstNode.StringLiteral(val value: String)
         - AstNode.BooleanLiteral(val value: Boolean)
         - AstNode.VariableRef(val name: String)
         - AstNode.BinaryOp(val operator: String, val left: AstNode, val right: AstNode)
         - AstNode.UnaryOp(val operator: String, val operand: AstNode)
         - AstNode.FunctionCall(val name: String, val arguments: List<AstNode>)
         - AstNode.MemberAccess(val obj: AstNode, val member: String)
      2. 创建 Parser 类（Pratt Parser / 运算符优先级解析）：
         - fun parse(tokens: List<Token>): AstNode
         - 运算符优先级（从低到高）：||, &&, ==|!=, <|>|<=|>=, +|-, *|/|%, !（一元）
         - 支持括号分组
         - 支持函数调用：name(arg1, arg2, ...)
      3. 编写单元测试：
         - "1 + 2 * 3" → BinaryOp(+, 1, BinaryOp(*, 2, 3))（优先级正确）
         - "(1 + 2) * 3" → BinaryOp(*, BinaryOp(+, 1, 2), 3)（括号正确）
         - "!true && false" → BinaryOp(&&, UnaryOp(!, true), false)
         - "${x} + 1" → BinaryOp(+, VariableRef(x), 1)
         - "len(\"hello\")" → FunctionCall(len, [StringLiteral(hello)])

