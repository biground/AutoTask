         - Token.BooleanLiteral(val value: Boolean)
         - Token.Identifier(val name: String) — 变量名或函数名
         - Token.Operator(val symbol: String) — +, -, *, /, %, ==, !=, <, >, <=, >=, &&, ||, !
         - Token.LeftParen, Token.RightParen
