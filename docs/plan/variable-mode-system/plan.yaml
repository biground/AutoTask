  - id: "T22"
    title: "Expression Evaluator 表达式求值器"
    description: |
      创建表达式引擎的求值阶段：
      1. 创建 EvaluationContext 类：
         - variableRepository: VariableRepository — 用于解析变量引用
         - magicVariableRegistry: MagicVariableRegistry — 用于解析魔术变量
      2. 创建 BuiltinFunctions 对象：
         - 注册内置函数：
           - len(str): Int — 字符串长度
           - upper(str): String — 大写
           - lower(str): String — 小写
           - substr(str, start, end): String — 子字符串
           - round(num): Int — 四舍五入
           - floor(num): Int — 向下取整
           - ceil(num): Int — 向上取整
           - abs(num): Double — 绝对值
           - now(): Long — 当前时间戳
           - str(any): String — 转字符串
      3. 创建 Evaluator 类：
         - fun evaluate(node: AstNode, context: EvaluationContext): Any?
         - NumberLiteral → value
         - StringLiteral → value
         - BooleanLiteral → value
         - VariableRef → context.variableRepository.getVariable(name)?.value
         - BinaryOp → 根据运算符类型计算（+, -, *, /, %, ==, !=, <, >, <=, >=, &&, ||）
           - 数值运算：Double 精度
           - 字符串 +：拼接
           - 比较运算：支持数值和字符串
           - 逻辑运算：短路求值
         - UnaryOp → !（布尔取反）, -（数值取负）
         - FunctionCall → 从 BuiltinFunctions 查找并调用
      4. 编写单元测试：
         - "1 + 2" → 3.0
         - "\"hello\" + \" world\"" → "hello world"
         - "${x} * 2" (x=5) → 10.0
