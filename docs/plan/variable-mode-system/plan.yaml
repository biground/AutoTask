         - 处理标识符（函数名、变量名）
      3. 编写单元测试：
         - "1 + 2" → [Number(1), Operator(+), Number(2)]
         - "${myVar} * 3.14" → [VariableRef(myVar), Operator(*), Number(3.14)]
         - "len(\"hello\")" → [Identifier(len), LeftParen, StringLiteral(hello), RightParen]
         - 边界：空输入、非法字符

