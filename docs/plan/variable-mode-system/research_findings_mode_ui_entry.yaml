plan_id: variable-mode-system
objective: |
  调查 app 中"模式"(Mode) 系统的 UI 入口，确认用户是否能通过界面创建/管理预设模式。
focus_area: mode-ui-entry
created_at: "2026-04-13"
created_by: "gem-researcher"
status: completed

tldr: |
  - 模式系统的后端（Mode 数据模型、ModeRepository、SetModeAction、ModeConstraint、ModeChangeEventDispatcher）已全部实现完毕
  - **不存在独立的模式管理 UI**——没有任何 Activity、Fragment、Dialog、BottomSheet 用于创建/编辑/删除模式
  - 模式功能仅能通过任务编辑器（FlowEditorDialog）中的 Applet 组件间接使用：SetModeAction（动作）和 ModeConstraint（约束）
  - 计划文件 (plan.yaml) 明确声明 "MVP 阶段不包含……模式管理 UI"，这是设计决策而非遗漏
  - AppletOptionFactory 中 modeRepository 使用 InMemoryModeRepository（运行时空仓库），没有任何代码预填充模式数据

