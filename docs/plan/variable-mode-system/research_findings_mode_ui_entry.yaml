patterns_found:
  - category: architecture
    pattern: "模式系统 MVP 仅实现后端，不含 UI"
    description: |
      计划文件 (plan.yaml) 的 assumptions 部分明确声明：
      "MVP 阶段不包含 Dictionary/Array 类型、变量管理 UI、模式管理 UI"
      这意味着用户当前无法通过任何图形界面创建、编辑、删除或管理模式。
    examples:
      - file: plan.yaml
        location: "plan.yaml:assumptions"
        snippet: "- \"MVP 阶段不包含 Dictionary/Array 类型、变量管理 UI、模式管理 UI\""
    prevalence: common

  - category: architecture
    pattern: "AppletOptionFactory 使用空的 InMemoryModeRepository"
    description: |
      AppletOptionFactory.modeRepository 通过 lazy { InMemoryModeRepository() } 初始化。
      这个仓库在应用启动时是空的，没有任何代码调用 createMode() 来预填充模式数据。
      这意味着即使用户在任务编辑器中添加 SetModeAction 或 ModeConstraint，
      由于仓库中没有模式实体，这些 Applet 在运行时始终会失败（getModeByName 返回 null）。
    examples:
      - file: AppletOptionFactory.kt
        location: "AppletOptionFactory.kt:50"
        snippet: "private val modeRepository: ModeRepository by lazy { InMemoryModeRepository() }"
    prevalence: common

  - category: architecture
    pattern: "DataStoreModeRepository 已实现但未被使用"
    description: |
      DataStoreModeRepository（基于 DataStore Preferences 持久化）已完整实现，
      包括 initialize() 加载、createMode()、deleteMode() 等全套功能，
      但 AppletOptionFactory 中使用的是 InMemoryModeRepository，
      DataStoreModeRepository 仅在单元测试中被引用。
    examples:
      - file: DataStoreModeRepository.kt
        location: "DataStoreModeRepository.kt:25"
        snippet: "class DataStoreModeRepository(private val context: Context) : ModeRepository"
      - file: AppletOptionFactory.kt
        location: "AppletOptionFactory.kt:50"
        snippet: "private val modeRepository: ModeRepository by lazy { InMemoryModeRepository() }"
    prevalence: common

  - category: architecture
    pattern: "模式仅通过 Applet 间接使用"
    description: |
      模式系统的用户接触点仅存在于任务编辑器（FlowEditorDialog）中的 Applet 选择器：
      1. SetModeAction — 在"动作"类别的 ModeActionRegistry 中注册，显示为"设置模式"
      2. ModeConstraint — 在"条件"类别的 ModeCriterionRegistry 中注册，显示为"检查模式状态"
      3. ModeChangeTrigger — 通过 EventCriterionRegistry 监听模式变化事件
      这些 Applet 以文本参数（模式名称字符串）引用模式，而非从 UI 选择器中选取。
    examples:
      - file: ModeActionRegistry.kt
        location: "ModeActionRegistry.kt:22-25"
        snippet: |
          val setMode = appletOption(R.string.set_mode) {
              SetModeAction(modeRepositoryProvider)
          }.withValueArgument<String>(R.string.mode_name)
              .withValueArgument<String>(R.string.mode_operation_type)
    prevalence: common

  - category: naming
    pattern: "strings.xml 缺少 set_mode/mode_name/mode_operation_type/check_mode_status/expected_mode_active 字符串资源"
    description: |
      ModeActionRegistry 引用 R.string.set_mode、R.string.mode_name、R.string.mode_operation_type，
      ModeCriterionRegistry 引用 R.string.check_mode_status、R.string.expected_mode_active，
      但在 strings.xml 中通过 grep 搜索 "set_mode"、"check_mode_status" 等 key 时未找到匹配。
      这些字符串资源可能尚未定义，或定义在其他资源文件中。
    examples:
      - file: ModeActionRegistry.kt
        location: "ModeActionRegistry.kt:22"
        snippet: "appletOption(R.string.set_mode)"
    prevalence: occasional

