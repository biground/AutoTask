gaps:
  - area: "模式管理 UI"
    description: |
      不存在任何 UI 界面让用户创建、查看、编辑或删除模式。
      后端 ModeRepository 接口完整（createMode/deleteMode/getAllModes），
      DataStoreModeRepository 持久化也已实现，
      但缺少调用这些 API 的 UI 层。
    impact: decision_blocker
    affects: ["variable-mode-system"]
  - area: "运行时 ModeRepository 为空"
    description: |
      AppletOptionFactory.modeRepository 使用 InMemoryModeRepository（lazy 初始化后为空），
      没有任何代码调用 createMode() 预填充模式。
      加上没有 UI 让用户创建模式，运行时 SetModeAction 和 ModeConstraint 实际上不可用
      （getModeByName 始终返回 null → AppletResult.EMPTY_FAILURE）。
    impact: decision_blocker
    affects: ["variable-mode-system"]
  - area: "DataStoreModeRepository 未集成到生产代码"
    description: |
      DataStoreModeRepository 已完整实现但未被 AppletOptionFactory 使用。
      需要用 DataStoreModeRepository(context) 替换 InMemoryModeRepository()，
      并在应用启动时调用 initialize()。
    impact: research_blocker
    affects: ["variable-mode-system"]
