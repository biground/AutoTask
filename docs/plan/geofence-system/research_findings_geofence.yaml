plan_id: geofence-system
objective: "研究 AutoPilot 地理围栏（Geofence）触发器和约束器的实现需求"
focus_area: geofence-trigger-constraint
created_at: "2026-04-09"
created_by: researcher
status: completed

tldr: |
  - 地理围栏功能包含 7 个功能项（2 触发器 + 1 约束 + 2 系统动作 + 1 位置服务 + 1 分享位置），计划在 V2 阶段实现
  - 技术选型为高德地图 SDK GeoFence API，需 ACCESS_FINE_LOCATION / ACCESS_BACKGROUND_LOCATION 等权限
  - 现有代码已有完善的 EventDispatcher + EventFilter + Referent + AppletOptionRegistry 模式，新增地理围栏仅需遵循现有架构扩展
  - 需新建 LocationEventDispatcher（app 层）+ 新 Event 常量（engine 层）+ GeofenceReferent + 注册表条目
  - 关键风险：后台持续定位耗电、Android 16 后台位置限制、高德 SDK API Key 管理

research_metadata:
  methodology: "hybrid retrieval: semantic_search + grep_search + read_file; 3 passes: docs → codebase patterns → integration analysis"
  scope: "docs/（4 文件）+ app/src/main/ + tasker-engine/src/main/ 核心代码，聚焦触发器/约束/事件系统"
  confidence: high
  coverage: 92
  decision_blockers: 0
  research_blockers: 0

# ============================================================
# 一、功能规格
# ============================================================

feature_items:
  triggers:
    - id: T-LOC-001
      name: Geofence Trigger
      description: "进入/离开地理围栏区域"
      marker: "🔴"
      localization: "使用高德/百度地图 SDK 的 GeoFence API"

    - id: T-LOC-002
      name: Location Trigger
      description: "到达指定位置"
      marker: "🔴"
      localization: "同 T-LOC-001"

  constraints:
    - id: C-LOC-001
      name: "Geofence (Location)"
      description: "是否在指定地理围栏内"
      marker: "🔴🌐"
      localization: "同 T-LOC-001"

    - id: C-LOC-002
      name: Cell Towers
      description: "当前连接的基站匹配"
      marker: "🟢"
      note: "不依赖地图 SDK，使用 TelephonyManager API"

  actions:
    - id: A-SYS-003
      name: Force Location Update
      description: "强制刷新位置"
      marker: "🟢🔴"

    - id: A-SYS-004
      name: Set Location Update Rate
      description: "设置位置更新频率"
      marker: "🟢🔴"

    - id: A-NET-008
      name: Share Location
      description: "分享位置"
      marker: "🟢🔴"
      note: "使用高德/百度坐标系"

    - id: A-SET-009
      name: Location Mode
      description: "设置定位模式"
      marker: "🟡"

  infrastructure:
    - id: AND-007
      name: 位置服务
      description: "前台/后台位置获取"
      marker: "🟢🔴"
      localization: "使用高德/百度后台定位"

  related_items:
    - id: T-TIME-006
      name: Sunset/Sunrise
      description: "日出/日落触发（依赖地理位置计算）"
      marker: "🟢🔴"
      note: "可使用天文算法本地计算，不强依赖定位 SDK"

    - id: C-TIME-005
      name: Sunrise/Sunset
      description: "日出/日落约束"
      marker: "🟢🔴🌐"

    - id: C-SYS-003
      name: GPS State
      description: "GPS 是否开启"
      marker: "🟢🌐"

    - id: T-SYS-004
      name: GPS Enabled/Disabled
      description: "GPS 开关变化触发"
      marker: "🟢"

roadmap_phase: V2
roadmap_notes: |
  V2 阶段（完整版）明确包含：
  - 触发器：T-LOC-001（Geofence 🔴 高德 GeoFence API）、T-LOC-002（Location 🔴）
  - 约束：C-LOC-001（Geofence 🔴）、C-LOC-002（Cell Towers）
  - 基础设施：AND-007（位置服务 🔴）
  - 动作：A-SYS-003（Force Location Update 🔴）、A-SYS-004（Location Update Rate 🔴）
  roadmap.md V2 架构工作量第 1 项：
  "地理围栏系统：集成高德地图 SDK GeoFence API，后台位置持续监听，电量优化"

# ============================================================
# 二、技术选型
# ============================================================

tech_stack:
  sdk:
    primary: "高德地图 SDK (AMap)"
    rationale: "AGENTS.md 决策：国内网络环境下 Google Geofencing API 不可用"
    key_apis:
      - name: "AMapLocationClient"
        purpose: "持续/单次定位"
      - name: "GeoFenceClient / GeoFence"
        purpose: "地理围栏创建与监听"
      - name: "AMapLocationListener"
        purpose: "位置回调"
    gradle_dependency: "com.amap.api:location:latest"
    docs_url: "https://lbs.amap.com/api/android-location-sdk/locationsummary"

  permissions:
    - name: "android.permission.ACCESS_FINE_LOCATION"
      purpose: "精确定位（GPS + 网络）"
      type: runtime
      required: true

    - name: "android.permission.ACCESS_COARSE_LOCATION"
      purpose: "粗略定位"
      type: runtime
      required: true

    - name: "android.permission.ACCESS_BACKGROUND_LOCATION"
      purpose: "后台定位（Android 10+）"
      type: runtime
      required: true
      note: "Android 10+ 要求先授予前台定位权限后，再请求后台定位权限"

    - name: "android.permission.FOREGROUND_SERVICE_LOCATION"
      purpose: "前台服务声明位置类型（Android 14+）"
      type: manifest
      required: true

    - name: "android.permission.ACCESS_NETWORK_STATE"
      purpose: "网络状态（已有）"
      type: manifest
      required: true
      status: already_declared

    - name: "android.permission.ACCESS_WIFI_STATE"
      purpose: "WiFi 辅助定位（已有）"
      type: manifest
      required: true
      status: already_declared

    - name: "android.permission.INTERNET"
      purpose: "网络请求（已有）"
      type: manifest
      required: true
      status: already_declared

  api_keys:
    - name: "高德地图 API Key"
      purpose: "鉴权"
      config_location: "AndroidManifest.xml <meta-data>"
      key_name: "com.amap.api.v2.apikey"
      apply_url: "https://console.amap.com/dev/key/app"

  foreground_service:
    type: "location"
    declaration: |
      <service
        android:name=".service.LocationService"
        android:foregroundServiceType="location"
        android:exported="false" />

# ============================================================
# 三、现有代码基础
# ============================================================

existing_code:
  # --- EventDispatcher 系统 ---
  event_dispatcher_pattern:
    description: "抽象 EventDispatcher 基类 → 具体子类 → 注册到 MetaEventDispatcher"
    base_class:
      file: "tasker-engine/src/main/java/top/xjunz/tasker/engine/task/EventDispatcher.kt"
      key_methods:
        - "abstract fun onRegistered() — 注册时初始化"
        - "abstract fun destroy() — 销毁清理"
        - "fun dispatchEvents(vararg events: Event) — 分发事件"
        - "fun addCallback(callback: Callback) — 注册回调"
    meta_dispatcher:
      file: "app/src/main/java/top/xjunz/tasker/task/event/MetaEventDispatcher.kt"
      description: "组合模式，内部维护 ArrayMap<Class<*>, EventDispatcher>，统一管理所有 dispatcher"
    existing_dispatchers:
      - name: A11yEventDispatcher
        file: "app/src/main/java/top/xjunz/tasker/task/event/A11yEventDispatcher.kt"
        events: "包/窗口切换、通知、Toast、内容变化"
      - name: PollEventDispatcher
        file: "app/src/main/java/top/xjunz/tasker/task/event/PollEventDispatcher.kt"
        events: "EVENT_ON_TICK (每秒轮询)"
      - name: NetworkEventDispatcher
        file: "app/src/main/java/top/xjunz/tasker/task/event/NetworkEventDispatcher.kt"
        events: "WiFi 连接/断开、网络可用/不可用"
      - name: ClipboardEventDispatcher
        file: "app/src/main/java/top/xjunz/tasker/task/event/ClipboardEventDispatcher.kt"
        events: "剪贴板变化（已注释掉）"
      - name: VariableChangeEventDispatcher
        file: "app/src/main/java/top/xjunz/tasker/task/variable/VariableChangeEventDispatcher.kt"
        events: "EVENT_ON_VARIABLE_CHANGED"
      - name: ModeChangeEventDispatcher
        file: "app/src/main/java/top/xjunz/tasker/task/mode/ModeChangeEventDispatcher.kt"
        events: "EVENT_ON_MODE_CHANGED"
    registration_point:
      file: "app/src/main/java/top/xjunz/tasker/service/AutomatorService.kt"
      method: "initEventDispatcher()"
      pattern: "eventDispatcher.registerEventDispatcher(XxxEventDispatcher(...))"

  # --- Event 常量 ---
  event_constants:
    file: "tasker-engine/src/main/java/top/xjunz/tasker/engine/runtime/Event.kt"
    current_max_id: 16   # EVENT_ON_MODE_CHANGED = 16
    pattern: "const val EVENT_ON_XXX = N"
    next_available_ids:
      - 17  # EVENT_ON_GEOFENCE_ENTERED
      - 18  # EVENT_ON_GEOFENCE_EXITED
      - 19  # EVENT_ON_LOCATION_ARRIVED

  # --- EventFilter (触发器注册) ---
  event_filter_pattern:
    file: "app/src/main/java/top/xjunz/tasker/task/applet/criterion/EventFilter.kt"
    description: "通用事件过滤器，匹配 eventType，根据事件类型返回对应 Referent"
    pattern: |
      EventFilter(eventType) → apply() 中 runtime.events?.find { it.type == eventType }
      根据 hit.type 分支返回不同 Referent（如 NotificationReferent, VariableChangeReferent）

  # --- EventCriterionRegistry (事件注册表) ---
  event_criterion_registry:
    file: "app/src/main/java/top/xjunz/tasker/task/applet/option/registry/EventCriterionRegistry.kt"
    description: "所有事件类型触发器的注册表"
    current_entries: 15  # 0x0000 ~ 0x0014
    pattern: |
      @AppletOrdinal(0xNNNN)
      val xxxEvent = eventFilterOption(Event.EVENT_ON_XXX, R.string.xxx)
        .withResult<XxxReferent>(R.string.yyy)
    next_ordinal: "0x0015"

  # --- Referent 系统 ---
  referent_pattern:
    base_interface:
      file: "tasker-engine/src/main/java/top/xjunz/tasker/engine/runtime/Referent.kt"
      description: "接口，实现 getReferredValue(which, runtime) 返回引用值"
    examples:
      - name: NotificationReferent
        file: "app/src/main/java/top/xjunz/tasker/task/applet/flow/ref/NotificationReferent.kt"
        fields: "this(0), paneTitle(1), componentInfo(2), label(3)"
      - name: VariableChangeReferent
        file: "app/src/main/java/top/xjunz/tasker/task/applet/flow/ref/VariableChangeReferent.kt"
        fields: "this(0), variableName(1), oldValue(2), newValue(3)"
      - name: ModeChangeReferent
        file: "app/src/main/java/top/xjunz/tasker/task/applet/flow/ref/ModeChangeReferent.kt"
        fields: "this(0), modeName(1), changeType(2), previousModeName(3)"

  # --- AppletOptionRegistry 系统 ---
  registry_system:
    base_class:
      file: "app/src/main/java/top/xjunz/tasker/task/applet/option/registry/AppletOptionRegistry.kt"
      description: "抽象注册表，使用反射扫描 @AppletOrdinal 注解字段"
    bootstrap:
      file: "app/src/main/java/top/xjunz/tasker/task/applet/option/registry/BootstrapOptionRegistry.kt"
      description: "根注册表，定义所有子注册表 ID 和 PhantomFlow 入口"
      current_criterion_ids:
        eventFilter: "0xF"
        app: "0x10"
        time: "0x12"
        global: "0x13"
        notification: "0x14"
        text: "0x15"
        uiObject: "0x16"
        network: "0x17"
        variable: "0x18"
        mode: "0x19"
      next_criterion_id: "0x1A  # ID_LOCATION_CRITERION_REGISTRY"
      current_action_ids:
        global: "0x50"
        uiObject: "0x51"
        control: "0x52"
        app: "0x53"
        text: "0x54"
        gesture: "0x55"
        shellCmd: "0x56"
        file: "0x57"
        vibration: "0x58"
        variable: "0x59"
        mode: "0x5A"
      next_action_id: "0x5B  # ID_LOCATION_ACTION_REGISTRY (if needed)"
    factory:
      file: "app/src/main/java/top/xjunz/tasker/task/applet/option/AppletOptionFactory.kt"
      description: "全局单例工厂，实例化并注册所有 Registry，allRegistries 数组中顺序注册"

  # --- 现有服务 ---
  services:
    a11y_service:
      file: "app/src/main/java/top/xjunz/tasker/service/A11yAutomatorService.kt"
      manifest: "已注册为 AccessibilityService"
    shizuku_service:
      file: "app/src/main/java/top/xjunz/tasker/service/ShizukuAutomatorService.kt"
      description: "通过 Shizuku 获取 UiAutomation"
    no_foreground_service:
      note: "当前无独立的 ForegroundService 声明，A11yAutomatorService 本身就是前台服务"

  # --- AndroidManifest 现状 ---
  manifest:
    file: "app/src/main/AndroidManifest.xml"
    existing_permissions:
      - RECEIVE_BOOT_COMPLETED
      - SYSTEM_ALERT_WINDOW
      - INTERNET
      - VIBRATE
      - WAKE_LOCK
      - ACCESS_NETWORK_STATE
      - ACCESS_WIFI_STATE
    missing_for_geofence:
      - ACCESS_FINE_LOCATION
      - ACCESS_COARSE_LOCATION
      - ACCESS_BACKGROUND_LOCATION
      - FOREGROUND_SERVICE_LOCATION

# ============================================================
# 四、集成点分析
# ============================================================

integration_points:
  engine_layer:
    module: tasker-engine
    changes:
      - file: "tasker-engine/src/main/java/top/xjunz/tasker/engine/runtime/Event.kt"
        change: "新增 Event 常量"
        details:
          - "const val EVENT_ON_GEOFENCE_ENTERED = 17"
          - "const val EVENT_ON_GEOFENCE_EXITED = 18"
          - "const val EVENT_ON_LOCATION_ARRIVED = 19  // T-LOC-002 到达指定位置"
        note: "同时在 toString() 中新增对应分支"

  app_layer:
    module: app
    new_classes:
      # --- EventDispatcher ---
      - class: LocationEventDispatcher
        package: "top.xjunz.tasker.task.event"
        extends: EventDispatcher
        responsibility: |
          封装高德地图 SDK 的 AMapLocationClient + GeoFenceClient，
          监听地理围栏进入/离开事件，分发 EVENT_ON_GEOFENCE_ENTERED/EXITED
        key_methods:
          - "onRegistered() — 初始化 AMapLocationClient + GeoFenceClient"
          - "destroy() — 释放 SDK 资源"
          - "addGeofence(center: LatLng, radius: Float, name: String)"
          - "removeGeofence(name: String)"
          - "内部 BroadcastReceiver 处理高德 GeoFence 回调"
        extras:
          - "EXTRA_GEOFENCE_NAME = 0  // 围栏名称"
          - "EXTRA_GEOFENCE_LAT = 1   // 围栏中心纬度"
          - "EXTRA_GEOFENCE_LNG = 2   // 围栏中心经度"
          - "EXTRA_GEOFENCE_RADIUS = 3 // 围栏半径"

      # --- Referent ---
      - class: GeofenceReferent
        package: "top.xjunz.tasker.task.applet.flow.ref"
        implements: Referent
        responsibility: "地理围栏事件的引用值提供者"
        fields:
          - "0: this (GeofenceReferent 自身)"
          - "1: geofenceName (String)"
          - "2: latitude (Double)"
          - "3: longitude (Double)"
          - "4: transitionType (String: ENTER/EXIT)"

      # --- Registry ---
      - class: LocationCriterionRegistry
        package: "top.xjunz.tasker.task.applet.option.registry"
        extends: AppletOptionRegistry
        id: "0x1A (ID_LOCATION_CRITERION_REGISTRY)"
        responsibility: "位置相关约束条件注册"
        entries:
          - ordinal: "0x0000"
            name: geofenceInside
            description: "C-LOC-001: 是否在指定地理围栏内"
            type: "invertibleAppletOption (支持取反：不在围栏内)"
            args:
              - "纬度 (Double)"
              - "经度 (Double)"
              - "半径 (Float, 米)"
              - "围栏名称 (String)"

      # --- EventCriterionRegistry 新条目 ---
      - class: EventCriterionRegistry
        change_type: modify
        package: "top.xjunz.tasker.task.applet.option.registry"
        new_entries:
          - ordinal: "0x0015"
            name: geofenceEntered
            event: EVENT_ON_GEOFENCE_ENTERED
            label: "R.string.on_geofence_entered"
            results:
              - "GeofenceReferent (围栏事件详情)"
              - "String (围栏名称)"
          - ordinal: "0x0016"
            name: geofenceExited
            event: EVENT_ON_GEOFENCE_EXITED
            label: "R.string.on_geofence_exited"
            results:
              - "GeofenceReferent (围栏事件详情)"
              - "String (围栏名称)"
          - ordinal: "0x0017"
            name: locationArrived
            event: EVENT_ON_LOCATION_ARRIVED
            label: "R.string.on_location_arrived"
            results:
              - "GeofenceReferent (位置事件详情)"

      # --- EventFilter 扩展 ---
      - class: EventFilter
        change_type: modify
        package: "top.xjunz.tasker.task.applet.criterion"
        changes: |
          在 apply() 方法的 when(hit.type) 分支中新增：
          EVENT_ON_GEOFENCE_ENTERED, EVENT_ON_GEOFENCE_EXITED, EVENT_ON_LOCATION_ARRIVED -> {
              GeofenceReferent(...).asResult()
          }

      # --- BootstrapOptionRegistry 扩展 ---
      - class: BootstrapOptionRegistry
        change_type: modify
        new_constant: "const val ID_LOCATION_CRITERION_REGISTRY = 0x1A"
        new_flow_option: |
          @AppletOrdinal(0x0019)
          val locationCriteria = flowOptionWithId<PhantomFlow>(
              ID_LOCATION_CRITERION_REGISTRY, R.string.location_criteria
          )
        add_to_arrays:
          - "criterionFlowOptions 数组中新增 locationCriteria"

      # --- AppletOptionFactory 扩展 ---
      - class: AppletOptionFactory
        change_type: modify
        new_registry: |
          private val locationCriterionRegistry =
              LocationCriterionRegistry(BootstrapOptionRegistry.ID_LOCATION_CRITERION_REGISTRY)
        add_to_allRegistries: "在 modeCriterionRegistry 后面加入 locationCriterionRegistry"

      # --- AutomatorService 扩展 ---
      - class: AutomatorService
        change_type: modify
        file: "app/src/main/java/top/xjunz/tasker/service/AutomatorService.kt"
        change: |
          在 initEventDispatcher() 中新增：
          eventDispatcher.registerEventDispatcher(LocationEventDispatcher())

  android_services:
    foreground_service:
      description: |
        地理围栏需要后台持续监听位置，有两种方案：
        方案 A：在现有 A11yAutomatorService 中嵌入高德 SDK 定位逻辑
                优点：无需新建 Service，复用现有保活机制
                缺点：A11yService 与位置逻辑耦合
        方案 B：新建独立 LocationForegroundService
                优点：职责单一、可独立启停
                缺点：多一个前台通知、多一个需要保活的服务
      recommendation: |
        推荐方案 A（嵌入式）：
        LocationEventDispatcher 作为 EventDispatcher 子类注册到 MetaEventDispatcher，
        其 onRegistered() 内部初始化高德 SDK，利用已有前台服务保活机制。
        高德 SDK 的 GeoFenceClient 本身支持后台围栏监听（通过 PendingIntent）。

    broadcast_receiver:
      description: |
        高德地理围栏通过 PendingIntent + BroadcastReceiver 回调转场事件。
        LocationEventDispatcher 内部注册一个动态 BroadcastReceiver，
        收到围栏事件后转换为 Event 并 dispatchEvents()。

  registry_ids:
    new_ids:
      - name: ID_LOCATION_CRITERION_REGISTRY
        value: "0x1A"
        purpose: "位置约束注册表"

    new_event_constants:
      - name: EVENT_ON_GEOFENCE_ENTERED
        value: 17
      - name: EVENT_ON_GEOFENCE_EXITED
        value: 18
      - name: EVENT_ON_LOCATION_ARRIVED
        value: 19

    event_criterion_ordinals:
      - "0x0015 = geofenceEntered"
      - "0x0016 = geofenceExited"
      - "0x0017 = locationArrived"

    location_criterion_ordinals:
      - "0x0000 = geofenceInside (C-LOC-001)"

    bootstrap_ordinals:
      - "0x0019 = locationCriteria"

