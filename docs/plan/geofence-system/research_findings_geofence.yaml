# ============================================================
# 七、模式总结
# ============================================================

patterns_found:
  - category: architecture
    pattern: "EventDispatcher 插件式注册"
    description: |
      新增事件源只需：
      1. 继承 EventDispatcher，实现 onRegistered()/destroy()
      2. 在 AutomatorService.initEventDispatcher() 中注册
      3. 通过 dispatchEvents() 分发事件
    examples:
      - file: NetworkEventDispatcher.kt
        location: "app/src/main/java/top/xjunz/tasker/task/event/NetworkEventDispatcher.kt"
        snippet: "class NetworkEventDispatcher : EventDispatcher() { ... }"
    prevalence: common

  - category: architecture
    pattern: "AppletOptionRegistry 注册表模式"
    description: |
      新增功能项（触发器/约束/动作）只需：
      1. 创建/扩展 XXXRegistry(id) : AppletOptionRegistry(id)
      2. 使用 @AppletOrdinal 注解声明选项
      3. 在 BootstrapOptionRegistry 注册 PhantomFlow 入口
      4. 在 AppletOptionFactory 实例化并加入 allRegistries
    examples:
      - file: NetworkCriterionRegistry.kt
        location: "app/src/main/java/top/xjunz/tasker/task/applet/option/registry/NetworkCriterionRegistry.kt"
        snippet: "class NetworkCriterionRegistry(id: Int) : AppletOptionRegistry(id)"
    prevalence: common

  - category: architecture
    pattern: "Referent 引用值传递"
    description: |
      事件产生的上下文数据通过 Referent 接口向后续约束/动作传递。
      每个 Referent 的 getReferredValue(which) 按索引返回不同字段值。
      在 EventCriterionRegistry 中通过 .withResult<T>() 声明可用引用。
    examples:
      - file: ModeChangeReferent.kt
        location: "app/src/main/java/top/xjunz/tasker/task/applet/flow/ref/ModeChangeReferent.kt"
        snippet: "class ModeChangeReferent(...) : Referent { override fun getReferredValue(...) }"
    prevalence: common

  - category: naming
    pattern: "Event 常量递增编号"
    description: "Event 类型使用连续递增整数 ID"
    examples:
      - file: Event.kt
        location: "tasker-engine/src/main/java/top/xjunz/tasker/engine/runtime/Event.kt"
        snippet: "EVENT_ON_VARIABLE_CHANGED = 15; EVENT_ON_MODE_CHANGED = 16"
    prevalence: common

  - category: naming
    pattern: "Registry ID 分段策略"
    description: "Criterion 使用 0x10~0x1F, Action 使用 0x50~0x5F, Flow 使用 0x60+"
    examples:
      - file: BootstrapOptionRegistry.kt
        location: "BootstrapOptionRegistry.kt:40-64"
        snippet: "ID_EVENT_FILTER_REGISTRY = 0xF; ID_APP_CRITERION_REGISTRY = 0x10; ..."
    prevalence: common

# ============================================================
# 八、风险和注意事项
# ============================================================

gaps_and_risks:
  - area: "后台定位耗电"
    description: "高德 SDK 后台位置持续监听 + GeoFence 会显著影响电池续航"
    impact: decision_blocker
    mitigation:
      - "使用 GeoFenceClient 而非持续定位（围栏到达通过 PendingIntent 回调，低功耗）"
      - "LocationEventDispatcher 仅在有活跃围栏时启动定位"
      - "提供用户可配置的定位模式：高精度/均衡/低功耗"
      - "无围栏注册时自动停止 SDK"

  - area: "Android 16 后台位置限制"
    description: "Android 16 对后台位置访问进一步收紧"
    impact: research_blocker
    mitigation:
      - "必须先获取 ACCESS_BACKGROUND_LOCATION 权限"
      - "必须声明 foregroundServiceType=\"location\""
      - "整合到权限引导流程（PERM-001 / PERM-004）"
      - "在位置权限被撤销时优雅降级（禁用围栏触发器、通知用户）"

  - area: "高德 API Key 安全"
    description: "API Key 不应硬编码在代码中"
    impact: nice_to_know
    mitigation:
      - "使用 local.properties + BuildConfig 或 Secrets Gradle Plugin"
      - "API Key 存储在不提交到版本控制的文件中"

  - area: "GCJ-02 坐标系"
    description: "高德使用 GCJ-02 加密坐标系，Web 端编辑器（如果用其他地图）需注意坐标转换"
    impact: nice_to_know
    mitigation:
      - "Web 端也使用高德 JS API 或确保坐标转换一致"
      - "存储坐标时明确记录坐标系类型"

  - area: "围栏数量上限"
    description: "高德 SDK 可能有最大同时监听围栏数量限制（通常 100 个）"
    impact: nice_to_know
    mitigation:
      - "文档中标注限制"
      - "UI 中限制用户创建围栏数量或提供警告"

  - area: "围栏配置 UI"
    description: "需要地图选点、地址搜索、半径调整等复杂 UI，工作量较大"
    impact: nice_to_know
    mitigation:
      - "拆分为基础实现（手动输入坐标 + 半径）和增强实现（地图选点）"
      - "V2 第一版可先实现手动输入，后续迭代加入地图 UI"

  - area: "约束与触发器的实现差异"
    description: |
      触发器（T-LOC-001）是事件驱动：围栏进出时收到回调。
      约束（C-LOC-001）是状态查询：需要当前位置与围栏的包含关系判断。
      约束实现不能简单复用 EventFilter，需要独立的 Criterion 类主动查询位置。
    impact: decision_blocker
    mitigation:
      - "约束用独立的 LocationCriterion 类实现"
      - "LocationCriterion.apply() 中调用高德 SDK 获取最后已知位置"
      - "计算 distanceTo(center) <= radius 判断是否在围栏内"
      - "或者维护一个 ActiveGeofences 状态表，记录当前所在围栏"

open_questions:
  - question: "地理围栏的配置数据如何持久化？"
    context: "围栏定义（名称、坐标、半径）需要跨重启保留，且可能需要云同步"
    type: research
    affects: ["geofence-trigger", "geofence-constraint"]

  - question: "LocationEventDispatcher 的生命周期管理方式？"
    context: |
      当没有任何宏使用地理围栏触发器时，LocationEventDispatcher 不应启动 SDK。
      是在 onRegistered() 延迟初始化，还是采用按需启停策略？
    type: decision_blocker
    affects: ["geofence-trigger"]

  - question: "是否需要独立的 LocationForegroundService？"
    context: "roadmap 提到 AND-007 位置服务，但当前架构可在 A11yService 内嵌入"
    type: research
    affects: ["geofence-trigger", "android-service"]
