plan_id: geofence-system
objective: |
  为 AutoPilot 项目实现完整的地理围栏（Geofence）系统，
  包括高德地图 SDK 集成、围栏进入/离开触发器(T-LOC-001)、到达位置触发器(T-LOC-002)、
  围栏约束(C-LOC-001)、地图选点 UI、POI 搜索、围栏可视化、API Key 管理。
created_at: "2026-04-09"
created_by: "gem-planner"
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 5
  total_dependencies: 27
  risk_score: medium

tldr: |
  20 个原子任务，分 5 波执行：
  W1 基础设施（事件常量 + Gradle 依赖 + Manifest 权限 + 数据模型 + API Key 管理）→
  W2 核心组件（GeofenceReferent + ConfigRepository + GeofenceConstraint + API Key UI）→
  W3 引擎集成（LocationEventDispatcher + EventCriterionRegistry + LocationCriterionRegistry + 地图选点界面）→
  W4 全局注册 + 集成 + UI（EventFilter 扩展 + AutomatorService 注册 + BootstrapOptionRegistry + AppletOptionFactory + 围栏列表 + POI 搜索 + 围栏可视化）→
  W5 端到端集成测试。
  所有 UI 任务使用 Fragment + ViewBinding + XML 模式（与现有代码一致，不使用 Jetpack Compose）。
  核心架构：LocationEventDispatcher 嵌入 MetaEventDispatcher，复用 A11yAutomatorService 保活机制。
  高德 SDK 通过 GeoFenceClient PendingIntent 回调实现低功耗围栏监听。
  API Key 由用户在设置界面自行填写，运行时通过 AMapLocationClient.setApiKey() 配置。

open_questions:
  - "围栏配置数据是否需要支持导出/导入或云同步？当前计划仅支持本地 DataStore 持久化"
  - "A-SYS-003 (Force Location Update) 和 A-SYS-004 (Set Location Update Rate) 为可选低优先级，未纳入本计划，后续迭代实现"

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "高德 SDK 后台围栏监听被系统电池优化策略杀死，导致围栏事件丢失"
      likelihood: medium
      impact: high
      mitigation: "依赖 A11yAutomatorService 已有的前台服务保活机制；GeoFenceClient 使用 PendingIntent 而非持续定位，系统级保活；无活跃围栏时自动释放 SDK 资源"
    - scenario: "Android 16 后台位置权限进一步收紧，用户拒绝授权导致功能不可用"
      likelihood: medium
      impact: high
      mitigation: "权限检查前置，无权限时优雅降级（禁用围栏触发器，通知用户）；满足 FOREGROUND_SERVICE_LOCATION 声明要求"
    - scenario: "用户未填写高德 API Key 或 Key 无效，SDK 初始化失败"
      likelihood: high
      impact: medium
      mitigation: "LocationEventDispatcher.onRegistered() 先检查 Key 有效性，无 Key 时跳过初始化并记录警告；首次使用地理围栏功能时弹出 API Key 设置引导"
    - scenario: "高德 SDK 版本与项目 minSdk/targetSdk 不兼容"
      likelihood: low
      impact: high
      mitigation: "锁定高德 SDK 稳定版本；在 T02 任务中先验证 Gradle sync 和编译通过"
    - scenario: "GCJ-02 坐标系与 Web 端编辑器坐标不一致"
      likelihood: low
      impact: medium
      mitigation: "全流程统一使用 GCJ-02（高德坐标系），数据模型中标注坐标系类型；未来 Web 端也使用高德 JS API"
    - scenario: "围栏数量过多导致高德 SDK 性能下降或超出限制（通常 100 个上限）"
      likelihood: low
      impact: medium
      mitigation: "UI 层添加围栏数量限制和警告提示；超限时禁止新增"
  assumptions:
    - "高德地图 SDK 支持 Android 16 (targetSdk 36) 且稳定可用"
    - "A11yAutomatorService 的前台服务保活机制足以保持 LocationEventDispatcher 存活"
    - "用户自行在高德开放平台申请 API Key，应用不内置 Key"
    - "所有坐标使用 GCJ-02 加密坐标系（高德默认）"
    - "当前 DataStore Preferences 依赖已在 app/build.gradle 中配置"
    - "围栏配置仅本地持久化，不做云同步"
    - "API Key 存储使用明文 DataStore Preferences（不涉及高安全等级场景）"
    - "所有新代码使用 Kotlin，测试使用 JUnit 4"

