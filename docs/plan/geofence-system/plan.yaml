  - id: "T09"
    title: "GeofenceConstraint — 是否在围栏内约束 (C-LOC-001)"
    description: |
      创建判断当前位置是否在指定围栏内的约束 Applet：
      1. 创建 app/src/main/java/top/xjunz/tasker/task/applet/criterion/GeofenceConstraint.kt：
         class GeofenceConstraint : Applet() {
             override suspend fun apply(runtime: TaskRuntime): AppletResult {
                 // 1. 获取围栏参数（lat, lng, radius）
                 val targetLat = values[0] as Double
                 val targetLng = values[1] as Double
                 val targetRadius = values[2] as Float

                 // 2. 获取当前位置（通过高德 SDK 最后已知位置）
                 val currentLocation = getLastKnownLocation()
                     ?: return AppletResult.EMPTY_FAILURE

                 // 3. 计算距离
                 val distance = AMapUtils.calculateLineDistance(
                     LatLng(currentLocation.latitude, currentLocation.longitude),
                     LatLng(targetLat, targetLng)
                 )

                 // 4. 判断是否在围栏内
                 return if (distance <= targetRadius) {
                     AppletResult.EMPTY_SUCCESS
                 } else {
                     AppletResult.EMPTY_FAILURE
                 }
             }

             private fun getLastKnownLocation(): AMapLocation? {
                 // 使用高德 SDK 获取最后已知位置
             }
         }
