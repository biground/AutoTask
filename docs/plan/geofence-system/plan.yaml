  - id: "T08"
    title: "LocationEventDispatcher — 高德 SDK 围栏事件分发"
    description: |
      创建地理围栏事件分发器，封装高德 GeoFenceClient：
      1. 创建 app/src/main/java/top/xjunz/tasker/task/location/LocationEventDispatcher.kt：
         class LocationEventDispatcher(
             private val apiKeyManager: AmapApiKeyManager,
             private val configRepository: GeofenceConfigRepository,  // 来自 T07
             private val scope: CoroutineScope
         ) : EventDispatcher() {

             companion object {
                 const val EXTRA_GEOFENCE_NAME = 0
                 const val EXTRA_GEOFENCE_LAT = 1
                 const val EXTRA_GEOFENCE_LNG = 2
                 const val EXTRA_GEOFENCE_RADIUS = 3
                 const val EXTRA_TRANSITION_TYPE = 4
             }

             private var geoFenceClient: GeoFenceClient? = null
             private var locationClient: AMapLocationClient? = null

             override fun onRegistered() {
                 // 1. 检查 API Key
                 val apiKey = runBlocking { apiKeyManager.getApiKey(context) }
                 if (apiKey.isNullOrBlank()) {
                     Log.w(TAG, "高德 API Key 未配置，地理围栏功能已禁用")
                     return
                 }
                 // 2. 设置 API Key（运行时配置，不依赖 Manifest meta-data）
                 AMapLocationClient.setApiKey(apiKey)
                 // 3. 初始化 GeoFenceClient
                 geoFenceClient = GeoFenceClient(context).apply {
                     setActivateAction(GeoFenceClient.GEOFENCE_IN or GeoFenceClient.GEOFENCE_OUT)
                     createPendingIntent(GEOFENCE_BROADCAST_ACTION)
                     setGeoFenceListener { geoFenceList, errorCode, customId ->
                         // 围栏创建结果回调
                     }
                 }
                 // 4. 注册 BroadcastReceiver 监听围栏事件
                 registerGeofenceBroadcastReceiver()
                 // 5. 从 Repository 加载已保存围栏并注册到 SDK
                 scope.launch { loadAndRegisterSavedGeofences() }
             }

             private fun handleGeofenceEvent(intent: Intent) {
                 val bundle = intent.extras ?: return
                 val status = bundle.getInt(GeoFence.BUNDLE_KEY_FENCESTATUS)
                 val customId = bundle.getString(GeoFence.BUNDLE_KEY_CUSTOMID)
                 val fence = bundle.getParcelable<GeoFence>(GeoFence.BUNDLE_KEY_FENCEID)
                 // 根据 status 分发 EVENT_ON_GEOFENCE_ENTERED 或 EVENT_ON_GEOFENCE_EXITED
                 val eventType = when (status) {
                     GeoFence.STATUS_IN -> Event.EVENT_ON_GEOFENCE_ENTERED
                     GeoFence.STATUS_OUT -> Event.EVENT_ON_GEOFENCE_EXITED
                     else -> return
                 }
                 val event = Event.obtain(eventType).apply {
                     putExtra(EXTRA_GEOFENCE_NAME, customId ?: "")
                     putExtra(EXTRA_GEOFENCE_LAT, fence?.center?.latitude ?: 0.0)
                     putExtra(EXTRA_GEOFENCE_LNG, fence?.center?.longitude ?: 0.0)
                     putExtra(EXTRA_TRANSITION_TYPE, if (status == GeoFence.STATUS_IN) "ENTER" else "EXIT")
                 }
                 dispatchEvents(event)
             }

             override fun destroy() {
                 scope.cancel()  // 取消所有协程，避免泄漏
                 geoFenceClient?.removeGeoFence()
                 unregisterGeofenceBroadcastReceiver()
                 locationClient?.onDestroy()
             }
         }
