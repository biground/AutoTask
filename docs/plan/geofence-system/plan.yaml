  component_details:
    - component: "GeofenceConfig 数据模型"
      responsibility: "围栏配置数据结构（名称、坐标、半径）+ JSON 序列化"
      interfaces:
        - "data class GeofenceConfig(id: String, name: String, latitude: Double, longitude: Double, radius: Float, enabled: Boolean, address: String?)"
        - "enum class GeofenceTransition { ENTER, EXIT }"
        - "kotlinx.serialization @Serializable 注解"

    - component: "AmapApiKeyManager"
      responsibility: "高德 API Key 的存储、读取、有效性检查"
      interfaces:
        - "suspend fun getApiKey(): String?"
        - "suspend fun setApiKey(key: String)"
        - "fun hasApiKey(): Boolean"
        - "fun observeApiKeyState(): Flow<Boolean>"

    - component: "GeofenceConfigRepository"
      responsibility: "围栏配置的 CRUD 持久化操作"
      interfaces:
        - "suspend fun addGeofence(config: GeofenceConfig)"
        - "suspend fun removeGeofence(id: String)"
        - "suspend fun updateGeofence(config: GeofenceConfig)"
        - "suspend fun getGeofence(id: String): GeofenceConfig?"
        - "suspend fun getAllGeofences(): List<GeofenceConfig>"
        - "fun observeGeofences(): Flow<List<GeofenceConfig>>"

    - component: "LocationEventDispatcher"
      responsibility: "封装高德 GeoFenceClient，监听围栏进出事件并转换为 Event 分发"
      interfaces:
        - "onRegistered() — 检查 API Key → setApiKey() → 初始化 GeoFenceClient → 加载已保存围栏"
        - "destroy() — 移除所有围栏 → 释放 SDK 资源"
        - "dispatchEvents(Event) — 围栏回调触发"
        - "companion object: EXTRA_GEOFENCE_NAME=0, EXTRA_GEOFENCE_LAT=1, EXTRA_GEOFENCE_LNG=2, EXTRA_GEOFENCE_RADIUS=3, EXTRA_TRANSITION_TYPE=4"

    - component: "GeofenceReferent"
      responsibility: "围栏事件上下文数据的引用值提供者"
      interfaces:
        - "getReferredValue(0) → this"
        - "getReferredValue(1) → geofenceName: String"
        - "getReferredValue(2) → latitude: Double"
        - "getReferredValue(3) → longitude: Double"
        - "getReferredValue(4) → transitionType: String (ENTER/EXIT)"

    - component: "GeofenceConstraint"
      responsibility: "判断当前位置是否在指定围栏内"
      interfaces:
        - "apply(runtime) — 获取最后已知位置，计算 distanceTo(center) ≤ radius"
        - "参数 0：纬度 Double"
        - "参数 1：经度 Double"
        - "参数 2：半径 Float"

    - component: "LocationCriterionRegistry"
      responsibility: "位置相关约束条件的注册表"
      interfaces:
        - "class LocationCriterionRegistry(id: Int) : AppletOptionRegistry(id)"
        - "@AppletOrdinal(0x0000) geofenceInside"

  dependencies:
    - component: "LocationEventDispatcher"
      relationship: "依赖 AmapApiKeyManager（获取 Key）、GeofenceConfigRepository（加载围栏配置）、Event.kt（事件常量）"
    - component: "GeofenceConstraint"
      relationship: "依赖高德 SDK AMapLocationClient（获取当前位置）"
    - component: "EventFilter"
      relationship: "依赖 GeofenceReferent（创建事件引用）、LocationEventDispatcher（Extra key 常量）"
    - component: "EventCriterionRegistry"
      relationship: "依赖 EventFilter（内部创建）、GeofenceReferent（.withResult 声明）"
    - component: "AppletOptionFactory"
      relationship: "依赖 LocationCriterionRegistry（实例化）、BootstrapOptionRegistry（ID 常量）"

  integration_points:
    - "Event.kt — 新增 EVENT_ON_GEOFENCE_ENTERED=17, EVENT_ON_GEOFENCE_EXITED=18, EVENT_ON_LOCATION_ARRIVED=19"
    - "AutomatorService.initEventDispatcher() — 注册 LocationEventDispatcher"
    - "BootstrapOptionRegistry — 新增 ID_LOCATION_CRITERION_REGISTRY=0x1A, @AppletOrdinal(0x0019) locationCriteria, criterionFlowOptions 新增"
    - "AppletOptionFactory — 实例化 LocationCriterionRegistry 并加入 allRegistries"
    - "EventCriterionRegistry — 新增 @AppletOrdinal(0x0015-0x0017) 三个地理围栏事件"
    - "EventFilter.apply() — when(hit.type) 新增 3 个围栏事件分支"

