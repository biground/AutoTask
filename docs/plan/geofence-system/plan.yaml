  - id: "T04"
    title: "GeofenceConfig 数据模型 + GeofenceTransition 枚举"
    description: |
      在 app 模块创建地理围栏配置的数据模型：
      1. 创建 app/src/main/java/top/xjunz/tasker/task/location/GeofenceConfig.kt：
         @Serializable
         data class GeofenceConfig(
             val id: String,           // UUID
             val name: String,         // 用户自定义围栏名称
             val latitude: Double,     // 纬度（GCJ-02 坐标系）
             val longitude: Double,    // 经度（GCJ-02 坐标系）
             val radius: Float,        // 半径（米），范围 50~5000
             val enabled: Boolean = true,
             val address: String? = null  // 可选地址描述
         )
      2. 创建 GeofenceTransition 枚举：
         enum class GeofenceTransition {
             ENTER,   // 进入围栏
             EXIT     // 离开围栏
