  - id: T01
    title: "创建 SetAlarmAction 动作类 + 单元测试"
    description: |
      创建 SetAlarmAction，继承 ArgumentAction，通过 AlarmClock.ACTION_SET_ALARM Intent 设定系统闹钟。

      实现要点：
      1. 继承 ArgumentAction（与 SetModeAction 同模式）
      2. doAction 解析 4 个参数：hour(Int), minute(Int), message(String?), vibrate(Boolean)
      3. 构造 Intent(AlarmClock.ACTION_SET_ALARM)，设置 EXTRA_HOUR, EXTRA_MINUTES, EXTRA_MESSAGE, EXTRA_VIBRATE
