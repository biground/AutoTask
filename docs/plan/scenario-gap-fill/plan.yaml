implementation_specification:
  code_structure: |
    三个功能各自独立，分别创建核心类 + 测试，最终在 Wave 3 中注册到已有 Registry 体系。
    不新建 Registry 类，不修改 BootstrapOptionRegistry ID 常量或 AppletOptionFactory。
    数据持久化采用 DataStore Preferences 模式，与 GeofenceConfigRepository 一致。
  affected_areas:
    - "app/src/main/java/top/xjunz/tasker/task/applet/action/ — 新增 SetAlarmAction.kt"
    - "app/src/main/java/top/xjunz/tasker/task/applet/criterion/ — 新增 FrequencyConstraint.kt, ModeActivatedTodayConstraint.kt"
    - "app/src/main/java/top/xjunz/tasker/task/mode/ — 新增 ModeHistoryRepository.kt"
    - "app/src/main/java/top/xjunz/tasker/task/applet/option/registry/SoundActionRegistry.kt — 新增 setAlarm 条目"
    - "app/src/main/java/top/xjunz/tasker/task/applet/option/registry/GlobalCriterionRegistry.kt — 新增 frequencyConstraint 条目"
    - "app/src/main/java/top/xjunz/tasker/task/applet/option/registry/ModeCriterionRegistry.kt — 新增 modeActivatedToday 条目"
    - "app/src/main/AndroidManifest.xml — 新增 SET_ALARM 权限"
    - "app/src/main/res/values/strings.xml — 新增字符串资源"
  component_details:
    - component: SetAlarmAction
      responsibility: "通过 AlarmClock.ACTION_SET_ALARM Intent 调用系统时钟应用设置闹钟"
      interfaces:
        - "doAction(args: Array<Any?>, runtime: TaskRuntime): AppletResult — args[0]=hour(Int), args[1]=minute(Int), args[2]=message(String?), args[3]=vibrate(Boolean)"
    - component: FrequencyConstraint
      responsibility: "检查当前执行是否超出频率限制（maxCount 次/windowType 时间窗口）"
      interfaces:
        - "apply(runtime: TaskRuntime): AppletResult — 读取 values[0]=taskKey(String), values[1]=maxCount(Int), values[2]=windowType(Int)"
        - "check(taskKey: String, maxCount: Int, windowType: Int): Boolean — 纯逻辑检查，供测试调用"
    - component: FrequencyCounterRepository
      responsibility: "DataStore Preferences 持久化执行计数 + 时间戳，支持按时间窗口过滤"
      interfaces:
        - "suspend recordExecution(taskKey: String) — 记录一次执行"
        - "suspend getExecutionCount(taskKey: String, windowType: Int): Int — 返回给定窗口内的执行次数"
        - "suspend cleanup(taskKey: String) — 清理过期记录"
    - component: ModeHistoryRepository
      responsibility: "记录每个模式的最后激活时间戳，支持查询'今天是否激活过'"
      interfaces:
        - "suspend recordActivation(modeName: String, timestamp: Long) — 记录激活时间"
        - "suspend wasActivatedToday(modeName: String): Boolean — 查询今天是否激活过"
        - "suspend getLastActivationTime(modeName: String): Long? — 获取最后激活时间"
    - component: ModeActivatedTodayConstraint
      responsibility: "约束检查：指定模式今天是否已激活过"
      interfaces:
        - "apply(runtime: TaskRuntime): AppletResult — 读取 values[0]=modeName(String)"
        - "check(modeName: String): Boolean — 纯逻辑检查，供测试调用"
  dependencies:
    - component: FrequencyConstraint
      relationship: "调用 FrequencyCounterRepository.getExecutionCount() 以判断是否超限"
    - component: ModeActivatedTodayConstraint
      relationship: "调用 ModeHistoryRepository.wasActivatedToday() 以判断是否激活过"
    - component: ModeHistoryRepository
      relationship: "被 DataStoreModeRepository.setActiveMode() 在激活模式时调用 recordActivation()"
    - component: SetAlarmAction
      relationship: "通过 ContextBridge.getContext() 获取 Context 发送 Intent"
  integration_points:
    - "SoundActionRegistry @AppletOrdinal(0x0005) 挂载 SetAlarmAction"
    - "GlobalCriterionRegistry @AppletOrdinal(0x0020) 挂载 frequencyConstraint"
    - "ModeCriterionRegistry @AppletOrdinal(0x0001) 挂载 modeActivatedToday"
    - "DataStoreModeRepository.setActiveMode() 中调用 ModeHistoryRepository.recordActivation()"
    - "AndroidManifest.xml 新增 <uses-permission android:name=\"android.permission.SET_ALARM\" />"

