  - id: T02
    title: "创建 FrequencyCounterRepository 持久化层 + 单元测试"
    description: |
      创建 FrequencyCounterRepository，使用内存实现（生产环境可接入 DataStore），记录执行次数和时间戳。

      实现要点：
      1. 定义 WindowType 枚举：HOURLY(0), DAILY(1), WEEKLY(2)
      2. 内部数据结构：ConcurrentHashMap<String, MutableList<Long>>，key=taskKey, value=执行时间戳列表
      3. recordExecution(taskKey): 追加 System.currentTimeMillis() 到列表
      4. getExecutionCount(taskKey, windowType): 过滤列表中在当前窗口内的时间戳数量
        - HOURLY: 当前小时开始时间（truncatedTo HOURS）
        - DAILY: 当天 00:00:00
        - WEEKLY: 本周一 00:00:00
      5. cleanup(taskKey): 移除超出最大窗口（7天）的旧记录
      6. 提供 createForTest() 工厂方法，跳过 DataStore

      TDD 流程：
      - RED: 测试 recordExecution 后 getExecutionCount 返回正确值；测试窗口边界
      - GREEN: 实现 FrequencyCounterRepository
      - REFACTOR: 无

