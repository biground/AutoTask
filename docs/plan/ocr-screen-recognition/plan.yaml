    title: "实现 OcrTextConstraint（OCR 文字约束 Applet）"
    description: |
      创建 app/src/main/java/top/xjunz/tasker/task/applet/criterion/OcrTextConstraint.kt:
      
      参考 GeofenceConstraint 模式，直接继承 Applet()：
      
      ```kotlin
      class OcrTextConstraint(
          private val matchMode: OcrTextMatchMode,
          private val ocrManager: OcrManager = OcrManager
      ) : Applet() {
      
          override suspend fun apply(runtime: TaskRuntime): AppletResult {
              // values[0]: 匹配文本/正则（String）
              // values[1]: 区域左边界百分比（Float，可选）
              // values[2]: 区域上边界百分比（Float，可选）
              // values[3]: 区域右边界百分比（Float，可选）
              // values[4]: 区域下边界百分比（Float，可选）
              
              val matchText = values[0] as? String ?: return AppletResult.EMPTY_FAILURE
              val region = OcrUtils.buildRegionFromValues(values)  // 从 values[1..4] 构建 Rect? (null = 全屏)，T09 复用此方法
              
              val result = ocrManager.recognizeScreen(region) ?: return AppletResult.EMPTY_FAILURE
              
              val matched = when (matchMode) {
                  CONTAINS -> result.fullText.contains(matchText)
                  EXACT -> result.fullText == matchText
                  REGEX -> {
                      // ReDoS 防护：用户输入的正则有 200ms 超时保护
                      kotlinx.coroutines.withTimeoutOrNull(200) {
                          matchText.toRegex().containsMatchIn(result.fullText)
                      } ?: false
                  }
              }
              
              return if (isInverted) AppletResult.emptyResult(!matched)
              else AppletResult.emptyResult(matched)
          }
      }
      ```
      
      编写单元测试（mock OcrManager）：
