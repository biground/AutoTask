  - id: "T06"
    title: "实现 OcrManager 编排器（截图→OCR 管线）"
    description: |
      创建 app/src/main/java/top/xjunz/tasker/task/ocr/OcrManager.kt:
      
      ```kotlin
      object OcrManager {
          private var provider: OcrProvider = MlKitOcrProvider()
          private var screenshotProvider: ScreenshotProvider? = null
          private var lastResult: OcrResult? = null
          private var lastResultTimestamp: Long = 0
          private const val RESULT_TTL_MS = 2000L  // lastResult 缓存 TTL
          
          /** lazy init：首次调用 recognizeScreen() 时自动通过 OperatingMode 检测并创建 ScreenshotProvider */
          fun init(screenshotProvider: ScreenshotProvider) { ... }
          fun setProvider(provider: OcrProvider) { ... }
          
          suspend fun recognizeScreen(region: Rect? = null): OcrResult? {
              val bitmap = screenshotProvider?.takeScreenshot(region) 
                  ?: return null
              try {
                  val result = provider.recognize(bitmap, null) // region 已在截图时裁剪
                  lastResult = result
                  lastResultTimestamp = System.currentTimeMillis()
                  return result
              } finally {
                  bitmap.recycle()
              }
          }
          
          fun getLastResult(): OcrResult? {
              // TTL 检查：超过 2000ms 的缓存返回 null
              if (System.currentTimeMillis() - lastResultTimestamp > RESULT_TTL_MS) return null
              return lastResult
          }
          
          fun release() {
              provider.release()
              lastResult = null
          }
      }
      ```
      
      编写单元测试（mock ScreenshotProvider 和 OcrProvider）。
