plan_id: ocr-screen-recognition
objective: "实现屏幕 OCR 识别功能（ML Kit 离线 + 可插拔云端增强），支持全屏/区域识别、包含/正则/精确匹配，集成为约束器和动作"
created_at: "2026-04-10"
created_by: gem-planner
status: pending_approval
research_confidence: high

plan_metrics:
  total_tasks: 18
  total_waves: 5
  wave_1_task_count: 4
  total_dependencies: 26
  risk_score: medium

tldr: |
  实现 OCR 屏幕识别功能分 5 个阶段、18 个任务：
  Wave 1 — 基础设施：ML Kit 依赖 + ProGuard、数据模型（OcrResult/TextBlock/OcrTextMatchMode）、OcrProvider 可插拔接口、ScreenshotProvider 统一截图封装
  Wave 2 — 核心引擎：MlKitOcrProvider 实现、OcrManager 编排器（引擎选择/区域裁剪/缓存）
  Wave 3 — Applet 实现：OcrTextConstraint（3 种匹配模式）+ OcrRecognizeAction（文字→变量）
  Wave 4 — 注册与 UI：ScreenOcrCriterionRegistry + ScreenOcrActionRegistry、BootstrapOptionRegistry/AppletOptionFactory 全局注册、OCR 设置 UI（引擎选择/云端配置）、区域选择器 UI
  Wave 5 — 集成验证：编译验证 + 端到端单元测试
  关键风险：ML Kit 中文识别首次模型加载延迟 (~1-2s)、截图→OCR 管线性能、bundled 模型增加 APK 体积 (~26 MB)

open_questions:
  - "云端 OCR Provider（腾讯 OCR / Google Cloud Vision / PaddleOCR Lite）的具体选型和集成优先级——Wave 4 仅定义接口，实际云端实现留后续迭代"

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "ML Kit bundled 中文模型首次加载耗时 1-2s，在 Applet apply() 中导致宏执行超时"
      likelihood: medium
      impact: medium
      mitigation: "OcrManager 采用单例模式预加载 TextRecognizer；首次调用时 lazy 初始化；后续调用无加载开销"
    - scenario: "截图→OCR 全管线耗时 >500ms，频繁触发场景中积压"
      likelihood: medium
      impact: medium
      mitigation: "OcrManager 提供 lastResult 缓存（TTL 可配），支持区域裁剪减少识别面积"
    - scenario: "A11y 模式下截图时浮窗未隐藏，导致 OCR 识别到 overlay 文字"
      likelihood: low
      impact: high
      mitigation: "ScreenshotProvider A11y 实现中截图前隐藏浮窗 rootView（参考 InspectorViewOverlay 已有逻辑）"
    - scenario: "APK 体积因 bundled 中文模型增加 ~26 MB，用户投诉安装包过大"
      likelihood: low
      impact: low
      mitigation: "使用 Android App Bundle (AAB) 按需分发；后续可提供仅拉丁文轻量模式 (~4 MB)"
  assumptions:
    - "ML Kit text-recognition-chinese 16.0.1 bundled 版不依赖 GMS，国内设备可直接运行"
    - "项目最低 API 为 Android 9 (API 28)，Shizuku 截图和 A11y 截图 (API 30+) 至少有一条路径可用"
    - "现有 Applet 参数体系 (values map + withValueArgument) 足以承载 OCR 参数"
    - "参考 TextCriterionRegistry 模式，为每种匹配模式注册独立选项（而非 enum 参数选择）"

implementation_specification:
  code_structure: |
    新增代码组织为三层：
    1. OCR 基础层：ocr/ 目录 — OcrProvider 接口 + 数据模型 + ScreenshotProvider + MlKitOcrProvider + OcrManager
    2. Applet 层：criterion/ 和 action/ — OcrTextConstraint + OcrRecognizeAction
    3. 注册层：registry/ — ScreenOcrCriterionRegistry + ScreenOcrActionRegistry + BootstrapOptionRegistry/AppletOptionFactory 修改
    4. UI 层：ui/task/ — OCR 设置对话框 + 区域选择器
  affected_areas:
    - "app/build.gradle — 新增 ML Kit 依赖"
    - "app/proguard-rules.pro — ML Kit ProGuard 规则"
    - "app/src/main/java/top/xjunz/tasker/task/ocr/ — 新目录：基础设施"
    - "app/src/main/java/top/xjunz/tasker/task/applet/criterion/ — 新增 OcrTextConstraint"
    - "app/src/main/java/top/xjunz/tasker/task/applet/action/ — 新增 OcrRecognizeAction"
    - "app/src/main/java/top/xjunz/tasker/task/applet/option/registry/ — 新增 OCR Registry + 修改 BootstrapOptionRegistry"
    - "app/src/main/java/top/xjunz/tasker/task/applet/option/AppletOptionFactory.kt — 注册 OCR Registry"
    - "app/src/main/res/values/strings.xml — OCR 相关字符串资源"
    - "app/src/main/res/layout/ — OCR 设置和区域选择器布局"
    - "app/src/test/ — OCR 单元测试"
  component_details:
    - component: "OcrResult / TextBlock / OcrTextMatchMode"
      responsibility: "OCR 结果数据模型和文字匹配模式枚举"
      interfaces:
        - "data class OcrResult(val fullText: String, val blocks: List<TextBlock>, val processingTimeMs: Long)"
        - "data class TextBlock(val text: String, val boundingBox: Rect, val confidence: Float)"
        - "enum class OcrTextMatchMode { CONTAINS, REGEX, EXACT }"
    - component: "OcrProvider"
      responsibility: "可插拔 OCR 引擎接口，支持 ML Kit/云端等多种实现"
      interfaces:
        - "suspend fun recognize(bitmap: Bitmap, region: Rect?): OcrResult?"
        - "fun isAvailable(): Boolean"
        - "val name: String"
    - component: "ScreenshotProvider"
      responsibility: "统一截图封装，自动选择 A11y/Shizuku 路径，支持区域裁剪"
      interfaces:
        - "suspend fun takeScreenshot(crop: Rect?): Bitmap?"
    - component: "MlKitOcrProvider"
      responsibility: "ML Kit 离线 OCR 实现（中文 bundled）"
      interfaces:
        - "suspend fun recognize(bitmap: Bitmap, region: Rect?): OcrResult?"
    - component: "OcrManager"
      responsibility: "OCR 编排器：管理引擎选择、执行识别、缓存结果"
      interfaces:
        - "suspend fun recognizeScreen(region: Rect?): OcrResult?"
        - "fun setProvider(provider: OcrProvider)"
        - "fun getLastResult(): OcrResult?"
    - component: "OcrTextConstraint"
      responsibility: "Criterion Applet：判断屏幕文字是否包含/精确/正则匹配指定文本"
      interfaces:
        - "override suspend fun apply(runtime: TaskRuntime): AppletResult"
    - component: "OcrRecognizeAction"
      responsibility: "Action Applet：执行 OCR 识别并将结果输出到变量引用"
      interfaces:
        - "override suspend fun apply(runtime: TaskRuntime): AppletResult"
    - component: "ScreenOcrCriterionRegistry"
      responsibility: "注册 OCR 约束选项（包含/精确/正则 三种匹配模式）"
      interfaces:
        - "@AppletOrdinal 注册 ocrTextContains / ocrTextEquals / ocrTextMatches"
    - component: "ScreenOcrActionRegistry"
      responsibility: "注册 OCR 动作选项（识别屏幕文字→输出到变量）"
      interfaces:
        - "@AppletOrdinal 注册 recognizeScreenText"
  dependencies:
    - component: "OcrTextConstraint"
      relationship: "调用 OcrManager.recognizeScreen() → 获取 OcrResult → 匹配文字"
    - component: "OcrRecognizeAction"
      relationship: "调用 OcrManager.recognizeScreen() → 返回 AppletResult.succeeded(fullText)"
    - component: "OcrManager"
