      ```kotlin
      package top.xjunz.tasker.task.ocr
      
      import android.graphics.Bitmap
      import android.graphics.Rect
      
      /**
       * 可插拔 OCR 引擎接口
       * 
       * 实现方：MlKitOcrProvider（离线）、未来的云端 Provider（腾讯OCR/Cloud Vision）
       */
      interface OcrProvider {
          /** 引擎名称（用于 UI 显示和持久化选择） */
          val name: String
          
          /** 当前引擎是否可用（如 ML Kit 是否初始化成功） */
          fun isAvailable(): Boolean
          
          /**
           * 执行 OCR 识别
           * @param bitmap 输入图像
           * @param region 识别区域（null 表示全图）
           * @return 识别结果，失败返回 null
           */
          suspend fun recognize(bitmap: Bitmap, region: Rect? = null): OcrResult?
          
          /** 释放资源 */
          fun release()
      }
      ```
      
      编写接口契约测试（使用 mock 实现验证接口签名）。
