# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 7. 发现的模式
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
patterns_found:
  - category: architecture
    pattern: "双模式引擎: A11y Service + Shizuku"
    description: |
      项目支持两种运行模式:
      - A11yAutomatorService (无障碍服务模式) — 普通权限
      - ShizukuAutomatorService (Shizuku 特权模式) — UiAutomation 全能力
      两者共享 AutomatorService 接口和 CoroutineUiAutomatorBridge 桥接层
    examples:
      - file: "A11yAutomatorService.kt"
        location: "app/.../service/A11yAutomatorService.kt:59"
        snippet: "class A11yAutomatorService : AccessibilityService(), AutomatorService, IUiAutomationConnection"
      - file: "ShizukuAutomatorService.kt"
        location: "app/.../service/ShizukuAutomatorService.kt:42"
        snippet: "class ShizukuAutomatorService : AutomatorService"
    prevalence: common

  - category: architecture
    pattern: "Applet 注册表模式"
    description: |
      所有 Applet (触发器/动作/约束) 通过 *Registry 类注册
      使用 @AppletOrdinal 注解定义顺序
      约束使用 Criterion<TargetType, ValueType> 泛型体系
      OCR 约束应遵循此模式
    examples:
      - file: "UiObjectCriterionRegistry.kt"
        location: "app/.../registry/UiObjectCriterionRegistry.kt:35"
        snippet: "class UiObjectCriterionRegistry(id: Int) : AppletOptionRegistry(id)"
      - file: "GeofenceConstraint.kt"
        location: "app/.../criterion/GeofenceConstraint.kt"
