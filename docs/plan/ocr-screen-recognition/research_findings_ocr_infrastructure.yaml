# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 8. 相关架构
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
related_architecture:
  components_relevant_to_domain:
    - component: "AutomatorService (接口)"
      responsibility: "定义自动化服务契约: uiAutomatorBridge, eventDispatcher 等"
      location: "app/.../service/AutomatorService.kt"
      relationship_to_domain: "OCR 需通过此接口访问截图 API"

    - component: "CoroutineUiAutomatorBridge"
      responsibility: "协程化 UiAutomation 封装, 事件监听和 UI 操控核心"
      location: "coroutine-ui-automator/src/main/java/.../CoroutineUiAutomatorBridge.kt"
      relationship_to_domain: "OCR 可通过 bridge.uiAutomation.takeScreenshot() 获取截图 (Shizuku 模式)"

    - component: "Environment (全局访问点)"
      responsibility: "提供 currentService, uiAutomatorBridge, uiAutomation, uiDevice 全局快捷访问"
      location: "app/.../service/Environment.kt"
      relationship_to_domain: "OCR Applet 可通过 Environment 获取截图能力"

    - component: "AppletOptionRegistry"
      responsibility: "Applet 注册基类"
      location: "app/.../registry/AppletOptionRegistry.kt"
      relationship_to_domain: "OCR 约束/动作需创建新的 Registry 继承此类"

    - component: "BootstrapOptionRegistry"
      responsibility: "所有 Registry ID 的中央注册"
      location: "app/.../registry/BootstrapOptionRegistry.kt"
      relationship_to_domain: "需为 OCR Registry 分配新 ID"

  data_flow_involving_domain: |
    OCR 管线数据流:
    1. 截图: AutomatorService → UiAutomation/A11y API → Bitmap
    2. 识别: Bitmap → ML Kit TextRecognizer → Text 对象 (含文本块/行/元素 + 边界框)
    3. 匹配: Text.textBlocks → 提取文本 → 匹配用户配置的关键字/正则
    4. 输出: 匹配结果作为 AppletResult 返回 / 文本存入变量供后续引用

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 9. 技术风险
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
domain_security_considerations:
  sensitive_areas:
    - area: "截图内容"
      location: "OCR 管线全程"
      concern: "截图可能包含敏感信息 (密码、银行APP等), Bitmap 应在内存中处理后立即回收, 不持久化"
    - area: "百度 OCR 云端上传"
      location: "如使用百度 OCR"
      concern: "截图上传到第三方服务器有隐私泄露风险, 应明确告知用户并提供关闭选项"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 10. 开放问题和差距
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
open_questions:
  - question: "ML Kit Text Recognition bundled 版本在无 GMS 设备上是否完全可用?"
    context: "国内部分设备无 Google Play Services, 需确认 com.google.mlkit:text-recognition-chinese 是否为 bundled (自带模型)"
    type: decision_blocker
    affects: ["EX-008", "A-SCR-012"]

  - question: "OCR 轮询频率如何限制以避免高 CPU/电池消耗?"
    context: "T-APP-004 (Screenshot Content 触发器) 需要定期截图+OCR, 频率需权衡准确性和功耗"
    type: research
    affects: ["T-APP-004"]

  - question: "OCR 识别区域是否需要支持用户自定义裁剪?"
    context: "全屏 OCR 耗时较长, 用户可能只关心屏幕特定区域的文字变化"
    type: nice_to_know
    affects: ["A-SCR-009", "T-APP-004"]

gaps:
  - area: "统一截图服务"
    description: |
      需要创建 ScreenshotService/ScreenshotProvider 统一 A11y 和 Shizuku 两种截图路径:
      - A11y 模式: AccessibilityService.takeScreenshot() (async callback)
      - Shizuku 模式: UiAutomation.takeScreenshot() (sync, 返回 Bitmap)
      提供统一 suspend fun takeScreenshot(crop: Rect?): Bitmap? 接口
    impact: research_blocker
    affects: ["EX-008", "A-SCR-005", "A-SCR-006", "A-SCR-009", "T-APP-004"]

  - area: "OCR SDK 集成"
    description: "需要添加 ML Kit Text Recognition 依赖并创建 OCR 服务封装"
    impact: research_blocker
    affects: ["EX-008", "A-SCR-012"]

  - area: "OCR Applet 注册"
    description: |
      需要创建:
      - ScreenOcrCriterionRegistry (或 ScreenCriterionRegistry)
      - OcrTextAction (执行 OCR 并输出文本)
      - 在 BootstrapOptionRegistry 中分配 ID 和注册
    impact: nice_to_know
    affects: ["A-SCR-005", "A-SCR-009", "A-SCR-012"]
