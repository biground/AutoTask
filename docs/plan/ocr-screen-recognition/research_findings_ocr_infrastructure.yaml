plan_id: ocr-screen-recognition
objective: "分析 AutoPilot 项目中实现屏幕 OCR 识别所需的现有基础设施"
focus_area: "截图能力、UI 文本获取、OCR SDK、Applet 约束模式"
created_at: "2026-04-10"
created_by: researcher
status: completed

tldr: |
  - 项目已具备两种截图能力: (1) Accessibility Service 的 takeScreenshot (Android 11+, 已在 InspectorViewOverlay 中使用),
    (2) Shizuku 模式下 UiAutomation.takeScreenshot() (通过 UiAutomatorBridge, 已封装为 takeScreenshot(File, int))
  - 已有完善的 UI 文本获取能力: 通过 AccessibilityNodeInfo 获取 text/contentDescription/viewIdResourceName,
    UiObjectCriterionRegistry 提供 textEquals/textContains/textPattern 等 6 种文本匹配约束
  - 项目尚未引入任何 OCR SDK 依赖 (无 ML Kit, 无百度 OCR), 需从零集成
  - OCR 功能规划在 V2 阶段, 涉及 EX-008 (OCR 文字识别) 和 A-SCR-012 (Text from Image OCR),
    以及 T-APP-004 (Screenshot Content 触发器)、A-SCR-005/009 (截图文字检查动作)
  - 关键风险: ML Kit 中文识别精度、截图性能开销、Accessibility Service 与 OCR 管线的线程协调

research_metadata:
  methodology: "hybrid retrieval: semantic_search + grep_search + read_file, 3 passes"
  scope: "全项目源码 (app/, coroutine-ui-automator/, ui-automator/, hidden-apis/), 文档 (docs/), 构建配置 (build.gradle)"
  confidence: high
  coverage: 92
  decision_blockers: 1  # ML Kit vs 百度 OCR 选型
  research_blockers: 0

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 1. 现有截图能力
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
screenshot_capabilities:
  summary: "项目已具备两种截图路径, 均可用于 OCR 输入"

  accessibility_service_screenshot:
    available: true
    api_level: "Android 11+ (API 30)"
    location: "app/src/main/java/top/xjunz/tasker/task/inspector/overlay/InspectorViewOverlay.kt:210-240"
    mechanism: |
      调用 AccessibilityService.takeScreenshot(displayId, executor, callback)
      回调返回 ScreenshotResult, 通过 HardwareBuffer → Bitmap.wrapHardwareBuffer() 得到 Bitmap
    config: "app/src/main/res/xml/automator_service.xml 已声明 android:canTakeScreenshot=\"true\""
    current_usage: "仅用于 Inspector 浮窗截图 (调试工具), 非引擎核心管线"
    pros:
      - "无需额外权限 (Accessibility Service 已声明)"
      - "API 简洁, 直接得到 Bitmap"
    cons:
      - "仅 Android 11+ 可用"
      - "异步回调模式, 需协程包装"
      - "Inspector 截图时会隐藏浮窗 rootView (rootView.isVisible = false 再截)"

  shizuku_uiautomation_screenshot:
    available: true
    api_level: "Android 9+ (API 28, 通过 UiAutomation)"
    location: "ui-automator/src/main/java/androidx/test/uiautomator/bridge/UiAutomatorBridge.java:132-148"
    mechanism: |
      mUiAutomation.takeScreenshot() → 返回 Bitmap
      已封装为 takeScreenshot(File, int) 方法 (保存为 PNG)
    access_path: |
      ShizukuAutomatorService → PrivilegedUiAutomatorBridge → uiAutomation.takeScreenshot()
      通过 Environment.uiAutomation 全局访问
    pros:
      - "同步调用, 返回 Bitmap"
      - "更低 API 支持 (API 28+)"
      - "不需要隐藏 UI 覆盖层"
    cons:
      - "仅 Shizuku 模式可用 (特权进程)"
      - "A11yAutomatorService 的 IUiAutomationConnection.takeScreenshot() 返回 unsupportedOperation()"

  hidden_api_aidl:
    location: "hidden-apis/src/main/aidl/android/app/IUiAutomationConnection.aidl:24"
    signature: "Bitmap takeScreenshot(in Rect crop, int rotation)"
    note: "AIDL 接口定义, 可裁剪指定区域 + 旋转"

  gap_for_ocr: |
    截图能力已就绪, 但需要创建统一截图服务:
    - 自动选择 A11y 或 Shizuku 截图路径
    - 返回 Bitmap 供 OCR SDK 消费
    - 支持区域裁剪 (Rect crop)

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 2. 现有 UI 文本获取能力 (无障碍服务)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
ui_text_capabilities:
  summary: "通过 AccessibilityNodeInfo 已有完整的文本获取和匹配能力"

  node_text_access:
    location: "app/.../registry/UiObjectCriterionRegistry.kt"
    supported_properties:
      - property: "text"
        description: "AccessibilityNodeInfo.text — 控件文本内容"
        criteria:
          - "textEquals (精确匹配, 可取反)"
          - "textStartsWith / textEndsWith"
          - "textContains (包含匹配)"
          - "textPattern (正则匹配)"
          - "textLengthRange (文本长度范围)"
      - property: "contentDescription"
        description: "AccessibilityNodeInfo.contentDescription"
        criteria: ["contentDesc (精确匹配)"]
      - property: "viewIdResourceName"
        description: "控件的 View ID"
        criteria: ["withId (精确匹配)"]
      - property: "className"
        description: "控件类型 (类名)"
        criteria: ["isType (预设数组匹配)"]

  text_criterion_registry:
    location: "app/.../registry/TextCriterionRegistry.kt"
    description: "通用文本条件 (不依赖 AccessibilityNodeInfo)"
    criteria:
      - "equalsTo / startsWith / endsWith / contains / matches(regex)"

  ui_object_flow:
    contains_ui_object:
      location: "app/.../flow/ContainsUiObject.kt"
      description: |
        在窗口节点树中递归搜索匹配的 UI 对象
        使用 AccessibilityNodeInfo.findFirst() 遍历
    ui_object_matches:
      location: "app/.../flow/UiObjectMatches.kt"
      description: "检查 UI 对象是否匹配 criterion scope 内的所有条件"

  limitation_for_ocr: |
    无障碍节点只能获取系统渲染的文本 (node.text), 无法识别:
    - 图片中的文字 (ImageView 显示的文字)
    - Canvas 绘制的文字
    - 游戏画面中的文字
    - PDF/网页图片中的文字
    这正是 OCR 需要解决的核心场景

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 3. 现有 Applet 约束模式分析
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
applet_constraint_patterns:
  criterion_directory: "app/src/main/java/top/xjunz/tasker/task/applet/criterion/"
  existing_criteria:
    - file: "BoundsCriterion.kt"
      purpose: "UI 控件边界/位置约束 (left/right/top/bottom/width/height)"
    - file: "CompareOp.kt"
      purpose: "比较操作符定义"
    - file: "CompareValuesConstraint.kt"
      purpose: "值比较约束"
    - file: "EventFilter.kt"
      purpose: "事件过滤 (包括地理围栏事件等)"
    - file: "FileEventCriterion.kt"
      purpose: "文件事件约束"
    - file: "GeofenceConstraint.kt"
      purpose: "地理围栏约束 (最近实现)"
    - file: "ModeConstraint.kt"
      purpose: "模式约束"
    - file: "NumberRangeCriterion.kt"
      purpose: "数值范围约束"
    - file: "VariableConstraint.kt"
      purpose: "变量约束"

  registry_pattern:
    description: |
      所有约束通过 *Registry 类注册, 使用 @AppletOrdinal 定义顺序
      约束实现继承 Criterion<TargetType, ValueType> 或使用 propertyCriterion()/createCriterion() 工厂方法
    example_registries:
      - "UiObjectCriterionRegistry — UI 对象条件"
      - "TextCriterionRegistry — 文本条件"
      - "GlobalCriterionRegistry — 全局条件"
      - "LocationCriterionRegistry — 位置条件"

  ocr_integration_pattern: |
    OCR 约束建议参考 GeofenceConstraint 模式:
    - 创建 OcrTextCriterion 继承 Applet/Criterion
    - 在 BootstrapOptionRegistry 中分配 ID
    - 创建 ScreenOcrCriterionRegistry 注册 Applet

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 4. SDK 和依赖分析
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
sdk_dependencies:
  current_ocr_deps: "无 — 项目尚未引入任何 OCR 相关依赖"
  build_gradle_location: "app/build.gradle:72-128"

  ml_kit_analysis:
    name: "Google ML Kit Text Recognition"
    maven_coord: "com.google.mlkit:text-recognition-chinese:16.x.x"
    model_size: "~26 MB (中文模型, on-device)"
    pros:
      - "完全离线, 无网络依赖 (隐私友好)"
      - "Google 官方维护, 持续更新"
      - "支持中日韩文字识别 (text-recognition-chinese)"
      - "支持拉丁/日文/韩文等多脚本"
      - "免费, 无 API 调用限制"
      - "Android 生态原生集成, 与 CameraX/Bitmap 直接适配"
      - "API 简洁: InputImage.fromBitmap() → recognizer.process() → Text 对象"
    cons:
      - "模型大小增加 APK 体积 (~26 MB)"
      - "中文手写体/艺术字识别精度一般"
      - "首次加载模型有延迟 (~1-2s)"
      - "需要 Google Play Services (部分国内设备缺失)"

  baidu_ocr_analysis:
    name: "百度 OCR SDK"
    maven_coord: "需手动集成 AAR"
    pros:
      - "中文识别精度高 (尤其场景文字)"
      - "不依赖 Google Play Services"
      - "支持多种识别模式 (通用/高精度/手写体/身份证等)"
    cons:
      - "需要网络请求 (云端识别)"
      - "有 API 调用限制和收费 (免费配额有限)"
      - "需要注册百度开发者账号和 API Key"
      - "隐私风险 (截图上传到百度服务器)"
      - "离线 SDK 体积更大, 需单独集成"
      - "SDK 文档和维护不如 Google 稳定"

  recommendation: |
    推荐方案: ML Kit 为主, 百度 OCR 为可选降级
    理由:
    1. ML Kit 离线识别 — 符合自动化引擎低延迟需求 (截图→识别→动作 全在本地)
    2. 无 API 调用限制 — 高频 OCR (如 "屏幕出现文字 X 时触发") 不会被限流
    3. 隐私 — 截图不出设备
    4. AGENTS.md 已明确 "OCR 使用 ML Kit 或百度 OCR", ML Kit 应作为首选
    
    对于无 Google Play Services 的国内设备:
    - ML Kit 的 unbundled 版本需要 GMS; bundled 版本打包模型到 APK 可不依赖 GMS
    - 使用 com.google.mlkit:text-recognition-chinese (bundled) 而非 com.google.android.gms:play-services-mlkit-text-recognition
    - 百度 OCR 作为 fallback, 可在设置中让用户填 API Key

