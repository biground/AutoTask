# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 8. 推荐的 OCR Constraint/Action 实现方案
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
recommended_ocr_implementation:

  # ── A. OCR Criterion（约束：屏幕上是否包含指定文字）──
  ocr_criterion:
    class_name: "OcrTextCriterion"
    base_class: "Applet()"
    file_path: "app/src/main/java/top/xjunz/tasker/task/applet/criterion/OcrTextCriterion.kt"
    design: |
      class OcrTextCriterion(
          private val screenshotProvider: suspend () -> Bitmap?,
          private val textRecognizer: TextRecognizer
      ) : Applet() {
      
          override suspend fun apply(runtime: TaskRuntime): AppletResult {
              val keyword = values[0] as? String ?: return AppletResult.EMPTY_FAILURE
              
              val bitmap = screenshotProvider() ?: return AppletResult.EMPTY_FAILURE
              try {
                  val inputImage = InputImage.fromBitmap(bitmap, 0)
                  val text = recognizeText(inputImage) ?: return AppletResult.EMPTY_FAILURE
                  
                  val fullText = text.text
                  val matched = fullText.contains(keyword)
                  
                  return if (isInverted) {
                      AppletResult.emptyResult(!matched)
                  } else {
                      AppletResult.emptyResult(matched)
                  }
              } finally {
                  bitmap.recycle()
              }
          }
      }
    
    registry_options: |
      # 参考 TextCriterionRegistry 为每种匹配模式注册独立选项
      @AppletOrdinal(0x0000)
      val ocrTextContains = invertibleAppletOption(R.string.ocr_screen_contains_text) {
          OcrTextCriterion(screenshotProvider, recognizer)
      }.withValueArgument<String>(R.string.ocr_keyword)
      
      @AppletOrdinal(0x0001)
      val ocrTextEquals = invertibleAppletOption(R.string.ocr_screen_text_equals) {
          OcrTextExactCriterion(screenshotProvider, recognizer)
      }.withValueArgument<String>(R.string.ocr_target_text)
      
      @AppletOrdinal(0x0002)
      val ocrTextMatches = invertibleAppletOption(R.string.ocr_screen_text_matches) {
          OcrTextRegexCriterion(screenshotProvider, recognizer)
      }.withValueArgument<String>(R.string.ocr_regex_pattern)

  # ── B. OCR Action（动作：执行 OCR 并输出文本到变量）──
  ocr_action:
    class_name: "OcrRecognizeAction"
    base_class: "Action()"
    file_path: "app/src/main/java/top/xjunz/tasker/task/applet/action/OcrRecognizeAction.kt"
    design: |
      class OcrRecognizeAction(
          private val screenshotProvider: suspend () -> Bitmap?,
          private val textRecognizer: TextRecognizer
      ) : Action() {
      
          override suspend fun apply(runtime: TaskRuntime): AppletResult {
              val bitmap = screenshotProvider() ?: return AppletResult.EMPTY_FAILURE
              try {
                  val inputImage = InputImage.fromBitmap(bitmap, 0)
                  val text = recognizeText(inputImage) ?: return AppletResult.EMPTY_FAILURE
                  
                  // 返回识别的完整文本，供下游通过 .withResult 引用
                  return AppletResult.succeeded(text.text)
              } finally {
                  bitmap.recycle()
              }
          }
      }
    
    registry_options: |
      @AppletOrdinal(0x0000)
      val recognizeScreenText = appletOption(R.string.ocr_recognize_screen) {
          OcrRecognizeAction(screenshotProvider, recognizer)
      }.withResult<String>(R.string.ocr_recognized_text)  // 输出引用：识别的文本
      
      # 后续可扩展：
      # - 区域截图 OCR (.withValueArgument<Long>(R.string.ocr_region, VariantArgType.BITS_BOUNDS))
      # - OCR 识别结果含坐标信息

  # ── C. ScreenOcrCriterionRegistry ──
  ocr_criterion_registry:
    class_name: "ScreenOcrCriterionRegistry"
    file_path: "app/src/main/java/top/xjunz/tasker/task/applet/option/registry/ScreenOcrCriterionRegistry.kt"
    id: "0x1B"

  # ── D. ScreenOcrActionRegistry ──
  ocr_action_registry:
    class_name: "ScreenOcrActionRegistry"
    file_path: "app/src/main/java/top/xjunz/tasker/task/applet/option/registry/ScreenOcrActionRegistry.kt"
    id: "0x5B"

  # ── E. TextRecognizer 单例管理 ──
  recognizer_singleton: |
    建议创建 OcrManager 单例管理 TextRecognizer 生命周期:
    
    object OcrManager {
        private var recognizer: TextRecognizer? = null
        
        fun getRecognizer(): TextRecognizer {
            return recognizer ?: TextRecognition.getClient(
                ChineseTextRecognizerOptions.Builder().build()
            ).also { recognizer = it }
        }
        
        suspend fun recognizeText(bitmap: Bitmap): Text? {
            val input = InputImage.fromBitmap(bitmap, 0)
            return suspendCancellableCoroutine { cont ->
                getRecognizer().process(input)
                    .addOnSuccessListener { cont.resume(it, null) }
                    .addOnFailureListener { cont.resume(null, null) }
            }
        }
        
        fun release() {
            recognizer?.close()
            recognizer = null
        }
    }

  # ── F. 完整注册步骤清单 ──
  registration_checklist:
    - step: "1. 添加 ML Kit 依赖"
      detail: "app/build.gradle → implementation 'com.google.mlkit:text-recognition-chinese:16.0.1'"
    
    - step: "2. 创建 OcrManager 单例"
      detail: "app/.../task/ocr/OcrManager.kt — 封装 TextRecognizer + 截图 Provider"
    
    - step: "3. 创建 OcrTextCriterion / OcrRecognizeAction"
      detail: "app/.../task/applet/criterion/OcrTextCriterion.kt, app/.../task/applet/action/OcrRecognizeAction.kt"
    
    - step: "4. 创建 ScreenOcrCriterionRegistry + ScreenOcrActionRegistry"
      detail: "app/.../option/registry/ScreenOcrCriterionRegistry.kt, ScreenOcrActionRegistry.kt"
    
    - step: "5. BootstrapOptionRegistry 添加 ID 常量"
      detail: |
        const val ID_SCREEN_OCR_CRITERION_REGISTRY = 0x1B
        const val ID_SCREEN_OCR_ACTION_REGISTRY = 0x5B
    
    - step: "6. BootstrapOptionRegistry 添加入口选项"
      detail: |
        @AppletOrdinal(0x001A) val screenOcrCriteria = flowOptionWithId<PhantomFlow>(...)
        @AppletOrdinal(0x0045) val screenOcrActions = flowOptionWithId<PhantomFlow>(...)
    
    - step: "7. 注册到 criterionFlowOptions / actionFlowOptions 数组"
      detail: "在 getRegistryOptions() 使用的数组中加入新选项"
    
    - step: "8. AppletOptionFactory 注册 Registry 实例"
      detail: |
        val screenOcrCriterionRegistry = ScreenOcrCriterionRegistry(
            BootstrapOptionRegistry.ID_SCREEN_OCR_CRITERION_REGISTRY
        )
        并添加到 allRegistries 数组
    
    - step: "9. 添加字符串资源"
      detail: "app/src/main/res/values/strings.xml — 添加 OCR 相关字符串"
    
    - step: "10. 编写单元测试"
      detail: "OcrTextCriterionTest, OcrRecognizeActionTest (mock 截图和 TextRecognizer)"

