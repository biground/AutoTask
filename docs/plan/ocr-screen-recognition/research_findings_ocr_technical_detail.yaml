plan_id: ocr-screen-recognition
objective: "深入研究实现屏幕 OCR 识别功能的技术细节：截图 API、ML Kit API、Applet 模式、Registry 注册、VariantArgType、权限与触发时机"
focus_area: "截图 API 详细实现、ML Kit V2 API、Applet/Criterion/Action 模式、Registry ID 分配、VariantArgType 类型体系"
created_at: "2026-04-10"
created_by: researcher
status: completed

tldr: |
  - 截图 API 有两条路径：(1) A11y Service takeScreenshot → async callback → HardwareBuffer → Bitmap (Android 11+, 已在 InspectorViewOverlay 使用)
    (2) Shizuku UiAutomation.takeScreenshot() → sync 返回 Bitmap (API 28+, UiAutomatorBridge 已封装)
  - ML Kit bundled 中文模块 com.google.mlkit:text-recognition-chinese 不依赖 GMS，API: InputImage.fromBitmap → TextRecognizer.process → Text(blocks → lines → elements + boundingBox + confidence)
  - Applet 模式分两种：Criterion<T,V> 用于约束（自动处理 invert + values 提取），直接继承 Applet() 重写 apply() 用于自定义逻辑（如 GeofenceConstraint）
  - 下一个可用 Criterion Registry ID = 0x1B，Action Registry ID = 0x5B；下一个 BootstrapOptionRegistry @AppletOrdinal: criterion = 0x001A，action = 0x0045
  - VariantArgType 定义了 12 种 INT 变体、7 种 TEXT 变体、5 种 LONG/BITS 变体，OCR 可复用 TEXT_* 系列，无需新增

research_metadata:
  methodology: "hybrid retrieval: semantic_search + grep_search + read_file，3 passes. 第一轮搜索截图 API 和已有研究文档；第二轮深入 Criterion/Action/Registry 源码；第三轮分析 VariantArgType 和 withResult 模式"
  scope: "app/src/main (service/, task/applet/, task/inspector/), tasker-engine/src/main (engine/applet/), ui-automator/src/main, hidden-apis/, app/build.gradle, docs/"
  confidence: high
  coverage: 95
  decision_blockers: 0
