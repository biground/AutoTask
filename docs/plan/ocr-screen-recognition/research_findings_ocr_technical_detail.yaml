# 10. 模式总结
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
patterns_found:
  - category: architecture
    pattern: "withResult 输出引用模式"
    description: |
      Action 通过 AppletResult.succeeded(value) 返回结果，
      在 Registry 中通过 .withResult<Type>(R.string.xxx) 声明可引用的输出，
      下游 Applet 通过 .withRefArgument 绑定引用。
      OCR Action 可通过此模式输出识别文本。
    examples:
      - file: "ControlActionRegistry.kt"
        location: "app/.../registry/ControlActionRegistry.kt:69-71"
        snippet: ".withResult<Repeat>(R.string.loop).withResult<Int>(R.string.repeated_count).withResult<String>(R.string.repeated_count)"
      - file: "UiObjectFlowRegistry.kt"
        location: "app/.../registry/UiObjectFlowRegistry.kt:23-25"
        snippet: ".withResult<String>(R.string.ui_object_text).withResult<Int>(R.string.ui_object_center_coordinate, VariantArgType.INT_COORDINATE)"
    prevalence: common

  - category: architecture
    pattern: "多匹配模式分拆为独立选项"
    description: |
      与其在单个 Applet 中提供"匹配模式"下拉选择（包含/精确/正则），
      项目模式是为每种匹配模式注册独立的 AppletOption:
      equalsTo, startsWith, endsWith, contains, matches
      OCR 文字匹配应遵循相同模式。
    examples:
      - file: "TextCriterionRegistry.kt"
        location: "app/.../registry/TextCriterionRegistry.kt:25-69"
        snippet: "val equalsTo = ...\nval startsWith = ...\nval contains = ...\nval matches = ..."
    prevalence: common

  - category: architecture
    pattern: "depInstance 注入模式"
    description: |
      Registry 构造函数接受外部依赖的 Provider:
      - LocationCriterionRegistry(id, locationProvider: () -> Pair<Double, Double>?)
      - VariableActionRegistry(id, repositoryProvider: () -> VariableRepository)
      OCR Registry 应注入 screenshotProvider 和 textRecognizer。
    examples:
      - file: "LocationCriterionRegistry.kt"
        location: "app/.../registry/LocationCriterionRegistry.kt:15-17"
        snippet: "class LocationCriterionRegistry(id: Int, private val locationProvider: () -> Pair<Double, Double>?)"
    prevalence: common

