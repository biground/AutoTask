# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 1. 截图 API 详细分析
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
screenshot_api_analysis:
  summary: "项目有两条截图路径，均返回 Bitmap，可直接传入 ML Kit"

  # ── 路径 1: A11y Service 截图 ──
  a11y_service_screenshot:
    location: "app/src/main/java/top/xjunz/tasker/task/inspector/overlay/InspectorViewOverlay.kt:209-244"
    api: "AccessibilityService.takeScreenshot(displayId: Int, executor: Executor, callback: TakeScreenshotCallback)"
    api_level: "Android 11+ (API 30)"
    return_type: "异步回调 → ScreenshotResult → HardwareBuffer → Bitmap"
    permission: "automator_service.xml 已声明 android:canTakeScreenshot=\"true\"，无需额外权限"
    call_pattern: |
      # 实际代码（InspectorViewOverlay.kt:209-211）
      a11yAutomatorService.takeScreenshot(
          Display.DEFAULT_DISPLAY, 
          Dispatchers.Main.asExecutor(), 
          screenshotCallback
      )
    callback_pattern: |
      # 实际代码（InspectorViewOverlay.kt:217-244）
      object : AccessibilityService.TakeScreenshotCallback {
          override fun onSuccess(result: AccessibilityService.ScreenshotResult) {
              result.hardwareBuffer.use { buffer ->
                  screenshot = Bitmap.wrapHardwareBuffer(buffer, result.colorSpace)
                      ?.clip(binding.inspectorView.visibleBounds)  // 可选裁剪
              }
          }
          override fun onFailure(errorCode: Int) {
              // 截图失败处理
          }
      }
    coroutine_wrapping_needed: true
    coroutine_wrapping_pattern: |
      # 推荐协程封装方式（suspendCancellableCoroutine）
      suspend fun takeScreenshotA11y(crop: Rect? = null): Bitmap? = 
          suspendCancellableCoroutine { continuation ->
              a11yAutomatorService.takeScreenshot(
                  Display.DEFAULT_DISPLAY,
                  Dispatchers.Main.asExecutor(),
                  object : AccessibilityService.TakeScreenshotCallback {
                      override fun onSuccess(result: ScreenshotResult) {
                          result.hardwareBuffer.use { buffer ->
                              val bitmap = Bitmap.wrapHardwareBuffer(buffer, result.colorSpace)
                              continuation.resume(crop?.let { bitmap?.clip(it) } ?: bitmap, null)
                          }
                      }
                      override fun onFailure(errorCode: Int) {
                          continuation.resume(null, null)
                      }
                  }
              )
          }
    access_in_applet: |
      通过 Environment 全局访问:
      - import top.xjunz.tasker.service.a11yAutomatorService  →  a11yAutomatorService.takeScreenshot(...)
      - 注意: A11y 模式下 IUiAutomationConnection.takeScreenshot() 返回 unsupportedOperation()
        只能通过 AccessibilityService 实例方法截图
    notes:
      - "截图前需隐藏浮窗 (rootView.isVisible = false)，否则会截到 overlay"
      - "Bitmap.wrapHardwareBuffer 返回的是 HARDWARE config Bitmap，ML Kit InputImage.fromBitmap 支持"

  # ── 路径 2: Shizuku/UiAutomation 截图 ──
  shizuku_screenshot:
    location: "ui-automator/src/main/java/androidx/test/uiautomator/bridge/UiAutomatorBridge.java:132-148"
    api: "mUiAutomation.takeScreenshot()"
    api_level: "Android 9+ (API 28)"
    return_type: "同步返回 Bitmap (或 null)"
    permission: "需要 Shizuku 特权模式运行"
    call_pattern: |
      # 实际代码 (UiAutomatorBridge.java:132-148)
      public boolean takeScreenshot(File storePath, int quality) {
          Bitmap screenshot = mUiAutomation.takeScreenshot();
          if (screenshot == null) return false;
          // 保存为 PNG ...
          screenshot.recycle();
          return true;
      }
    direct_bitmap_access: |
      # OCR 不需要保存文件，直接用 Bitmap:
      val bitmap: Bitmap? = uiAutomation.takeScreenshot()  // Environment.uiAutomation
    access_in_applet: |
      通过 Environment 全局访问:
      - import top.xjunz.tasker.service.uiAutomation
      - val bitmap = uiAutomation.takeScreenshot()  // 同步调用
    notes:
      - "仅 Shizuku 模式可用 (ShizukuAutomatorService)"
      - "A11y 模式下此接口抛 unsupportedOperation"
      - "同步调用，在协程中直接使用 withContext(Dispatchers.IO) 包裹即可"

  # ── hidden-apis AIDL 接口 ──
  hidden_api_aidl:
    location: "hidden-apis/src/main/aidl/android/app/IUiAutomationConnection.aidl:24"
    signature: "Bitmap takeScreenshot(in Rect crop, int rotation)"
    note: "支持裁剪区域 (Rect crop) 和旋转参数，但 A11y 模式实现为 unsupportedOperation"

  # ── 统一截图服务设计建议 ──
  unified_screenshot_service: |
    需要创建 ScreenshotProvider 统一两种模式:
    
    interface ScreenshotProvider {
        suspend fun takeScreenshot(crop: Rect? = null): Bitmap?
    }
    
    实现策略:
    - A11y 模式: 使用 suspendCancellableCoroutine 包装 AccessibilityService.takeScreenshot
    - Shizuku 模式: 直接调用 uiAutomation.takeScreenshot() (同步)
    - 通过 OperatingMode.CURRENT 判断当前模式自动选择路径
    
    Applet 中获取截图:
    - TaskRuntime 不直接持有截图能力
    - 需通过 Environment.currentService 获取 AutomatorService
    - 或在 OCR Applet 构造时注入 ScreenshotProvider

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 2. ML Kit Text Recognition V2 API 详情
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
mlkit_text_recognition:
  summary: "ML Kit V2 text recognition，bundled 模式不依赖 GMS，支持中文"

  dependencies:
    # bundled 版本（模型打包进 APK，不需要 Google Play Services）
    chinese_bundled:
      maven: "com.google.mlkit:text-recognition-chinese:16.0.1"
      model_size: "~26 MB"
      gms_required: false
      note: "推荐：离线可用，无 GMS 依赖，含拉丁+中日韩文识别"
    
    latin_only:
      maven: "com.google.mlkit:text-recognition:16.0.1"
      model_size: "~4 MB"
      note: "仅拉丁文字，体积小"

    # 非 bundled 版本（需要 GMS 下载模型，国内不可用）
    chinese_gms:
      maven: "com.google.android.gms:play-services-mlkit-text-recognition-chinese:16.0.1"
      gms_required: true
      note: "不推荐：国内设备无 GMS"

  gradle_config: |
    # app/build.gradle dependencies 中添加:
    implementation 'com.google.mlkit:text-recognition-chinese:16.0.1'

  api_usage:
    create_recognizer: |
      // 中文识别客户端
      val recognizer = TextRecognition.getClient(ChineseTextRecognizerOptions.Builder().build())
      
      // 仅拉丁文（轻量）
      // val recognizer = TextRecognition.getClient(TextRecognizerOptions.Builder().build())

    create_input_image: |
      // 从 Bitmap 创建（截图场景）
      val inputImage = InputImage.fromBitmap(bitmap, 0)  // rotation = 0
      
      // 也支持从其他来源创建:
      // InputImage.fromMediaImage(image, rotation)
      // InputImage.fromByteBuffer(buffer, width, height, rotation, format)
      // InputImage.fromFilePath(context, uri)

    process_image: |
      // 异步处理（返回 Task<Text>）
      recognizer.process(inputImage)
          .addOnSuccessListener { text: Text ->
              // text.text — 完整文本
              // text.textBlocks — 文本块列表
          }
          .addOnFailureListener { e: Exception ->
              // 处理错误
          }
      
      // 协程化（推荐）:
      suspend fun recognizeText(bitmap: Bitmap): Text? = suspendCancellableCoroutine { cont ->
          val inputImage = InputImage.fromBitmap(bitmap, 0)
          recognizer.process(inputImage)
              .addOnSuccessListener { cont.resume(it, null) }
              .addOnFailureListener { cont.resume(null, null) }
      }
      // 或使用 kotlinx-coroutines-play-services 的 .await() 扩展

    text_object_structure: |
      Text 对象层次结构:
      Text
      ├── text: String                    # 完整识别文本
      ├── textBlocks: List<TextBlock>     # 文本块（段落级别）
      │   ├── text: String
      │   ├── boundingBox: Rect?          # 边界框（相对于原图）
      │   ├── cornerPoints: Point[]?
      │   ├── recognizedLanguage: String
      │   ├── confidence: Float?          # V2 置信度
      │   └── lines: List<Line>           # 行
      │       ├── text: String
      │       ├── boundingBox: Rect?
      │       ├── confidence: Float?
      │       └── elements: List<Element> # 词/字
      │           ├── text: String
      │           ├── boundingBox: Rect?
      │           └── confidence: Float?

    first_time_loading: |
      首次调用 recognizer.process() 时会加载模型到内存（~1-2s），
      后续调用不需要重新加载。
      建议: 在 OCR Applet 中缓存 recognizer 实例（单例模式）。

  performance_notes:
    - "全屏 1080p 截图 OCR 典型耗时: 100-500ms (视文字量和设备性能)"
    - "模型首次加载: ~1-2s"
    - "内存占用: ~50-100 MB (模型加载后)"
    - "建议支持区域裁剪以减少处理时间"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 3. 现有 Applet 模式深度分析
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
applet_patterns:

  # ── Criterion 基类模式 ──
  criterion_base_pattern:
    location: "tasker-engine/src/main/java/top/xjunz/tasker/engine/applet/criterion/Criterion.kt"
    signature: "abstract class Criterion<T, V> : Applet()"
    flow: |
      1. apply(runtime) 被调用
      2. getMatchValue(runtime) → 从 values 取第一个值（用户配置的匹配值）
      3. getMatchTarget(runtime) → 如果 isScoped，从 runtime.getTarget() 取；否则从 runtime.getReferenceArgument 取
      4. matchTarget(target, value) → 子类实现具体匹配逻辑
      5. 自动处理 isInverted（取反）
      6. runtime.updateFingerprint(raw.actual)
    key_methods:
      - "matchTarget(target: T, value: V): AppletResult — 子类必须实现"
      - "getDefaultMatchValue(runtime) — 可选覆盖，提供默认值"
    value_extraction: |
      values 是 Applet.values (SortedMap<Int, Any?>)
      getMatchValue() 取 values.values.firstOrNull()
      更复杂的多参数约束直接在 apply() 中按索引取:
        values[0], values[1], values[2] ...

  # ── DslCriterion 工厂模式 ──
  dsl_criterion_pattern:
    location: "tasker-engine/src/main/java/top/xjunz/tasker/engine/applet/criterion/DslCriterion.kt"
    usage: |
      通过 createCriterion<T, V> { target, value -> Boolean } 工厂函数创建
      适用于简单的匹配逻辑，无需创建独立类
    example: |
      # TextCriterionRegistry.kt
      val equalsTo = invertibleAppletOption(R.string.format_text_content) {
          createCriterion<String, String> { t, v ->
              AppletResult.resultOf(t) { it == v }
          }
      }.withRefArgument<String>(R.string.text)
        .withValueArgument<String>(R.string.content)
        .hasCompositeTitle()

  # ── 直接继承 Applet 的自定义约束模式（GeofenceConstraint 参考）──
  custom_applet_pattern:
    location: "app/src/main/java/top/xjunz/tasker/task/applet/criterion/GeofenceConstraint.kt"
    signature: "class GeofenceConstraint(...) : Applet()"
    flow: |
      1. 不使用 Criterion 基类，直接继承 Applet
      2. 在 apply(runtime) 中手动从 values[] 读取参数
      3. 手动处理 isInverted
      4. 返回 AppletResult.emptyResult(matched) 或 AppletResult.EMPTY_FAILURE
    value_reading_pattern: |
      # GeofenceConstraint.kt:66-68
      val targetLat = (values[0] as? Number)?.toDouble() ?: return AppletResult.EMPTY_FAILURE
      val targetLng = (values[1] as? Number)?.toDouble() ?: return AppletResult.EMPTY_FAILURE  
      val targetRadius = (values[2] as? Number)?.toFloat() ?: return AppletResult.EMPTY_FAILURE
    inversion_pattern: |
      # GeofenceConstraint.kt:72-76
      return if (isInverted) {
          AppletResult.emptyResult(!matched)
      } else {
          AppletResult.emptyResult(matched)
      }
    notes:
      - "适用于需要外部依赖注入的场景（如 locationProvider, distanceCalculator）"
      - "OCR Constraint 建议使用此模式，注入 screenshotProvider 和 textRecognizer"

  # ── NumberRangeCriterion 模式 ──
  number_range_criterion_pattern:
    location: "app/src/main/java/top/xjunz/tasker/task/applet/criterion/NumberRangeCriterion.kt"
    signature: "class NumberRangeCriterion<R, T : Number>(mapper: (R) -> T) : Criterion<R, List<T>>()"
    note: "展示了 Criterion 如何使用泛型 mapper 函数提取数值"

  # ── invertibleAppletOption 用法 ──
  invertible_option_pattern:
    location: "app/src/main/java/top/xjunz/tasker/task/applet/option/registry/AppletOptionRegistry.kt:61"
    signature: "protected fun invertibleAppletOption(title: Int, creator: () -> Applet): AppletOption"
    usage: |
      创建支持取反的约束选项。用户在 UI 中可切换"是/否"。
      实际设置 Applet.isInverted = true
      Criterion 基类自动处理取反；自定义 Applet 需手动处理。
    example: |
      @AppletOrdinal(0x0000)
      val geofenceInside = invertibleAppletOption(R.string.geofence_inside) {
          GeofenceConstraint.withAMap(locationProvider)
      }.withValueArgument<Double>(R.string.geofence_latitude)
        .withValueArgument<Double>(R.string.geofence_longitude)

  # ── AppletResult 使用模式 ──
  applet_result_patterns:
    location: "tasker-engine/src/main/java/top/xjunz/tasker/engine/applet/base/AppletResult.kt"
    key_methods:
      - "EMPTY_SUCCESS — 空成功结果（单例）"
      - "EMPTY_FAILURE — 空失败结果（单例）"
      - "emptyResult(success: Boolean) — 根据 boolean 返回成功/失败"
      - "succeeded(returned: Any?) — 成功 + 附带返回数据（供下游引用）"
      - "failed(actual: Any?) — 失败 + 附带实际值（用于调试/fingerprint）"
      - "resultOf(actualValue, isSuccessful: (T) -> Boolean) — Criterion 常用: 自动根据匹配结果生成 result"
    returned_field: |
      AppletResult.returned 用于将数据传递给下游 Applet:
      - 在 Action 中返回 AppletResult.succeeded(recognizedText) 
      - 下游可通过 runtime.getReferenceArgument() 获取
    actual_field: |
      AppletResult.actual 用于 Criterion 记录实际匹配值（调试用/fingerprint）

  # ── Action 基类模式 ──
  action_base_patterns:
    action_base:
      location: "tasker-engine/src/main/java/top/xjunz/tasker/engine/applet/action/Action.kt"
      signature: "abstract class Action : Applet()"
      note: "supportsAnywayRelation = true，无其他特殊逻辑"

    argument_action:
      location: "tasker-engine/src/main/java/top/xjunz/tasker/engine/applet/action/ArgumentAction.kt"
      signature: "abstract class ArgumentAction : Action()"
      flow: |
        apply(runtime) → 构建 args 数组 (values + references 混合) → doAction(args, runtime)
        args[i] = getArgument(i, runtime) — 自动区分 value 和 reference
      note: "适合多参数动作"

    single_arg_action:
      location: "tasker-engine/src/main/java/top/xjunz/tasker/engine/applet/action/SingleArgAction.kt"
      signature: "abstract class SingleArgAction<Arg> : ArgumentAction()"
      note: "单参数动作的便捷基类"

    action_variable_setting: |
      Action 设置变量的方式:
      1. 通过 AppletResult.succeeded(value) 返回结果
         - 在 Registry 中用 .withResult<Type>(R.string.xxx) 声明输出引用
         - 下游通过 withRefArgument 绑定引用
      2. 直接操作 VariableRepository
         - 如 SetVariableAction: repositoryProvider().setVariable(variable)

