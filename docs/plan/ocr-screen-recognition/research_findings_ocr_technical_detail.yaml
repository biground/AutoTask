# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 5. VariantArgType 完整类型列表
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
variant_arg_types:
  location: "app/src/main/java/top/xjunz/tasker/task/applet/value/VariantArgType.kt"
  base_types: |
    Applet.ARG_TYPE_TEXT      = 1
    Applet.ARG_TYPE_INT       = 3
    Applet.ARG_TYPE_FLOAT     = 4
    Applet.ARG_TYPE_LONG      = 5
    Applet.ARG_TYPE_REFERENCE = 0
  
  type_encoding: "variant = (subTypeIndex shl 16) or baseArgType"

  none: { const: "NONE = -1", description: "无变体类型" }

  long_variants:
    - { const: "BITS_SWIPE", value: "1 shl 16 | LONG", description: "滑动参数位" }
    - { const: "BITS_SCROLL", value: "2 shl 16 | LONG", description: "滚动参数位" }
    - { const: "BITS_LONG_DURATION", value: "3 shl 16 | LONG", description: "长时间参数位" }
    - { const: "LONG_TIME", value: "4 shl 16 | LONG", description: "时间戳" }
    - { const: "BITS_BOUNDS", value: "5 shl 16 | LONG", description: "边界参数位" }

  int_variants:
    - { const: "INT_COORDINATE", value: "1 shl 16 | INT", description: "坐标 (x,y 打包)" }
    - { const: "INT_INTERVAL", value: "2 shl 16 | INT", description: "时间间隔" }
    - { const: "INT_INTERVAL_XY", value: "3 shl 16 | INT", description: "双时间间隔" }
    - { const: "INT_QUANTITY", value: "4 shl 16 | INT", description: "数量" }
    - { const: "INT_ROTATION", value: "5 shl 16 | INT", description: "旋转角度" }
    - { const: "INT_TIME_OF_DAY", value: "6 shl 16 | INT", description: "一天中的时间" }
    - { const: "INT_MONTH", value: "7 shl 16 | INT", description: "月份" }
    - { const: "INT_DAY_OF_MONTH", value: "8 shl 16 | INT", description: "月中天" }
    - { const: "INT_DAY_OF_WEEK", value: "9 shl 16 | INT", description: "星期几" }
    - { const: "INT_HOUR_OF_DAY", value: "10 shl 16 | INT", description: "小时" }
    - { const: "INT_MIN_OR_SEC", value: "11 shl 16 | INT", description: "分钟/秒" }
    - { const: "INT_PERCENT", value: "12 shl 16 | INT", description: "百分比" }

  text_variants:
    - { const: "TEXT_PACKAGE_NAME", value: "1 shl 16 | TEXT", description: "包名选择器" }
    - { const: "TEXT_ACTIVITY", value: "2 shl 16 | TEXT", description: "Activity 选择器" }
    - { const: "TEXT_PANE_TITLE", value: "3 shl 16 | TEXT", description: "面板标题" }
    - { const: "TEXT_GESTURES", value: "4 shl 16 | TEXT", description: "手势序列化" }
    - { const: "TEXT_FILE_PATH", value: "5 shl 16 | TEXT", description: "文件路径选择器" }
    - { const: "TEXT_FORMAT", value: "6 shl 16 | TEXT | MASK_IGNORE", description: "格式化模板" }
    - { const: "TEXT_VIBRATION_PATTERN", value: "7 shl 16 | TEXT", description: "振动模式" }

  ocr_relevant_types: |
    OCR 功能可用的现有类型:
    - VariantArgType.NONE — 普通文本参数（默认文本输入框）
    - withValueArgument<String>(R.string.xxx) 不指定 VariantArgType → 普通文本输入
    
    注意：没有 TEXT_SINGLE_LINE / TEXT_MULTI_LINE / TEXT_VARIABLE_NAME 在 VariantArgType 中定义。
    这些在 plan.yaml 文档中出现但尚未实现。
    
    实际项目中文本参数直接用:
    .withValueArgument<String>(R.string.label_name) — 自动生成文本输入框
    
    匹配模式选择（包含/精确/正则）:
    - 不需要「选择框」VariantArgType，参考 TextCriterionRegistry 做法:
      为每种匹配模式注册独立的 Applet 选项 (equalsTo / contains / matches 等)
    - 用户在 UI 选择不同的条件项（而非在单个条件中选择匹配模式）

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 6. 截图权限和触发时机
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
screenshot_permission_and_timing:

  permission_summary: |
    - A11y 模式: 无需额外权限。automator_service.xml 已声明 canTakeScreenshot="true"
    - Shizuku 模式: 需要 Shizuku 授权（用户已授权后自动可用）
    - 不需要 MediaProjection（MediaProjection 是用于持续屏幕录制/投屏的 API，OCR 截图不需要）

  applet_apply_screenshot_access: |
    在 Applet.apply(runtime: TaskRuntime) 中获取截图:
    
    方案 A (推荐): 构造注入 Provider
      class OcrTextCriterion(
          private val screenshotProvider: suspend () -> Bitmap?
      ) : Applet() {
          override suspend fun apply(runtime: TaskRuntime): AppletResult {
              val bitmap = screenshotProvider() ?: return AppletResult.EMPTY_FAILURE
              // OCR 处理...
          }
      }
    
    方案 B: 直接通过 Environment 全局访问
      import top.xjunz.tasker.service.uiAutomation
      import top.xjunz.tasker.service.a11yAutomatorService
      
      override suspend fun apply(runtime: TaskRuntime): AppletResult {
          // Shizuku 模式
          val bitmap = uiAutomation.takeScreenshot()
          // 或 A11y 模式 (需协程化)
          val bitmap = takeScreenshotA11y()
      }

  sync_vs_async: |
    - Shizuku 模式: uiAutomation.takeScreenshot() 是同步调用，直接返回 Bitmap
    - A11y 模式: AccessibilityService.takeScreenshot() 是异步回调，需要 suspendCancellableCoroutine 包装
    - 两种模式在 Applet 的 suspend fun apply() 中都可以无阻塞使用

  task_runtime: |
    TaskRuntime 本身不持有截图方法。
    需要通过以下方式获取:
    1. Environment.currentService → AutomatorService → uiAutomatorBridge → uiAutomation
    2. 或直接 import top.xjunz.tasker.service.uiAutomation (顶级属性)
    3. A11y 截图需要 import top.xjunz.tasker.service.a11yAutomatorService

  existing_screenshot_action: |
    GlobalActionRegistry 已有 takeScreenshot 动作 (AppletOrdinal 0x0006):
    - 调用 uiAutomation.performGlobalAction(GLOBAL_ACTION_TAKE_SCREENSHOT)
    - 这是系统截图动作 (触发系统截图 UI), 不返回 Bitmap
    - OCR 需要的是直接获取 Bitmap 的截图, 不是此功能
    - 标记为 .premiumOnly() 和 .restrictApiLevel(P)

