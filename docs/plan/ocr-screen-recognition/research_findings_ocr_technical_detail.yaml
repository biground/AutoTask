# 11. 开放问题和差距
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
open_questions:
  - question: "A11y 模式截图在 Applet apply() 中是否会被覆盖层遮挡？"
    context: "InspectorViewOverlay 截图前需隐藏 rootView。engine 的 Applet 执行时是否存在浮窗覆盖层？如有需先隐藏。"
    type: research
    affects: ["ocr-criterion", "ocr-action"]

  - question: "OcrManager 的 TextRecognizer 是否需要在服务销毁时关闭？"
    context: "ML Kit TextRecognizer 有 close() 方法释放模型内存。需要在 AutomatorService 生命周期中管理。"
    type: nice_to_know
    affects: ["ocr-manager"]

gaps:
  - area: "ScreenshotProvider 统一接口"
    description: "需创建统一截图接口，自动选择 A11y/Shizuku 模式"
    impact: research_blocker
    affects: ["ocr-criterion", "ocr-action"]

  - area: "Applet 中获取 A11y Service 实例"
    description: |
      A11y 截图需要 AccessibilityService 实例调用 takeScreenshot()。
      ShellCmdAction 直接 import top.xjunz.tasker.service.uiAutomation 获取 UiAutomation。
      A11y 截图需要 import top.xjunz.tasker.service.a11yAutomatorService。
      需确认 Applet 执行时 A11y Service 实例是否始终可用。
    impact: nice_to_know
    affects: ["ocr-criterion"]
