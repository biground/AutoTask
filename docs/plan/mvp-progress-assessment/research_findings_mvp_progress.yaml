patterns_found:
  - category: architecture
    pattern: "Registry → Bootstrap → Factory 注册链路"
    description: "每个功能域一个 *Registry，Bootstrap 汇总注册 ID，AppletOptionFactory 运行时解析"
    examples:
      - file: "BootstrapOptionRegistry.kt"
        location: "BootstrapOptionRegistry.kt:40-65"
        snippet: "const ID_EVENT_FILTER_REGISTRY = 0xF ... const ID_SCREEN_OCR_ACTION_REGISTRY = 0x5B"
    prevalence: common

  - category: architecture
    pattern: "EventDispatcher → EventFilter → Referent 事件链路"
    description: "Dispatcher 监听系统事件,EventFilter 按 event.type 路由,Referent 提取参数暴露给变量"
    examples:
      - file: "EventCriterionRegistry.kt"
        location: "EventCriterionRegistry.kt:100-120"
        snippet: "eventFilterOption(Event.EVENT_ON_BT_STATE_CHANGED) .withResult<BluetoothReferent>"
    prevalence: common

  - category: naming
    pattern: "Applet ID 使用十六进制 @AppletOrdinal"
    description: "每个 Registry 内部使用 @AppletOrdinal(0xHHHH) 标注 Applet 序号"
    examples:
      - file: "EventCriterionRegistry.kt"
        location: "EventCriterionRegistry.kt:37"
        snippet: "@AppletOrdinal(0x0000) val pkgEntered = ..."
    prevalence: common

