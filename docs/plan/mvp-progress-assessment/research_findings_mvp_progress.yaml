recommended_next:
  - priority: 1
    module: "动作 — 设备设置开关批量实现"
    items: ["A-SET-002 Auto Rotate", "A-SET-003 Bluetooth", "A-SET-004 Brightness", "A-SET-005 Dark Theme", "A-SET-016 WiFi", "A-SET-033 Torch"]
    reason: "设备设置是用户最高频使用的自动化动作，技术难度低（Settings.System/Global + ContentResolver），可批量实现"

  - priority: 2
    module: "动作 — 音量与声音"
    items: ["A-SND-001 Volume Change", "A-SND-005 Play Sound", "A-SND-006 Silent Mode", "A-SND-007 TTS", "A-SND-014 DND"]
    reason: "音量和静音是日常自动化核心场景，AudioManager API 成熟"

  - priority: 3
    module: "动作 — 通知与 UI 显示"
    items: ["A-UI-001 Display Notification", "A-UI-002 Display Dialog", "A-UI-007 Toast"]
    reason: "用户反馈/提示是自动化必备能力，NotificationManager + AlertDialog + Toast 实现直接"

  - priority: 4
    module: "动作 — 网络与内部"
    items: ["A-NET-001 HTTP Request", "A-INT-001 Enable/Disable Macro", "A-MEDIA-001 Control Media"]
    reason: "HTTP 请求打通外部集成，宏开关控制实现宏间联动，媒体控制覆盖耳机/蓝牙联动场景"

  - priority: 5
    module: "约束补全"
    items: ["C-DEV-002 Device Locked", "C-NET-006 Airplane Mode", "C-APP-003 Headphone", "C-PHONE-001 Call State", "C-SYS-004 Dark Mode", "C-INT-002 Macro Running"]
    reason: "约束是触发器的条件过滤补充，在触发器已全部完成的基础上补全约束提升可用性"

  - priority: 6
    module: "iOS 风格设计系统"
    items: ["DES-001 视觉体系", "DES-002 色彩系统", "DES-003 字体排版"]
    reason: "不影响功能完整性，可后置到动作/约束补全后；但影响产品差异化竞争力"

