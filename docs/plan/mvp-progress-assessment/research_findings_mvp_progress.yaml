      - Applet 选择器（购物车式选择 + 分类浏览）
      - 参数配置（多种编辑器 Dialog）
      - 日志/快照查看器
      
      核心功能已可用，但 MVP 路线图要求的 iOS 风格视觉体系（DES-001~006）尚未开始。
      这是 UI 层最大的欠缺，但不影响功能完整性。

