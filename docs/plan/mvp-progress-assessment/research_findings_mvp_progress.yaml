  confidence: high
  coverage: 85
  decision_blockers: 0
  research_blockers: 0

# ============================================================
# MVP 模块评估详情
# ============================================================

modules:
  # ----------------------------------------------------------
  # 1. 引擎核心
  # ----------------------------------------------------------
  - name: "引擎核心 (tasker-engine + 变量/表达式)"
    status: "~90%"
    mvp_total: 31
    implemented:
      - "E-001 宏定义 — XTask, RootFlow, Applet 体系完整"
      - "E-002 宏启用/禁用 — XTask.Metadata + LocalTaskManager.isEnabled"
      - "E-003 宏分类 — TaskStorage + TaskCollectionSelectorDialog"
      - "E-004 宏导入/导出 — XTaskDTO + XTaskJson + TaskStorage (ZIP/xtsk/xtsks)"
      - "E-005 宏克隆 — AppletDTO.toDTO() 序列化机制支持"
      - "E-006 宏日志 — TaskSnapshot + SnapshotLogDialog"
      - "V-001~V-004 变量类型 — VariableRepository (Boolean/Int/Decimal/String)"
      - "V-007 全局变量 — VariableRepository 作用域支持"
      - "V-008 局部变量 — VariableRepository 局部作用域"
      - "V-009 变量持久化 — DataStore + JSON 序列化"
      - "V-010 魔术变量 — Referent 系统 (ComponentInfoWrapper 等)"
      - "V-011 变量表达式 — ExpressionEvaluator (AST 求值器)"
      - "CF-001 If/Else — If.kt, Else.kt, ElseIf.kt"
      - "CF-003 Repeat — Repeat.kt"
      - "CF-005 Break — Break.kt"
      - "CF-006 Continue — Continue.kt"
      - "CF-007 Wait Before Next — Suspension.kt + PauseFor.kt"
      - "CF-008 Wait Until Trigger — WaitUntil.kt, WaitFor.kt"
      - "CF-011 Macro Run — ControlActionRegistry 有宏调用"
      - "CF-012 Cancel Macro Actions — ControlActionRegistry"
      - "CF-014 同步/异步执行 — TaskScheduler 支持"
      - "EX-001 数学运算 — ExpressionEvaluator"
      - "EX-002 字符串操作 — ExpressionEvaluator"
      - "EX-003 日期/时间函数 — ExpressionEvaluator"
      - "EX-004 逻辑运算 — ExpressionEvaluator"
      - "EX-005 JSON 解析 — ExpressionEvaluator"
    missing_mvp:
      - "CF-002 If Confirmed Then — 需要弹窗确认 UI 集成（部分支持）"
      - "CF-013 Confirm Next — 需要弹窗确认 UI 集成（部分支持）"
    notes: |
      引擎核心大量继承自 AutoTask 基线（Flow/Applet/Runtime/DTO/ControlFlow），
      AutoPilot 新增的变量系统（VariableRepository + ExpressionEvaluator）和模式系统已全部完成。
      CF-002/CF-013 是弹窗确认类功能，可能需要 UI 层支持，但底层 ControlFlow 已可扩展。

  # ----------------------------------------------------------
  # 2. 触发器
  # ----------------------------------------------------------
  - name: "触发器 (Triggers)"
    status: "19/19 implemented (100%)"
    mvp_total: 19
    implemented:
      - "T-TIME-001 Day/Time — PollEventDispatcher + TimeCriterionRegistry (timeRange/hourMinSec)"
      - "T-TIME-002 Day of Week/Month — TimeCriterionRegistry (dayOfWeek/dayOfMonth/month)"
      - "T-TIME-003 Regular Interval — PollEventDispatcher (EVENT_ON_TICK 每秒轮询)"
      - "T-DEV-001 Device Boot — EVENT_ON_DEVICE_BOOTED + EventFilter 分支"
      - "T-DEV-002 Screen On/Off — ScreenEventDispatcher (SCREEN_ON/SCREEN_OFF)"
      - "T-DEV-003 Screen Unlocked — ScreenEventDispatcher (USER_PRESENT)"
      - "T-NET-001 WiFi State Change — NetworkEventDispatcher (WiFi connected/disconnected)"
      - "T-NET-003 Bluetooth Event — BluetoothEventDispatcher + BluetoothReferent"
      - "T-PHONE-001 Call Incoming — PhoneCallEventDispatcher + PhoneCallReferent"
      - "T-PHONE-006 SMS Received — SmsEventDispatcher + SmsReferent"
      - "T-PWR-001 Power Connected/Disconnected — PowerEventDispatcher"
      - "T-PWR-002 Battery Level — GlobalCriterionRegistry (batteryCapacityRange) + PollEventDispatcher"
      - "T-NOTIF-001 Notification — A11yEventDispatcher (EVENT_ON_NOTIFICATION_RECEIVED) + NotificationReferent"
      - "T-APP-001 Application Launched/Closed — A11yEventDispatcher (EVENT_ON_PACKAGE_ENTERED/EXITED)"
      - "T-APP-006 Clipboard Change — ClipboardEventDispatcher (EVENT_ON_PRIMARY_CLIP_CHANGED)"
      - "T-HW-001 Headphones Insert/Removed — HeadsetEventDispatcher (HEADSET_PLUG)"
      - "T-INT-001 Variable Change — VariableChangeEventDispatcher + VariableChangeReferent"
      - "T-INT-009 Intent Received — IntentEventDispatcher + IntentReferent"
      - "T-INT-017 Empty Trigger — EVENT_ON_MANUAL_TRIGGER + EventFilter 分支"
    missing_mvp: []
    notes: |
      全部 19 个 MVP 触发器已实现。包含 13 个 EventDispatcher（A11y/Poll/Network/Location/
      Clipboard/VariableChange/ModeChange/Screen/Power/Headset/Bluetooth/Alarm/PhoneCall/Sms/Intent），
      以及 EventCriterionRegistry 中 0x0000~0x0028 共 41 个注册条目完整覆盖。
      364 个单测全通过。

  # ----------------------------------------------------------
  # 3. 动作
  # ----------------------------------------------------------
  - name: "动作 (Actions)"
    status: "~10/28 implemented (~35%)"
    mvp_total: 28
    implemented:
      - "A-SET-012 Screen On/Off — GlobalActionRegistry (lockScreen, 部分通过 Accessibility)"
      - "A-SND-010 Vibrate — VibrationActionRegistry (vibrate)"
      - "A-APP-001 Launch Application — ApplicationActionRegistry (launchApp)"
      - "A-APP-002 Launch Home Screen — GlobalActionRegistry (pressHome)"
      - "A-DATA-001 File Operation — FileActionRegistry (deleteFile/copyFile/moveFile)"
      - "A-DATA-002 Write to File — FileActionRegistry (writeFile 需确认)"
      - "A-DATA-004 Fill Clipboard — TextActionRegistry (copyText)"
      - "A-DATA-006 Set Variable — VariableActionRegistry (setVariable)"
      - "A-DATA-007 Delete Variable — VariableActionRegistry (deleteVariable)"
      - "A-DATA-013 Log Event — TextActionRegistry (logcatText)"
    missing_mvp:
      - "A-SET-002 Auto Rotate On/Off — 未找到实现"
      - "A-SET-003 Bluetooth Configure — 未找到实现"
      - "A-SET-004 Brightness — 未找到实现"
      - "A-SET-005 Dark Theme — 未找到实现"
      - "A-SET-016 WiFi Configure — 未找到实现"
      - "A-SET-033 Torch On/Off — 未找到实现"
      - "A-SND-001 Volume Change — 未找到实现"
      - "A-SND-005 Play/Stop Sound — 未找到实现"
      - "A-SND-006 Silent - Vibrate Off — 未找到实现"
      - "A-SND-007 Speak Text (TTS) — 未找到实现"
      - "A-SND-014 Do Not Disturb — 未找到实现"
      - "A-UI-001 Display Notification — 未找到实现"
      - "A-UI-002 Display Dialog — 未找到实现"
      - "A-UI-007 Popup Message (Toast) — 未找到实现"
      - "A-NET-001 HTTP Request — 未找到实现"
      - "A-MEDIA-001 Control Media — 未找到实现"
      - "A-INT-001 Enable/Disable Macro — 未找到实现"
      - "A-INT-005 Export Macros — TaskStorage 有导出基础，但缺独立 Action Applet"
    notes: |
      动作模块是 MVP 最大缺口。现有 ActionRegistry 包含 GlobalAction（全局按键）、ApplicationAction（启动/停止应用）、
      TextAction（日志/提取/复制）、FileAction（文件操作）、VariableAction（设置/删除变量）、VibrationAction（振动）、
      ShellCmdAction（Shell 命令）、ControlAction（控制流）、GestureAction（手势），以及 OCR 和 Mode 相关动作。
      
      但 MVP 路线图中大量常用动作（设备设置开关、音量控制、TTS、通知显示、HTTP 请求、媒体控制）尚未实现。
      这些需要新建对应的 Action 类和 ActionRegistry 条目。

  # ----------------------------------------------------------
  # 4. 约束
  # ----------------------------------------------------------
  - name: "约束 (Constraints)"
    status: "~8/17 implemented (~47%)"
    mvp_total: 17
    implemented:
      - "C-DEV-001 Screen On/Off — GlobalCriterionRegistry (isScreenPortrait 部分覆盖屏幕状态)"
      - "C-NET-001 WiFi State — NetworkCriterionRegistry (isNetworkActive/isWifiNetwork/currentWifiSsidIs)"
      - "C-NET-003 Bluetooth State — 可通过 BluetoothReferent EventFilter 实现事件级"
      - "C-PWR-001 Battery Level — GlobalCriterionRegistry (batteryCapacityRange)"
      - "C-PWR-004 Power Connected — GlobalCriterionRegistry (isBatteryCharging)"
      - "C-TIME-001 Time of Day — TimeCriterionRegistry (timeRange/hourMinSec)"
      - "C-TIME-002 Day of the Week — TimeCriterionRegistry (dayOfWeek)"
      - "C-APP-001 Application Running — ApplicationCriterionRegistry (isCertainApp/appCollection)"
      - "C-INT-001 Variable — VariableConstraint + VariableCriterionRegistry"
      - "C-INT-013 AND/OR/XOR/NOT — 引擎核心 If/Else/Flow 逻辑组合"
      - "C-SYS-006 Compare Values — CompareValuesConstraint"
    missing_mvp:
      - "C-DEV-002 Device Locked/Unlocked — 未找到独立约束实现"
      - "C-NET-006 Airplane Mode — 未找到约束实现"
      - "C-APP-003 Headphone Connection — 未找到约束实现（有触发器但无约束）"
      - "C-PHONE-001 Call State — 未找到约束实现（有触发器但无约束）"
      - "C-SYS-004 Dark Mode — 未找到约束实现"
      - "C-INT-002 Macro Running — 未找到约束实现"
    notes: |
      约束模块有 TimeCriterionRegistry、GlobalCriterionRegistry、NetworkCriterionRegistry、
      ApplicationCriterionRegistry、VariableCriterionRegistry、ModeCriterionRegistry、
      LocationCriterionRegistry 等完整注册表体系。
      
      已有约束覆盖了电量、时间、网络、应用、变量等核心场景。
      缺失的主要是设备锁定状态、飞行模式、耳机连接、通话状态等独立约束 Applet。
      部分可通过已有触发器 Referent 在事件上下文中间接获取，但严格来说需要独立的轮询约束。

