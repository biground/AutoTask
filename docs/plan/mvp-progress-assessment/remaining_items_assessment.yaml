  android_infra:
    - id: "AND-003"
      name: "Notification Listener (通知监听服务)"
      status: "not_started"
      baseline_files: []
      current_implementation: |
        当前通知触发 (T-NOTIF-001) 依赖 AccessibilityService 的 TYPE_NOTIFICATION_STATE_CHANGED 事件
        (A11yEventDispatcher)，能捕获通知到达事件但无法获取通知详情（标题/文本/包名/Intent等）。
        不存在独立的 NotificationListenerService 子类。
      evidence:
        - "grep NotificationListenerService: 0 个 .kt 实现文件，仅在 docs 中出现"
        - "docs/plan/trigger-infrastructure/research_findings_trigger_infrastructure.yaml line 577: current_status='未使用 NotificationListenerService'"
        - "docs/plan/mvp-progress-assessment/research_findings_mvp_gap.yaml line 266: 'A11yEventDispatcher 通过 AccessibilityService 捕获通知事件'"
      gap: |
        需要新建：
        1. AutoPilotNotificationListenerService extends NotificationListenerService
        2. AndroidManifest 声明 <service> + BIND_NOTIFICATION_LISTENER_SERVICE 权限
        3. NotificationReferent 提取通知详情（title/text/packageName/postTime/actions）
        4. 更新 EventFilter 的 NOTIFICATION_RECEIVED 分支，改用 NLS 数据源
        5. PermissionGuideDialog 新增通知访问权限引导入口
        6. 在 Settings → Notification access 页面引导用户启用
      effort: "medium"
      priority: "high"
      rationale: "T-NOTIF-001 是 MVP 19 个触发器之一，且通知联动是高频场景。当前 A11y 方案信息不完整。"

    - id: "WIDGET-003"
      name: "App Shortcut (长按图标快捷方式)"
      status: "not_started"
      baseline_files:
        - "app/src/main/java/top/xjunz/tasker/ui/task/showcase/EnabledTaskFragment.kt (btnPresetTasksShortcut 按钮引用，非 ShortcutManager)"
        - "app/src/main/java/top/xjunz/tasker/ui/task/showcase/BaseTaskShowcaseFragment.kt (btnPresetTasksShortcut)"
      current_implementation: |
        基线中 btnPresetTasksShortcut 是 UI 内的"导入预设任务"按钮，不是 Android ShortcutManager 快捷方式。
        未找到任何 ShortcutManager/ShortcutInfo/shortcut.xml 相关代码。
      gap: |
        需要新建：
        1. res/xml/shortcuts.xml — 声明静态快捷方式（如"新建宏"、"快速运行"）
        2. AndroidManifest <meta-data android:name="android.app.shortcuts" android:resource="@xml/shortcuts" />
        3. 可选: 动态快捷方式 — ShortcutManager.addDynamicShortcuts() 为用户常用宏创建快速入口
        4. ShortcutActivity — 处理快捷方式 Intent 并路由到对应功能
      effort: "small"
      priority: "low"
      rationale: "便捷功能但非核心。不影响宏执行链路。可在最后一批收尾。"

