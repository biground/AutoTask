# ============================================================
# 下一批次建议
# ============================================================

next_batch_recommendation:
  focus: "Android 基础设施完善 + 关键缺失功能补齐"
  tasks_estimate: 12-15
  rationale: |
    当前引擎核心、触发器、动作、约束条件已接近 MVP 完成度，最大瓶颈在 Android 基础设施和 UI。
    建议分两个小批次：

    **批次 A：基础设施补齐（~8 tasks，高优先级）**
    1. 前台服务保活通知 (ForegroundNotificationManager)
    2. 电池优化白名单引导
    3. 特殊权限引导对话框 (PermissionGuideDialog)
    4. 首次启动引导流程
    5. Battery Level 触发器 (BatteryEventDispatcher)
    6. Write to File 动作
    7. 变量管理界面
    8. 日志查看器完善

    **批次 B：体验打磨（~5 tasks，可推迟到 V1）**
    9. 设计系统基础（色彩/字体/间距主题）
    10. 空状态设计
    11. 手势交互
    12. App Shortcut
    13. 图标系统

    完成批次 A 后，MVP 完成度将达到 ~95%，基本可以进入用户测试阶段。

