    title: "AutoPilotHttpServer — NanoHTTPD 内置 HTTP Server"
    description: |
      新建内置 HTTP Server（AND-006），基于 NanoHTTPD：
      1. AutoPilotHttpServer 继承 NanoHTTPD：
         - start(port) / stop() / isRunning()
         - registerRoute(path, method, handler: (session) → Response)
         - unregisterRoute(path)
      2. 路由表：ConcurrentHashMap<RouteKey, Handler>
      3. 安全：
         - 默认绑定 127.0.0.1（仅本机访问）
         - 可选 Bearer Token 认证（通过设置页配置）
         - 请求速率限制（默认 60 req/min）
      4. 端口冲突处理：默认 8765，被占用时自动尝试 8766-8775
      添加依赖：implementation 'org.nanohttpd:nanohttpd:2.3.1'
      文件：新建 service/http/AutoPilotHttpServer.kt + HttpRoute.kt
