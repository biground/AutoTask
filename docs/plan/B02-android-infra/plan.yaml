      2. 状态栏操作：expandStatusBar() / collapseStatusBar()（通过 performGlobalAction）
      3. 服务状态监控：A11yServiceMonitor 定期检测（每 30 秒），断连后显示通知提醒
      4. UI 元素高级操作：findNodeByViewId / findNodeByText / performClickOnNode
      文件：新建 service/a11y/A11yServiceEnhancer.kt + A11yServiceMonitor.kt
      修改 A11yAutomatorService.kt 集成增强模块
