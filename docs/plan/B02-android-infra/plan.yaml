plan_id: B02-android-infra
objective: |
  补全 7 项 Android 平台基础设施：
  AND-002 Accessibility Service 无障碍服务框架，AND-006 内置 HTTP Server，
  AND-008 传感器服务，PERM-002 Shizuku/ADB 权限集成，
  WIDGET-001 桌面小部件，WIDGET-002 Quick Settings Tile，WIDGET-004 悬浮按钮。
  这些基础设施是 Wave 2 众多触发器和动作的硬件/系统级依赖。
created_at: "2026-04-16"
created_by: gem-planner
status: pending_approval
research_confidence: medium

plan_metrics:
  wave_1_task_count: 3
  total_dependencies: 18
  risk_score: high

tldr: |
  分 6 个 wave（共 22 个任务）实施 7 项基础设施功能：
  Wave 1: Accessibility Service 增强 + 传感器服务框架 + Shizuku 权限桥接
  Wave 2: HTTP Server 核心 + Widget Provider + QS Tile Service
  Wave 3: 悬浮按钮管理器 + HTTP Server 路由注册
  Wave 4: 注册表接入 + 字符串资源 + 权限引导 UI 扩展
  Wave 5: AndroidManifest 集成 + 设置页入口
  Wave 6: 安全审查 + 全量验证

open_questions:
  - "HTTP Server 选型：NanoHTTPD（轻量 ~60KB）vs Ktor-Server（功能丰富但 ~2MB）？建议 NanoHTTPD"
  - "Shizuku 权限是否需要支持无线 ADB 授权？V1 先支持有线 ADB + Root"
  - "Widget 按钮数量是否可配置？建议 V1 固定 4 个按钮槽位"

pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: "Accessibility Service 在国产 ROM 上被系统自动关闭"
      likelihood: high
      impact: critical
      mitigation: |
        实现 A11yServiceMonitor 定期检测服务状态 + 重启提示；
        引导用户加入自启动白名单（电池优化/自启动/后台运行列表）；
        提供非 A11y 降级路径（有限功能但不崩溃）。
    - scenario: "HTTP Server 端口被占用或防火墙拦截"
      likelihood: medium
      impact: medium
      mitigation: |
        默认端口 8765 + 备选端口自动扫描（8766-8775）；
        绑定 127.0.0.1 而非 0.0.0.0（安全+避免防火墙）；
        提供端口自定义设置。
    - scenario: "Shizuku 服务未安装导致高级功能全部不可用"
      likelihood: high
      impact: medium
      mitigation: |
        所有 Shizuku 依赖功能使用 ShizukuBridge.isAvailable() 检查；
        不可用时优雅降级（显示提示而非崩溃）；
        提供 Shizuku 安装引导。
    - scenario: "悬浮按钮 SYSTEM_ALERT_WINDOW 权限被拒绝"
      likelihood: medium
      impact: medium
      mitigation: |
        权限未授予时显示引导对话框跳转系统设置；
        悬浮按钮功能降级为不可用（相关触发器/动作禁用并提示原因）。
  assumptions:
    - "现有 A11yAutomatorService 框架可扩展而不需要重写"
    - "NanoHTTPD 在 Android 16 上可正常运行"
    - "Shizuku API 在 Android 16 上兼容"
    - "AppWidgetProvider 在主流启动器上行为一致"
    - "TileService 在 Android 16 上的生命周期稳定"

implementation_specification:
  code_structure: |
    在 app/src/main/java/top/xjunz/tasker/ 下新建：
    - service/a11y/ — A11y 服务增强（CommandExecutor、UiInteractor）
    - service/http/ — HTTP Server（核心 + 路由 + 认证）
    - service/sensor/ — 传感器服务框架
    - bridge/ — ShizukuBridge 扩展
    - widget/ — Widget Provider + QS Tile + 悬浮按钮
  affected_areas:
    - "app/src/main/java/top/xjunz/tasker/service/ — 服务层"
    - "app/src/main/java/top/xjunz/tasker/bridge/ — 系统桥接层"
    - "app/src/main/java/top/xjunz/tasker/widget/ — 小部件"
    - "app/src/main/java/top/xjunz/tasker/ui/main/ — 设置页扩展"
    - "app/src/main/AndroidManifest.xml — 服务/权限声明"
  component_details:
    - component: "A11yServiceEnhancer"
      responsibility: "增强现有 A11y 服务：支持通知交互（RemoteInput Reply）、状态栏操作、UI 元素高级操作"
      interfaces:
        - "performNotificationAction(notificationKey, actionIndex)"
        - "expandStatusBar() / collapseStatusBar()"
        - "isServiceConnected(): Boolean"
        - "A11yServiceMonitor — 定期检测并提示重启"
    - component: "AutoPilotHttpServer"
      responsibility: "轻量级 HTTP Server，支持 Webhook 接收和远程控制"
      interfaces:
        - "start(port: Int) / stop()"
        - "registerRoute(path, method, handler)"
        - "unregisterRoute(path)"
        - "isRunning(): Boolean"
    - component: "SensorService"
      responsibility: "统一的传感器管理框架，支持加速度/陀螺仪/光线/距离传感器"
      interfaces:
        - "registerSensorListener(sensorType, callback, samplingPeriod)"
        - "unregisterSensorListener(sensorType)"
        - "getCurrentValue(sensorType): Float?"
        - "SensorType enum: ACCELEROMETER, GYROSCOPE, LIGHT, PROXIMITY"
    - component: "ShizukuBridge"
      responsibility: "封装 Shizuku API，提供特权操作桥接"
      interfaces:
        - "isAvailable(): Boolean"
        - "requestPermission(callback)"
        - "executeShellCommand(command): String"
        - "setSecureSetting(name, value)"
        - "forceStopPackage(packageName)"
    - component: "AutoPilotWidgetProvider"
      responsibility: "桌面小部件（4 个可配置按钮）"
      interfaces:
        - "onUpdate() — 刷新按钮状态"
        - "onReceive(action) — 处理按钮点击 → 转发事件"
    - component: "AutoPilotTileService"
      responsibility: "Quick Settings Tile 实现"
      interfaces:
        - "onClick() — 磁贴点击 → 转发事件"
        - "updateTile(label, icon, state)"
    - component: "FloatingButtonManager"
      responsibility: "悬浮按钮的显示/隐藏/配置管理"
      interfaces:
        - "show(config: FloatingButtonConfig)"
        - "hide()"
        - "isVisible(): Boolean"
        - "setOnClickListener(listener)"
  dependencies:
    - component: "A11yServiceEnhancer"
      relationship: "扩展现有 A11yAutomatorService，依赖其 AccessibilityService 基类"
    - component: "AutoPilotHttpServer"
      relationship: "独立模块，被 AutomatorService 管理生命周期"
    - component: "SensorService"
      relationship: "独立模块，被 AutomatorService 管理生命周期"
    - component: "ShizukuBridge"
      relationship: "被 A11yServiceEnhancer 和各种 Action 调用"
    - component: "Widget/Tile/FloatingButton"
      relationship: "通过 EventDispatcher 将用户交互转发为 Event"
  integration_points:
    - "AutomatorService.initEventDispatcher() 注册 HTTP/Sensor 相关 Dispatcher"
    - "AndroidManifest.xml 声明新服务/权限/Widget/Tile"
    - "PermissionGuideDialog 新增 Shizuku/Overlay 权限引导步骤"
    - "设置页新增 HTTP Server/传感器/Shizuku 配置入口"

