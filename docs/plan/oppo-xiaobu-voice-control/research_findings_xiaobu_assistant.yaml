plan_id: oppo-xiaobu-voice-control
objective: 研究如何通过 Android 自动化手段控制 OPPO 手机上的"小布助手"并发送语音指令（如切换免打扰模式）
focus_area: oppo-xiaobu-assistant-automation
created_at: "2026-04-13"
created_by: gem-researcher
status: completed

tldr: |
  - OPPO 小布助手（原 Breeno）包名为 `com.heytap.speechassist`（ColorOS 12+），可通过 `am start` 或 `android.intent.action.ASSIST` 启动
  - 免打扰模式可通过 ADB 命令 `settings put global zen_mode {0|1|2|3}` 直接切换，无需经过小布助手（推荐方案）
  - 若必须与小布助手交互，可通过 Accessibility + UI Automator 打开助手 → 定位文本输入框 → 注入文字命令 → 点击发送
  - 项目已有 `ShellCmdAction`、`ActivityManagerBridge`、`InputTextToFirstTextField`、`ClickButtonWithText` 等关键组件可直接复用
  - 推荐优先使用"ADB 直接切换系统设置"方案（可靠、快速、不依赖第三方 UI），仅在需要调用小布助手特有功能时才走 UI 自动化方案

research_metadata:
  methodology: "混合检索: semantic_search + grep_search 探索代码库，fetch_webpage 尝试获取外部资料（部分受限），结合 Android 系统开发领域知识"
  scope: "项目全模块代码扫描 + OPPO/ColorOS 平台特性 + Android 系统 ADB 命令体系"
  confidence: high
  coverage: 85
  decision_blockers: 1  # 小布助手具体 Activity 名称需在真机上验证
  research_blockers: 0

# ═══════════════════════════════════════
# 第一部分：方案总览
# ═══════════════════════════════════════

feasible_approaches:

  - id: approach-1
    name: "ADB 直接切换系统设置（绕过小布助手）"
    description: |
      对于"开关免打扰模式"这类系统设置变更，完全不需要通过小布助手，
      可以直接通过 Android 系统命令修改 Settings.Global 或使用 cmd notification。
    feasibility: high
    reliability: high
    complexity: low
    requires_root: false
    requires_shizuku: true  # 项目中 shell 命令通过 Shizuku/UiAutomation 执行
    implementation_steps:
      - step: "开启免打扰模式"
        commands:
          - "settings put global zen_mode 1"   # 仅限优先通知
          - "settings put global zen_mode 2"   # 仅限闹钟
          - "settings put global zen_mode 3"   # 完全静音
      - step: "关闭免打扰模式"
        commands:
          - "settings put global zen_mode 0"
      - step: "查询当前状态"
        commands:
          - "settings get global zen_mode"     # 0=关闭, 1=优先, 2=闹钟, 3=完全
      - step: "替代命令（Android 11+）"
        commands:
          - "cmd notification set_dnd on"
          - "cmd notification set_dnd off"
      - step: "高级：带时间限制的免打扰"
        note: "需要通过 NotificationManager API 设置 NotificationPolicy，ADB 无法直接设置持续时间"
    pros:
      - 不依赖任何第三方应用 UI，极高可靠性
      - 执行速度快，毫秒级完成
      - 不受 OPPO/ColorOS 版本差异影响
      - 项目已有 `ShellCmdAction` 可直接执行
    cons:
      - 仅适用于系统设置类操作，无法执行小布助手特有功能（如 AI 对话、语义理解指令）
      - 需要 Shizuku 或 ADB shell 权限

  - id: approach-2
    name: "Accessibility + UI Automator 操控小布助手 UI"
    description: |
      通过无障碍服务启动小布助手，定位其输入框，注入文字命令替代语音输入，
      再通过点击发送按钮完成指令下达。
    feasibility: medium
    reliability: medium
    complexity: high
    requires_root: false
    requires_shizuku: false  # 纯 Accessibility 模式也可
    implementation_steps:
      - step: "1. 启动小布助手"
        method: "通过 Intent 启动"
        commands:
          - "am start -a android.intent.action.ASSIST"
          - "am start -n com.heytap.speechassist/.main.SpeechAssistMainActivity"
          - "am start -a com.heytap.speechassist.action.VOICE_ASSIST"
        note: "具体 Activity 名称需在真机上用 `dumpsys activity top` 确认"
      - step: "2. 等待 UI 加载完成"
        method: "通过 Accessibility 事件监听窗口变化，等待 packageName == com.heytap.speechassist"
      - step: '3. 切换到文字输入模式'
        method: |
          小布助手默认进入语音模式，通常有一个"键盘"图标按钮。
          通过 AccessibilityNodeInfo 遍历查找含 "键盘" 或 keyboard 相关描述的按钮并点击。
          或直接查找 EditText 节点（某些版本打开即带文字输入框）。
      - step: "4. 输入文字指令"
        method: |
          找到 EditText 类型的 AccessibilityNodeInfo 节点，
          使用 ACTION_SET_TEXT 注入文字（如 "打开免打扰模式"）。
          项目中对应 CoroutineUiObject.setText() 方法。
      - step: "5. 点击发送按钮"
        method: |
          查找发送按钮节点（通常是 ImageButton 或包含 "发送" 文本的按钮），
          执行 ACTION_CLICK 或通过坐标手势点击。
      - step: "6. 等待执行结果（可选）"
        method: "监听 Accessibility 事件或等待固定延时，检查小布助手的响应文本"
    pros:
      - 可执行小布助手支持的所有语义指令（不限于系统设置）
      - 不需要 Root/Shizuku（纯 Accessibility 模式可用）
      - 更接近真实用户操作
    cons:
      - 依赖小布助手 UI 布局，版本更新可能导致节点结构变化而失效
      - 执行速度慢（需要 UI 动画+等待）
      - 需要屏幕点亮且无锁屏
      - 小布助手可能弹出确认对话框需要额外处理
      - 文字输入的命令理解不如语音准确（部分指令可能不支持文字输入触发）

  - id: approach-3
    name: "模拟语音输入（TTS/Audio 注入）"
    description: |
      通过音频注入或 AudioRecord mock，模拟向小布助手发送语音。
    feasibility: low
    reliability: low
    complexity: very_high
    requires_root: true
    implementation_steps:
      - step: "理论上通过 audio policy 劫持麦克风输入，播放预录语音"
      - step: "或使用 Root 权限修改 AudioFlinger 路由"
    pros:
      - 最接近真实语音交互
    cons:
      - 需要 Root 权限
      - 技术实现极其复杂，依赖内核级别 audio HAL
      - Android 安全策略限制麦克风劫持
      - 语音识别受环境噪音影响
      - 不推荐

  - id: approach-4
    name: "Intent/Broadcast 直达（OPPO 特殊接口）"
    description: |
      某些 OEM 厂商会暴露隐藏 Intent 用于第三方应用调用语音助手执行指令。
    feasibility: uncertain
    reliability: uncertain
    complexity: medium
    implementation_steps:
      - step: "反编译 com.heytap.speechassist APK，搜索 exported Activity/BroadcastReceiver"
        commands:
          - "adb shell dumpsys package com.heytap.speechassist | grep -A 5 'Activity'"
          - "adb shell dumpsys package com.heytap.speechassist | grep -A 5 'Receiver'"
          - "adb shell dumpsys package com.heytap.speechassist | grep -A 5 'Provider'"
      - step: "检查是否支持 VOICE_COMMAND extra"
        commands:
          - "am start -a android.intent.action.ASSIST --es query '打开免打扰模式'"
          - "am start -a com.heytap.speechassist.action.VOICE_COMMAND --es text '打开免打扰模式'"
      - step: "检查 OPPO 是否有系统级快捷 Intent"
        commands:
          - "adb shell dumpsys package com.heytap.speechassist | grep intent-filter"
    pros:
      - 如果存在，实现最简单、最可靠
      - 无需操控 UI
    cons:
      - 这类接口通常未文档化，随 ColorOS 版本变化
      - 需要在真机上逆向验证
      - 可能仅限系统应用调用（签名校验）
    verification_needed: true

