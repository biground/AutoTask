recommendation:
  primary_approach: approach-1
  primary_reason: |
    对于切换免打扰模式这一具体需求，直接通过 `settings put global zen_mode` 命令实现：
    - 可靠性最高（不依赖第三方 UI）
    - 速度最快（毫秒级）
    - 兼容性最好（所有 Android 版本通用）
    - 项目已有 `ShellCmdAction` 可直接使用
    用户只需创建一个宏，包含一个 Shell 命令 Action 即可完成。

  secondary_approach: approach-2
  secondary_reason: |
    仅在用户确实需要调用小布助手特有的 AI 能力（如语义理解、智能家居控制等）时使用。
    可利用项目现有的 UI 自动化组件链式组合：
    1. launchApp → 打开小布助手
    2. InputTextToFirstTextField → 输入文字指令
    3. ClickButtonWithText → 点击发送
    但需在真机上抓取 UI 布局树来确定具体的节点匹配策略。

  implementation_effort:
    approach_1_dnd_toggle:
      new_code_needed: "零（用户级配置，无需写新代码）"
      steps:
        - "用户在 AutoPilot 中创建一个新宏/任务"
        - "添加 Shell 命令 Action"
        - "输入命令: settings put global zen_mode 1（或 0/2/3）"
        - "保存并运行"
    approach_2_xiaobu_ui:
      new_code_needed: "可能需要新的复合 Action（封装多步骤 UI 交互）"
      steps:
        - "需真机验证小布助手 Activity 名称和 UI 布局"
        - "可能需要创建 VoiceAssistantAction 封装启动→输入→发送流程"
        - "或直接让用户使用现有原子 Action 手动编排"

