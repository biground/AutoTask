oppo_xiaobu_details:
  name_history:
    - era: "ColorOS 6-7 (2019-2020)"
      name: "Breeno"
      packages:
        - "com.coloros.speechassist"
        - "com.breeno.speech"
    - era: "ColorOS 11+ (2021+)"
      name: "小布助手"
      packages:
        - "com.heytap.speechassist"
    - era: "ColorOS 14+ (2024+)"
      name: "小布助手 (AI 版)"
      packages:
        - "com.heytap.speechassist"
        - "com.heytap.thirdparty.speechassist"   # 部分机型

  common_package_names:
    - "com.heytap.speechassist"          # 当前主流包名
    - "com.coloros.speechassist"          # 旧版 ColorOS
    - "com.heytap.thirdparty.speechassist"  # 第三方合作版

  launch_methods:
    - method: "标准 ASSIST Intent"
      command: "am start -a android.intent.action.ASSIST"
      note: "需要小布助手被设为默认助手应用"
    - method: "直接启动包名"
      command: "am start -n com.heytap.speechassist/.main.SpeechAssistMainActivity"
      note: "Activity 名称因版本而异，需真机确认"
    - method: "长按电源键"
      note: "OEM 默认行为，adb 可通过 input keyevent --longpress KEYCODE_POWER 模拟，但会触发关机菜单"
    - method: "全局搜索入口"
      command: "am start -a android.intent.action.SEARCH_LONG_PRESS"
      note: "可能打开全局搜索而非语音助手"

  real_device_verification_commands:
    - description: "确认小布助手包名"
      command: "adb shell pm list packages | grep -i speech"
    - description: "查看小布助手所有 Activity"
      command: "adb shell dumpsys package com.heytap.speechassist | grep 'Activity'"
    - description: "查看当前前台 Activity（启动小布后执行）"
      command: "adb shell dumpsys activity top | head -5"
    - description: "查看小布助手 intent-filter"
      command: "adb shell dumpsys package com.heytap.speechassist | grep -B2 -A10 'intent-filter'"
    - description: "检查 exported 组件"
      command: "adb shell dumpsys package com.heytap.speechassist | grep exported=true"
    - description: "使用 UI Automator dump 查看小布 UI 布局树"
      command: "adb shell uiautomator dump /sdcard/xiaobu_ui.xml && adb pull /sdcard/xiaobu_ui.xml"

