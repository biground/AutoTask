dnd_adb_commands:
  settings_global:
    - action: "关闭免打扰"
      command: "settings put global zen_mode 0"
      zen_mode_value: 0
    - action: "仅限优先通知（允许特定联系人/应用）"
      command: "settings put global zen_mode 1"
      zen_mode_value: 1
    - action: "仅限闹钟"
      command: "settings put global zen_mode 2"
      zen_mode_value: 2
    - action: "完全静音（Total Silence）"
      command: "settings put global zen_mode 3"
      zen_mode_value: 3
    - action: "查询当前 DND 状态"
      command: "settings get global zen_mode"

  cmd_notification:  # Android 11+ (API 30+)
    - action: "开启免打扰"
      command: "cmd notification set_dnd on"
    - action: "关闭免打扰"
      command: "cmd notification set_dnd off"

  notification_manager_api:
    description: |
      若需更精细控制（如设置持续时间、允许特定联系人），
      需通过 NotificationManager.setInterruptionFilter() + setNotificationPolicy() API 实现。
      该方式需要 ACCESS_NOTIFICATION_POLICY 权限（可通过 Shizuku 授予）。
    relevant_constants:
      - "NotificationManager.INTERRUPTION_FILTER_ALL = 1       # 无限制"
      - "NotificationManager.INTERRUPTION_FILTER_PRIORITY = 2  # 优先通知"
      - "NotificationManager.INTERRUPTION_FILTER_NONE = 3      # 完全静音"
      - "NotificationManager.INTERRUPTION_FILTER_ALARMS = 4    # 仅闹钟"

