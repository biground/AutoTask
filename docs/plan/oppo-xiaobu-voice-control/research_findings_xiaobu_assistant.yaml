patterns_found:
  - category: architecture
    pattern: "双模式自动化服务"
    description: |
      项目支持两种执行模式：
      1. A11yAutomatorService (Accessibility 模式) - 不需要 Root/Shizuku
      2. ShizukuAutomatorService (Shizuku 特权模式) - 提供 shell 命令执行能力
      两者共享 CoroutineUiObject/CoroutineUiDevice 操作能力。
    examples:
      - file: A11yAutomatorService.kt
        location: "A11yAutomatorService.kt:57"
        snippet: "class A11yAutomatorService : AccessibilityService(), AutomatorService"
      - file: ShizukuAutomatorService.kt
        location: "ShizukuAutomatorService.kt:41"
        snippet: "class ShizukuAutomatorService : IRemoteAutomatorService.Stub, AutomatorService"
    prevalence: common

  - category: architecture
    pattern: "Applet 注册链路"
    description: |
      所有自动化动作通过 Registry → BootstrapOptionRegistry → AppletOptionFactory 链路注册。
      新增功能（如 DND 切换）应遵循此模式。
    examples:
      - file: ShellCmdActionRegistry.kt
        location: "ShellCmdActionRegistry.kt:15"
        snippet: "class ShellCmdActionRegistry(id: Int) : AppletOptionRegistry(id)"
    prevalence: common

  - category: architecture
    pattern: "UI 自动化流程模式"
    description: |
      PerformActionIfUiObjectExistsInCurrentWindow 是关键基类：
      1. 获取当前窗口根节点
      2. 遍历查找匹配的 AccessibilityNodeInfo
      3. 找到后执行指定动作（click/setText/等）
    examples:
      - file: ClickButtonWithText.kt
        location: "ClickButtonWithText.kt:15"
        snippet: "class ClickButtonWithText : PerformActionIfUiObjectExistsInCurrentWindow()"
      - file: InputTextToFirstTextField.kt
        location: "InputTextToFirstTextField.kt:15"
        snippet: "class InputTextToFirstTextField : PerformActionIfUiObjectExistsInCurrentWindow()"
    prevalence: common

  - category: naming
    pattern: "Action 和 Flow 命名约定"
    description: |
      - 简单动作: XxxAction extends SingleArgAction (如 ShellCmdAction)
      - UI 流程动作: XxxFlow extends PerformActionIfUiObjectExistsInCurrentWindow
      - Registry: XxxActionRegistry extends AppletOptionRegistry
    examples:
      - file: ShellCmdAction.kt
        location: "ShellCmdAction.kt:18"
        snippet: "class ShellCmdAction(private val isFile: Boolean) : SingleArgAction<String>()"
    prevalence: common

