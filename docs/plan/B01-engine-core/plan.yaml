plan_id: B01-engine-core
objective: |
  补全引擎核心能力：Dictionary 变量(V-005)、Array 变量(V-006)、
  Iterate Dictionary/Array(CF-004)、Action Block(CF-009)、Exit Action Block(CF-010)、
  数组操作(EX-006)、宏模板(E-007)。
  交付可用的高级数据结构、可复用动作块、数组高阶操作和模板系统。
created_at: "2026-04-16"
created_by: gem-planner
status: pending_approval
research_confidence: medium

plan_metrics:
  wave_1_task_count: 4
  total_dependencies: 22
  risk_score: high

tldr: |
  分 6 个 wave（共 24 个任务）实施 7 项引擎核心功能：
  Wave 1: 扩展 VariableType 枚举 + Dictionary/Array 数据模型与序列化
  Wave 2: VariableRepository 适配 + 表达式引擎 Array 操作扩展
  Wave 3: Iterate Dictionary/Array 控制流 + Action Block/Exit 引擎实现
  Wave 4: 注册表接入 + 字符串资源 + UI 适配
  Wave 5: 宏模板系统（模型 + 预置模板 + UI）
  Wave 6: 安全审查 + 全量验证

open_questions:
  - "Action Block 参数传递是使用局部变量还是专用参数对象？建议用局部变量以复用现有 VariableRepository"
  - "Dictionary 的 key 类型是否只支持 String？建议 V1 先只支持 String key"
  - "宏模板存储在 assets 目录还是从远程获取？建议 V1 先内置 assets，后续扩展"

pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: "Action Block 调用栈实现破坏现有 Runtime 执行逻辑"
      likelihood: medium
      impact: critical
      mitigation: |
        在 tasker-engine 的 TaskRuntime 中新增 BlockCallStack 独立模块，
        不修改现有 Flow.execute() 签名；递归深度默认 16 层 + StackOverflow 捕获。
    - scenario: "Dictionary/Array 变量序列化导致现有宏 JSON 不兼容"
      likelihood: medium
      impact: high
      mitigation: |
        VariableType 枚举新增值放在末尾（DICTIONARY=4, ARRAY=5），
        旧 JSON 中不包含新类型不会出错；新增 version 字段用于向前兼容校验。
    - scenario: "Iterate 控制流与现有 Repeat Loop 的 Break/Continue 语义冲突"
      likelihood: low
      impact: medium
      mitigation: |
        Iterate 继承 ContainerFlow 并复用 ControlFlow 的 Break/Continue 机制，
        与 Repeat 共享同一退出语义。
  assumptions:
    - "现有 VariableType 枚举可安全扩展（追加值不影响已序列化数据）"
    - "ExpressionEvaluator 的 AST 架构支持新增数组操作函数"
    - "BootstrapOptionRegistry 的 AppletOrdinal 分配空间充足"
    - "MVP 的 416 个测试在 V1 开发期间持续通过"

implementation_specification:
  code_structure: |
    在 tasker-engine 模块扩展变量类型和控制流基类，
    在 app 模块实现注册、UI 和模板系统，测试覆盖每个新组件。
  affected_areas:
    - "tasker-engine/src/main/java/top/xjunz/tasker/engine/variable/ — 变量类型扩展"
    - "tasker-engine/src/main/java/top/xjunz/tasker/engine/applet/base/ — Iterate/ActionBlock 控制流"
    - "tasker-engine/src/main/java/top/xjunz/tasker/engine/expression/ — 数组操作函数"
    - "app/src/main/java/top/xjunz/tasker/task/applet/option/registry/ — 注册表"
    - "app/src/main/java/top/xjunz/tasker/task/applet/option/AppletOptionFactory.kt — 工厂注册"
    - "app/src/main/java/top/xjunz/tasker/task/variable/ — DataStore 持久化适配"
    - "app/src/main/java/top/xjunz/tasker/ui/ — 变量编辑 UI / 模板 UI"
  component_details:
    - component: "VariableType 扩展"
      responsibility: "在枚举中新增 DICTIONARY 和 ARRAY 类型"
      interfaces:
        - "VariableType.DICTIONARY"
        - "VariableType.ARRAY"
    - component: "DictionaryVariable / ArrayVariable 操作"
      responsibility: "封装 Dict/Array 的 get/set/remove/contains/size/keys/values 操作"
      interfaces:
        - "Variable.asDictionary(): MutableMap<String, Any?>"
        - "Variable.asArray(): MutableList<Any?>"
    - component: "IterateFlow"
      responsibility: "遍历 Dictionary/Array 的控制流，每次迭代设置 key/value 或 index/element 局部变量"
      interfaces:
        - "class IterateFlow : ContainerFlow — execute() 循环调用子 Applet"
    - component: "ActionBlockFlow / ExitActionBlock"
      responsibility: "可复用动作块（类函数），支持调用栈和 Exit 提前退出"
      interfaces:
        - "class ActionBlockFlow : ContainerFlow — 定义动作块"
        - "class ExitActionBlock : ControlFlow — 提前退出当前动作块"
        - "class BlockCallStack — 调用栈管理（push/pop/depth）"
    - component: "数组操作函数"
      responsibility: "在表达式引擎中新增 array 高阶操作"
      interfaces:
        - "arraySort(array, ascending?) → Array"
        - "arrayFilter(array, expression) → Array"
        - "arrayMap(array, expression) → Array"
        - "arrayFind(array, expression) → Any?"
        - "arrayDistinct(array) → Array"
        - "arrayLength(array) → Integer"
    - component: "宏模板系统"
      responsibility: "预置宏模板的定义、存储和加载"
      interfaces:
        - "data class MacroTemplate(id, name, description, category, macroJson)"
        - "class MacroTemplateRepository — 从 assets 加载预置模板"
        - "MacroTemplateDialog — 模板浏览和导入 UI"
  dependencies:
    - component: "IterateFlow"
      relationship: "依赖 VariableType.DICTIONARY/ARRAY，运行时通过 VariableRepository 读写迭代变量"
    - component: "ActionBlockFlow"
      relationship: "依赖 BlockCallStack 管理调用深度，通过 VariableRepository 传递参数（局部变量）"
    - component: "数组操作函数"
      relationship: "依赖 VariableType.ARRAY，在 ExpressionEvaluator 中注册新内置函数"
    - component: "宏模板"
      relationship: "依赖现有宏导入导出（E-004）的 JSON 序列化能力"
  integration_points:
    - "VariableType 枚举扩展 → DataStoreVariableRepository.VariableDto 序列化"
    - "BootstrapOptionRegistry 新增 Iterate/ActionBlock/Exit 流程选项"
    - "AppletOptionFactory 注册新 Registry"
    - "VariableManagerDialog 支持显示/编辑 Dict 和 Array 类型"

