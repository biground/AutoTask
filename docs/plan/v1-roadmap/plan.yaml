pre_mortem:
  overall_risk_level: high

  critical_failure_modes:
    - scenario: "Action Block 调用栈实现导致引擎 Runtime 不稳定"
      likelihood: medium
      impact: critical
      mitigation: |
        限制递归调用深度（默认 16 层）+ 栈溢出异常捕获 + 充分的边界测试；
        CF-009/CF-010 先做 prototype 验证，确认 Runtime 改动安全后再全量推进。

    - scenario: "Accessibility Service 在国产 ROM 上被频繁自动关闭"
      likelihood: high
      impact: high
      mitigation: |
        实现服务状态监控 + 自动重启机制 + 用户引导加入自启动白名单；
        提供非 A11y 降级路径（通过 Shizuku 或标准 API）。

    - scenario: "Firestore 双向同步导致数据丢失"
      likelihood: medium
      impact: critical
      mitigation: |
        乐观锁 + 版本号 + 变更日志 + 冲突检测 UI；
        每次同步前本地快照备份；先实现单向同步再扩展为双向。

    - scenario: "Custom Scene 渲染器性能不达标"
      likelihood: medium
      impact: high
      mitigation: |
        渐进式实现：先支持基础组件（按钮/文本/图片/开关），
        复杂组件（列表/网格/动画）在 V1.1 追加；
        使用 Compose LazyLayout + key 优化重组。

    - scenario: "Android 端与 Web 端 JSON Schema 不一致导致同步异常"
      likelihood: high
      impact: high
      mitigation: |
        抽取 JSON Schema 为独立规范文件（docs/macro-schema.json），
        两端均从该文件生成类型定义；CI 中加入 Schema 一致性检查。

    - scenario: "JavaScript 执行引擎（A-SCRIPT-002）沙箱逃逸"
      likelihood: low
      impact: critical
      mitigation: |
        使用 QuickJS/Rhino 严格限制可用 API（禁止文件/网络/反射），
        执行超时限制（默认 10 秒），独立线程 + 内存限制。

  assumptions:
    - "MVP 的 118 项功能全部稳定运行，无需在 V1 阶段重新修复"
    - "Android 16 在 V1 开发期间不会引入破坏性 API 变更"
    - "现有的 EventDispatcher/EventFilter/Referent 架构能承载 38 个新触发器而不需要重构"
    - "Firebase 免费层的 Firestore 限额（50K reads/20K writes per day）足够个人使用"
    - "NanoHTTPD/Ktor-Server 的轻量级 HTTP Server 能满足 Webhook 和远程控制需求"
    - "QuickJS 或 Rhino JS 引擎可以在 Android 16 上稳定运行"
