      steps:
        - |
          Red: 创建 ScreenEventDispatcherTest.kt，编写测试：
          - `屏幕亮起时分发 EVENT_ON_SCREEN_ON`
          - `屏幕熄灭时分发 EVENT_ON_SCREEN_OFF`
          - `屏幕解锁时分发 EVENT_ON_SCREEN_UNLOCKED`
          运行测试，确认编译失败（ScreenEventDispatcher 不存在）
        - |
          Green: 创建 ScreenEventDispatcher.kt：
          ```kotlin
          class ScreenEventDispatcher : EventDispatcher() {
              private val receiver = object : BroadcastReceiver() {
                  override fun onReceive(context: Context, intent: Intent) {
                      when (intent.action) {
                          Intent.ACTION_SCREEN_ON -> dispatchEvents(Event.obtain(Event.EVENT_ON_SCREEN_ON))
                          Intent.ACTION_SCREEN_OFF -> dispatchEvents(Event.obtain(Event.EVENT_ON_SCREEN_OFF))
                          Intent.ACTION_USER_PRESENT -> dispatchEvents(Event.obtain(Event.EVENT_ON_SCREEN_UNLOCKED))
                      }
                  }
              }
              override fun onRegistered() {
                  val filter = IntentFilter().apply {
                      addAction(Intent.ACTION_SCREEN_ON)
                      addAction(Intent.ACTION_SCREEN_OFF)
                      addAction(Intent.ACTION_USER_PRESENT)
                  }
                  ContextBridge.getContext().registerReceiver(receiver, filter)
              }
              override fun destroy() {
                  ContextBridge.getContext().unregisterReceiver(receiver)
              }
          }
          ```
        - "Verify: 运行单测确认 3 个测试全部通过"
      acceptance_criteria:
        - "3 个单测通过"
        - "编译成功"

