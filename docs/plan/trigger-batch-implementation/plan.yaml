plan_id: trigger-batch-implementation
objective: |
  实现 AutoPilot 的 19 个 MVP 触发器：启用 5 个已实现触发器，验证 2 个部分实现触发器，
  新建 8 个 EventDispatcher + 相关 Referent/EventFilter/EventCriterionRegistry 注册。
  最终所有 19 个触发器可在引擎中正常触发和匹配。
created_at: "2026-04-13"
created_by: gem-planner
status: pending_approval
research_confidence: high
complexity: complex

plan_metrics:
  total_tasks: 16
  total_waves: 5
  wave_1_task_count: 3
  total_dependencies: 23
  risk_score: medium

tldr: |
  16 个任务分 5 波执行，覆盖 19 个 MVP 触发器。
  Wave 1 (3 任务): 基础设施 — Event 常量 16 个、字符串资源 18 条、权限声明 7 条。
  Wave 2 (9 任务): 启用已有分发器 + 创建 8 个新 EventDispatcher + 对应单测。
  Wave 3 (1 任务): 将所有新分发器注册到共享文件 (AutomatorService/EventFilter/EventCriterionRegistry)。
  Wave 4 (2 任务): 验证轮询触发器 + 全量编译与测试。
  Wave 5 (1 任务): 安全审查。
  关键路径: T01 → T04 → T13 → T15。最大并行度 9 (Wave 2)。

open_questions: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "Event 常量 ID 冲突 — 新增 ID 20-35 与其他并行开发分支冲突"
      likelihood: low
      impact: high
      mitigation: "T01 先合入主干并广播，其他分支基于此 rebase"
    - scenario: "AutomatorService.initEventDispatcher() 多任务串行修改导致合并冲突"
      likelihood: medium
      impact: medium
      mitigation: "T04 完成所有快速启用注册；T13 完成所有新分发器注册。两个任务严格串行"
    - scenario: "BroadcastReceiver 动态注册在 Android 16 上行为变化"
      likelihood: medium
      impact: medium
      mitigation: "每个 Dispatcher 单测验证注册/注销生命周期，集成测试验证事件分发"
    - scenario: "敏感权限 (SMS/CALL/BLUETOOTH) 运行时授权遗漏导致崩溃"
      likelihood: medium
      impact: high
      mitigation: "T16 安全审查逐一检查权限声明、运行时检查、异常处理"
    - scenario: "AlarmManager.setExactAndAllowWhileIdle 在 Doze 模式下不触发"
      likelihood: medium
      impact: medium
      mitigation: "AlarmEventDispatcher 文档注明限制；使用 setAlarmClock 作为降级方案"
  assumptions:
    - "Android 16 (API 36) 是唯一目标平台，不需要向下兼容"
    - "Event.kt 下一个可用 ID 为 20，无其他分支在并行添加常量"
    - "所有 BroadcastReceiver 触发器运行时由前台 AutomatorService 托管，无需静态注册"
    - "测试环境使用 Robolectric/MockK，Event.extras (SparseArray) 在纯 JVM 下为 mock"
    - "ModeChangeEventDispatcher 虽非 19 个 MVP 之一，但已实现，一并注册以保持完整性"

implementation_specification:
  code_structure: |
    新增 EventDispatcher 子类遵循既有模式：
    1. 继承 EventDispatcher()
    2. onRegistered() 中注册系统回调 (BroadcastReceiver / TelephonyCallback / etc.)
    3. 回调中 Event.obtain(EVENT_TYPE).apply { putExtra(...) } → dispatchEvents()
    4. destroy() 中注销所有监听
    新增 Referent 实现类遵循既有 referent 模式：
    data class *Referent(...) : Referent { getReferredValue(which, runtime) }
    所有新文件放在 app/src/main/java/top/xjunz/tasker/task/event/ 目录下

  affected_areas:
    - "tasker-engine/src/main/java/top/xjunz/tasker/engine/runtime/Event.kt — 新增 16 个常量"
    - "app/src/main/java/top/xjunz/tasker/service/AutomatorService.kt — initEventDispatcher() 注册新分发器"
    - "app/src/main/java/top/xjunz/tasker/task/applet/criterion/EventFilter.kt — 新增 when 分支"
    - "app/src/main/java/top/xjunz/tasker/task/applet/option/registry/EventCriterionRegistry.kt — 新增事件选项"
    - "app/src/main/java/top/xjunz/tasker/autostart/AutoStarter.kt — 增加开机事件分发逻辑"
    - "app/src/main/AndroidManifest.xml — 新增权限声明"
    - "app/src/main/res/values/strings.xml — 新增字符串资源"
    - "app/src/main/java/top/xjunz/tasker/task/event/ — 8 个新 EventDispatcher 文件"
    - "app/src/main/java/top/xjunz/tasker/task/applet/flow/ref/ — 5 个新 Referent 文件"
    - "app/src/test/kotlin/top/xjunz/tasker/task/event/ — 8 个新单测文件"

  component_details:
    - component: "Event.kt 常量扩展"
      responsibility: "定义 ID 20-35 的 16 个新事件类型常量"
      interfaces:
        - "EVENT_ON_ALARM_FIRED (20)"
        - "EVENT_ON_DEVICE_BOOTED (21)"
        - "EVENT_ON_SCREEN_ON (22)"
        - "EVENT_ON_SCREEN_OFF (23)"
        - "EVENT_ON_SCREEN_UNLOCKED (24)"
        - "EVENT_ON_BT_STATE_CHANGED (25)"
        - "EVENT_ON_BT_DEVICE_CONNECTED (26)"
        - "EVENT_ON_BT_DEVICE_DISCONNECTED (27)"
        - "EVENT_ON_CALL_STATE_CHANGED (28)"
        - "EVENT_ON_SMS_RECEIVED (29)"
        - "EVENT_ON_POWER_CONNECTED (30)"
        - "EVENT_ON_POWER_DISCONNECTED (31)"
        - "EVENT_ON_HEADSET_PLUGGED (32)"
        - "EVENT_ON_HEADSET_UNPLUGGED (33)"
        - "EVENT_ON_INTENT_RECEIVED (34)"
        - "EVENT_ON_MANUAL_TRIGGER (35)"

    - component: "ScreenEventDispatcher"
      responsibility: "监听 SCREEN_ON/OFF + USER_PRESENT 系统广播，分发屏幕事件"
      interfaces:
        - "dispatchEvents(EVENT_ON_SCREEN_ON)"
        - "dispatchEvents(EVENT_ON_SCREEN_OFF)"
        - "dispatchEvents(EVENT_ON_SCREEN_UNLOCKED)"

    - component: "PowerEventDispatcher"
      responsibility: "监听 POWER_CONNECTED/DISCONNECTED 系统广播"
      interfaces:
        - "dispatchEvents(EVENT_ON_POWER_CONNECTED)"
        - "dispatchEvents(EVENT_ON_POWER_DISCONNECTED)"

    - component: "HeadsetEventDispatcher"
      responsibility: "监听 ACTION_HEADSET_PLUG 广播，通过 state extra 区分插入/拔出"
      interfaces:
        - "dispatchEvents(EVENT_ON_HEADSET_PLUGGED)"
        - "dispatchEvents(EVENT_ON_HEADSET_UNPLUGGED)"

    - component: "BluetoothEventDispatcher + BluetoothReferent"
      responsibility: "监听蓝牙状态/设备连接广播；Referent 暴露设备名、MAC 地址"
      interfaces:
        - "dispatchEvents(EVENT_ON_BT_STATE_CHANGED)"
        - "dispatchEvents(EVENT_ON_BT_DEVICE_CONNECTED)"
        - "dispatchEvents(EVENT_ON_BT_DEVICE_DISCONNECTED)"
        - "BluetoothReferent.getReferredValue(0=self, 1=deviceName, 2=macAddress)"

    - component: "AlarmEventDispatcher + AlarmReferent"
      responsibility: "使用 AlarmManager 调度精确时间事件；Referent 暴露触发时间"
      interfaces:
        - "dispatchEvents(EVENT_ON_ALARM_FIRED)"
        - "scheduleAlarm(timeInMillis, repeatRule)"
        - "cancelAlarm()"
        - "AlarmReferent.getReferredValue(0=self, 1=triggerTimeMillis)"

    - component: "PhoneCallEventDispatcher + PhoneCallReferent"
      responsibility: "使用 TelephonyCallback 监听来电状态变化；Referent 暴露号码"
      interfaces:
        - "dispatchEvents(EVENT_ON_CALL_STATE_CHANGED)"
        - "EXTRA_CALL_STATE, EXTRA_PHONE_NUMBER"
        - "PhoneCallReferent.getReferredValue(0=self, 1=phoneNumber, 2=callState)"

    - component: "SmsEventDispatcher + SmsReferent"
      responsibility: "监听 SMS_RECEIVED 广播；Referent 暴露发送方号码和内容"
      interfaces:
        - "dispatchEvents(EVENT_ON_SMS_RECEIVED)"
        - "EXTRA_SMS_SENDER, EXTRA_SMS_BODY"
        - "SmsReferent.getReferredValue(0=self, 1=sender, 2=body)"

    - component: "IntentEventDispatcher + IntentReferent"
      responsibility: "动态注册 BroadcastReceiver 捕获用户配置的 Intent Action"
      interfaces:
        - "dispatchEvents(EVENT_ON_INTENT_RECEIVED)"
        - "registerAction(action: String)"
        - "unregisterAction(action: String)"
        - "IntentReferent.getReferredValue(0=self, 1=action, 2=dataUri)"

  dependencies:
    - component: "所有新 Dispatcher"
      relationship: "继承 EventDispatcher，通过 MetaEventDispatcher.registerEventDispatcher() 注册"
    - component: "所有新 Referent"
      relationship: "实现 Referent 接口，由 EventFilter.apply() 创建并返回"
    - component: "EventCriterionRegistry 条目"
      relationship: "引用 Event 常量和 strings.xml 资源，创建 EventFilter 实例"

  integration_points:
    - "AutomatorService.initEventDispatcher() — 注册入口"
    - "EventFilter.apply() when 分支 — 事件匹配和 Referent 创建"
    - "EventCriterionRegistry @AppletOrdinal 条目 — UI 触发器列表"
    - "ResidentTaskScheduler — 事件回调驱动任务执行"

