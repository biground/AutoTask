# ============================================================
# 五、实现建议
# ============================================================

implementation_recommendations:

  batch_strategy:
    wave_1_quick_wins:
      description: "启用已有代码 + 简单 BroadcastReceiver 事件"
      triggers:
        - { id: T-APP-006, effort: minimal, reason: "取消注释 ClipboardEventDispatcher" }
        - { id: T-INT-001, effort: minimal, reason: "在 initEventDispatcher 注册 VariableChangeEventDispatcher" }
        - { id: T-INT-017, effort: low, reason: "EventCriterionRegistry 新增空触发器选项" }
        - { id: T-DEV-001, effort: low, reason: "修改 AutoStarter 或服务启动逻辑分发开机事件" }
        - { id: T-PWR-001, effort: low, reason: "简单 BroadcastReceiver (ACTION_POWER_CONNECTED)" }
        - { id: T-DEV-002, effort: low, reason: "简单 BroadcastReceiver (SCREEN_ON/OFF)" }
        - { id: T-DEV-003, effort: low, reason: "合并到 ScreenEventDispatcher (USER_PRESENT)" }
        - { id: T-HW-001, effort: low, reason: "简单 BroadcastReceiver (HEADSET_PLUG)" }

    wave_2_medium_effort:
      description: "需要额外权限和更复杂逻辑的触发器"
      triggers:
        - { id: T-TIME-003, effort: medium, reason: "已基本可用(TICK+条件)，可选优化精确间隔" }
        - { id: T-PWR-002, effort: medium, reason: "已基本可用(TICK+电量条件)，可选优化为广播" }
        - { id: T-NET-003, effort: medium, reason: "BluetoothEventDispatcher + BLUETOOTH_CONNECT 权限" }

    wave_3_complex:
      description: "需要 AlarmManager 调度或敏感权限的触发器"
      triggers:
        - { id: T-TIME-001, effort: high, reason: "AlarmEventDispatcher + AlarmManager + SCHEDULE_EXACT_ALARM" }
        - { id: T-TIME-002, effort: high, reason: "复用 AlarmEventDispatcher + 重复规则" }
        - { id: T-PHONE-001, effort: high, reason: "TelephonyCallback + READ_PHONE_STATE 权限" }
        - { id: T-PHONE-006, effort: high, reason: "SMS BroadcastReceiver + RECEIVE_SMS 权限" }
        - { id: T-INT-009, effort: high, reason: "动态 IntentFilter + 用户配置 UI" }

  new_event_constants_needed:
    - { id: 20, name: EVENT_ON_ALARM_FIRED, for: "T-TIME-001/002" }
    - { id: 21, name: EVENT_ON_DEVICE_BOOTED, for: "T-DEV-001" }
    - { id: 22, name: EVENT_ON_SCREEN_ON, for: "T-DEV-002" }
    - { id: 23, name: EVENT_ON_SCREEN_OFF, for: "T-DEV-002" }
    - { id: 24, name: EVENT_ON_SCREEN_UNLOCKED, for: "T-DEV-003" }
    - { id: 25, name: EVENT_ON_BT_STATE_CHANGED, for: "T-NET-003" }
    - { id: 26, name: EVENT_ON_BT_DEVICE_CONNECTED, for: "T-NET-003" }
    - { id: 27, name: EVENT_ON_BT_DEVICE_DISCONNECTED, for: "T-NET-003" }
    - { id: 28, name: EVENT_ON_CALL_STATE_CHANGED, for: "T-PHONE-001" }
    - { id: 29, name: EVENT_ON_SMS_RECEIVED, for: "T-PHONE-006" }
    - { id: 30, name: EVENT_ON_POWER_CONNECTED, for: "T-PWR-001" }
    - { id: 31, name: EVENT_ON_POWER_DISCONNECTED, for: "T-PWR-001" }
    - { id: 32, name: EVENT_ON_HEADSET_PLUGGED, for: "T-HW-001" }
    - { id: 33, name: EVENT_ON_HEADSET_UNPLUGGED, for: "T-HW-001" }
    - { id: 34, name: EVENT_ON_INTENT_RECEIVED, for: "T-INT-009" }
    - { id: 35, name: EVENT_ON_MANUAL_TRIGGER, for: "T-INT-017" }

  new_dispatchers_needed:
    - name: AlarmEventDispatcher
      for: "T-TIME-001, T-TIME-002"
      mechanism: "AlarmManager.setExactAndAllowWhileIdle() + BroadcastReceiver"

    - name: ScreenEventDispatcher
      for: "T-DEV-002, T-DEV-003"
      mechanism: "BroadcastReceiver (SCREEN_ON/OFF/USER_PRESENT)"

    - name: PowerEventDispatcher
      for: "T-PWR-001"
      mechanism: "BroadcastReceiver (POWER_CONNECTED/DISCONNECTED)"

    - name: BluetoothEventDispatcher
      for: "T-NET-003"
      mechanism: "BroadcastReceiver (BT_STATE_CHANGED/ACL_CONNECTED/DISCONNECTED)"

    - name: PhoneCallEventDispatcher
      for: "T-PHONE-001"
      mechanism: "TelephonyCallback (API 31+)"

    - name: SmsEventDispatcher
      for: "T-PHONE-006"
      mechanism: "BroadcastReceiver (SMS_RECEIVED)"

    - name: HeadsetEventDispatcher
      for: "T-HW-001"
      mechanism: "BroadcastReceiver (ACTION_HEADSET_PLUG)"

    - name: IntentEventDispatcher
      for: "T-INT-009"
      mechanism: "动态 BroadcastReceiver，IntentFilter 由用户配置"

  architectural_pattern:
    description: |
      所有新 EventDispatcher 应遵循以下模式：
      1. 继承 EventDispatcher()
      2. onRegistered() 中注册 BroadcastReceiver / Callback
      3. 回调中创建 Event.obtain(EVENT_TYPE) 并通过 dispatchEvents() 广播
      4. destroy() 中注销所有监听
      5. 在 EventFilter.apply() 的 when 分支中处理新事件类型
      6. 如需暴露事件参数，创建 *Referent 实现类
      7. 在 EventCriterionRegistry 中注册选项
      8. 在 AutomatorService.initEventDispatcher() 中注册分发器

